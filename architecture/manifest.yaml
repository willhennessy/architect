unknowns:
  - "Signature capture method not specified: typed, drawn, or cryptographic certificate"
  - "SLA requirements for webhook delivery (retry policy, dead-letter handling)"
  - "Data residency or compliance requirements (HIPAA, eIDAS, SOC 2)"
  - "Expected document volume and concurrent signer load at MVP launch"
  - "Whether a separate analytics datastore is needed or Postgres is sufficient for MVP"
overall_summary: >
  DocSign is a multi-tenant B2B SaaS platform for document signature workflows. Tenants create
  and send documents; signers authenticate via email magic-link and sign without creating an
  account. The platform delivers real-time webhook callbacks to customer systems on signature
  events and maintains an immutable audit trail. A modular monolith architecture with a separate
  async worker service is proposed to hit the 10-week MVP window with a 5-person team.
