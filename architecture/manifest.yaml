assumptions:
  - text: "Cloud-hosted infrastructure (AWS or equivalent) with managed Postgres and object storage"
    confidence: "strong_inference"
  - text: "MongoDB as the primary database (confirmed by user feedback)"
    confidence: "confirmed"
  - text: "REST API communication between frontend apps and backend"
