version: 2
id: "view-container"
type: "container"
title: "DocSign Platform — Container View"
audience:
  - "senior_architects"
  - "new_hires"
purpose: "What are the deployable containers inside DocSign and how do they communicate?"
scope: "All containers within the DocSign platform boundary, plus actors and external systems that interact directly"
source_model: "architecture/model.yaml"
element_ids:
  - "person-admin"
  - "person-signer"
  - "container-web-app"
  - "container-signer-portal"
  - "container-api"
  - "container-worker"
  - "db-primary"
  - "store-documents"
  - "queue-jobs"
  - "ext-email-provider"
  - "ext-customer-system"
relationship_ids:
  - "rel-admin-webapp"
  - "rel-signer-portal"
  - "rel-webapp-api"
  - "rel-portal-api"
  - "rel-api-db"
  - "rel-api-store"
  - "rel-api-queue"
  - "rel-worker-queue"
  - "rel-worker-db"
  - "rel-worker-store"
  - "rel-worker-email"
  - "rel-worker-webhook"
assumptions:
  - text: "Admin Web App and Signer Portal are separate deployables to allow independent security posture for the public-facing signer flow"
    confidence: "strong_inference"
  - text: "Async Worker runs as a separate process/container with independent scaling"
    confidence: "strong_inference"
unknowns:
  - "Whether Signer Portal should be served from a separate subdomain for CSRF isolation"
  - "Whether the job queue uses Redis (BullMQ) or a managed queue (SQS) — affects worker deployment"
notes:
  - "Audit events are written directly by the API Server within the signing operation — not via the job queue — to guarantee atomicity"
  - "The Async Worker owns webhook retry logic; delivery failures are tracked in db-primary"
