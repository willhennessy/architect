    tags: ["datastore", "postgres"]
    confidence: "strong_inference"
    evidence_ids: ["asm-002", "req-004", "trd-002"]

  - id: "store-documents"
    name: "Document Storage"
    kind: "container"
    c4_level: "container"
    description: "S3-compatible object storage for raw uploaded documents and finalized signed PDFs."
    responsibility: "Durable storage of document files and signed PDF artifacts"
    technology: "AWS S3 / compatible"
    owned_data:
      - "Raw document files"
      - "Signed PDF artifacts"
    system_of_record:
      - "Raw document files"
      - "Signed PDF artifacts"
    runtime_boundary: "data_store"
    deployable: false
