      - "Users"
      - "Documents"
      - "Signing sessions"
      - "Signatures"
      - "Audit events"
      - "Webhook configs"
    system_of_record:
      - "Tenant accounts"
      - "Users"
      - "Documents"
      - "Signing sessions"
