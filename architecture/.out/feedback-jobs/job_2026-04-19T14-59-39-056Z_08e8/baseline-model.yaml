evidence:
  - id: "req-001"
    path: "plan://requirements/create-send-documents"
    kind: "plan_requirement"
    strength: "high"
    reason: "Core product requirement: tenants create and send documents for signature"

  - id: "req-002"
    path: "plan://requirements/signer-magic-link-flow"
    kind: "plan_requirement"
    strength: "high"
    reason: "Core product requirement: signers authenticate and sign via email magic link"

  - id: "req-003"
    path: "plan://requirements/webhook-callbacks"
    kind: "plan_requirement"
    strength: "high"
    reason: "Core product requirement: webhook callbacks to customer systems on signature events"

  - id: "req-004"
    path: "plan://requirements/audit-trail"
    kind: "plan_requirement"
    strength: "high"
    reason: "Core product requirement: immutable audit trail for every signature event"

  - id: "req-005"
    path: "plan://requirements/admin-analytics-dashboard"
    kind: "plan_requirement"
    strength: "high"
    reason: "Core product requirement: analytics dashboard for tenant admins"

  - id: "con-001"
    path: "plan://constraints/multi-tenant-b2b"
    kind: "plan_constraint"
    strength: "high"
    reason: "System must support multiple customer organizations with strict data isolation"

  - id: "con-002"
    path: "plan://constraints/team-timeline"
    kind: "plan_constraint"
    strength: "high"
    reason: "5 engineers, 10-week MVP — constrains architecture complexity toward modular monolith"

  - id: "asm-001"
    path: "plan://assumptions/cloud-infrastructure"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Cloud-hosted infrastructure assumed; specific provider unconfirmed"

  - id: "asm-002"
    path: "plan://assumptions/postgresql"
    kind: "plan_assumption"
    strength: "medium"
    reason: "PostgreSQL is a standard choice for B2B SaaS; unconfirmed by user"

  - id: "asm-003"
    path: "plan://assumptions/rest-api"
    kind: "plan_assumption"
    strength: "medium"
    reason: "REST API assumed for client-server communication; GraphQL is alternative"

  - id: "trd-001"
    path: "plan://tradeoffs/monolith-vs-microservices"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Modular monolith chosen over microservices to hit 10-week deadline with 5 engineers"

  - id: "trd-002"
    path: "plan://tradeoffs/multitenant-row-vs-schema"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Row-level tenant_id isolation chosen over schema-per-tenant for MVP simplicity"

  - id: "trd-003"
    path: "plan://tradeoffs/async-queue-for-webhooks"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Async queue for webhook + email delivery ensures reliability and independent retry; audit writes are synchronous within DB transaction for correctness"

unknowns:
  - "Signature capture method: typed name, drawn signature, or cryptographic certificate"
  - "Webhook delivery SLA and retry policy (max retries, dead-letter handling)"
  - "Compliance requirements (SOC 2, HIPAA, eIDAS) that may constrain data residency or signing method"
  - "Expected peak document volume and concurrent signer load"
  - "Whether analytics dashboards require a separate OLAP store or Postgres materialized views suffice"
  - "Authentication method for tenant admin users (email/password, SSO, OAuth)"

assumptions:
  - text: "Cloud-hosted infrastructure (AWS or equivalent) with managed PostgreSQL and S3-compatible object storage"
    confidence: "strong_inference"
  - text: "PostgreSQL as the primary relational database"
    confidence: "strong_inference"
  - text: "REST API communication between frontend apps and API server"
    confidence: "strong_inference"
  - text: "Signers do not need a platform account — magic link is the sole signer auth mechanism for MVP"
    confidence: "strong_inference"
  - text: "Row-level tenant_id column isolation is sufficient for MVP multi-tenancy"
    confidence: "strong_inference"
  - text: "Audit events are written synchronously within the signature transaction for correctness, not via the async queue"
    confidence: "strong_inference"
