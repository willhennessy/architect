  - id: "queue-jobs"
    name: "Job Queue"
    kind: "queue"
    c4_level: "container"
    description: "Message queue for async job dispatch. Decouples API server from email delivery, webhook calls, and PDF finalization to ensure reliability and independent retry policies."
    responsibility: "Async job buffering and delivery guarantee"
    technology: "Redis (BullMQ) or AWS SQS"
