    responsibility: "Email dispatch, webhook delivery with retries, PDF finalization"
    technology: "Node.js, BullMQ / SQS consumer"
    owned_data: []
    system_of_record: []
    runtime_boundary: "deployable"
    deployable: true
    external: false
    parent_id: ""
    source_paths:
