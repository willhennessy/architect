    confidence: "strong_inference"
    evidence_ids: ["req-002", "req-003", "trd-003"]

  - id: "db-primary"
    name: "Primary Database"
    kind: "database"
    c4_level: "container"
    description: "PostgreSQL database. Stores tenant accounts, users, documents, signing sessions, signature records, webhook configurations, job state, and append-only audit_events table."
    responsibility: "System of record for all transactional and audit data"
    technology: "PostgreSQL"
    owned_data:
