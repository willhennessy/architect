<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="diagram-render-mode" content="__DIAGRAM_MODE__" />
  <title>Claude Architect</title>
  <style>
    :root {
      --bg-primary: #1F1F1E;
      --bg-secondary: #262626;
      --bg-tertiary: #2C2C2B;
      --text-primary: #F9F9F7;
      --text-secondary: #97958C;
      --text-diagram-subtitle: #F9F9F7B3;
      --line: #3A3937;
      --line-strong: #4A4945;
      --accent: #7A6FA6;
      --accent-alt: #4F8F8B;
      --warn: #B08968;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(122, 111, 166, 0.14) 0%, rgba(122, 111, 166, 0) 26%),
        radial-gradient(circle at 18% 0%, rgba(79, 143, 139, 0.12) 0%, rgba(79, 143, 139, 0) 24%),
        linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 22%, #171716 100%);
      color: var(--text-primary);
      min-height: 100vh;
    }

    #app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(31, 31, 30, 0.92);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 42;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .title {
      font-weight: 800;
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(72vw, 980px);
    }

    .mode-badge {
      display: none;
      font-size: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--accent), var(--accent-alt));
      padding: 3px 7px;
      border-radius: 999px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .tabbar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(38, 38, 38, 0.90);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      position: sticky;
      top: 44px;
      z-index: 41;
    }

    .tab {
      border: 1px solid var(--line-strong);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
      cursor: pointer;
      line-height: 1;
    }

    .tab:hover {
      border-color: rgba(249, 249, 247, 0.18);
      color: var(--text-primary);
      background: #323230;
    }

    .tab.active {
      color: var(--text-primary);
      border-color: rgba(122, 111, 166, 0.9);
      box-shadow: inset 0 0 0 1px rgba(122, 111, 166, 0.28);
      background: rgba(122, 111, 166, 0.18);
      font-weight: 700;
    }

    .tab-sep {
      color: var(--text-secondary);
      font-size: 12px;
      user-select: none;
    }

    .toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(38, 38, 38, 0.90);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 82px;
      z-index: 40;
    }

    button {
      border: 1px solid var(--line-strong);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-radius: 9px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }

    button:hover:not(:disabled):not(.comment-toggle.on) {
      border-color: rgba(249, 249, 247, 0.18);
      background: #323230;
    }

    button:disabled { opacity: .5; cursor: default; }

    .comment-toggle.on {
      color: var(--bg-primary);
      border-color: transparent;
      background: linear-gradient(135deg, var(--warn), #9A7557);
      font-weight: 700;
    }

    .comment-toggle.on:hover:not(:disabled) {
      color: var(--bg-primary);
      border-color: transparent;
      background: linear-gradient(135deg, #a78060, #8f6c51);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px;
      transition: grid-template-columns 140ms ease;
    }

    .workspace.details-open {
      grid-template-columns: 1fr 320px;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        radial-gradient(circle at top, rgba(122, 111, 166, 0.08) 0%, rgba(122, 111, 166, 0) 34%),
        linear-gradient(180deg, #2A2A29 0%, var(--bg-primary) 100%);
      overflow: hidden;
    }

    #canvas {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 6px;
    }

    .hint {
      position: absolute;
      right: 10px;
      top: 10px;
      font-size: 11px;
      color: var(--text-primary);
      background: rgba(176, 137, 104, 0.22);
      border: 1px solid rgba(176, 137, 104, 0.48);
      border-radius: 8px;
      padding: 4px 8px;
      display: none;
    }

    .hint.show { display: block; }

    #details {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--bg-secondary);
      overflow: hidden;
      font-size: 12px;
      display: none;
      min-width: 0;
    }

    .workspace.details-open #details {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .details-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #232322;
    }

    .details-title {
      font-size: 11px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 700;
    }

    #detailsBody {
      overflow: auto;
      padding: 12px;
      min-height: 0;
    }

    .details-collapse-btn {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 8px;
    }

    .empty-note { color: var(--text-secondary); text-align: center; padding-top: 40px; }

    .meta-label {
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    .chip {
      display: inline-block;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 10px;
      margin-right: 4px;
      margin-top: 3px;
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .queue {
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1 1 240px;
      min-width: 0;
      margin-left: 4px;
    }

    .queue.show { display: flex; }

    .queue-items {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .queue-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(176, 137, 104, 0.48);
      background: rgba(176, 137, 104, 0.14);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      line-height: 1.2;
      max-width: 260px;
      min-height: 24px;
      overflow: hidden;
    }

    .queue-item-text {
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-remove {
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 999px;
      padding: 0;
      width: 16px;
      height: 16px;
      min-width: 16px;
      display: inline-flex;
      align-items: center;
      align-self: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
    }

    .queue-remove:hover:not(:disabled) {
      background: rgba(249, 249, 247, 0.08);
      color: var(--text-primary);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(16, 16, 15, .62);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .overlay.show { display: flex; }

    .dialog {
      width: min(720px, 96vw);
      max-height: 86vh;
      overflow: auto;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: var(--bg-secondary);
      padding: 12px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
    }

    textarea {
      width: 100%;
      min-height: 92px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }

    textarea::placeholder {
      color: rgba(151, 149, 140, 0.78);
    }

    pre {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #1B1B1A;
      color: var(--text-primary);
      font-size: 11px;
      line-height: 1.45;
      overflow: auto;
      white-space: pre-wrap;
    }

    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    svg text { user-select: none; }
    svg [data-element-id] { cursor: pointer; }
    .comment-mode-on svg [data-element-id],
    .comment-mode-on svg [data-relationship-id] { cursor: crosshair; }
    svg [data-element-id][data-selected='true'] {
      filter: drop-shadow(0 0 7px rgba(176, 137, 104, 0.45));
    }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="title">Claude Architect</div>
      <div class="subtitle" id="systemSubtitle"></div>
    </div>
    <span class="mode-badge" id="modeBadge"></span>
  </div>
  <div class="tabbar" id="tabs" aria-label="View navigation"></div>
  <div class="toolbar">
    <button id="commentToggle" class="comment-toggle">Comment (C)</button>
    <button id="submitBtn" disabled>Submit comments</button>
    <div class="queue" id="queueBar">
      <div class="queue-items" id="queueItems"></div>
    </div>
  </div>
  <div class="workspace" id="workspace">
    <div class="canvas-wrap">
      <div class="hint" id="commentHint">Comment mode: click node, edge, or canvas</div>
      <div id="canvas"></div>
    </div>
    <aside id="details" aria-label="Details sidebar">
      <div class="details-header">
        <div class="details-title">Details</div>
        <button id="detailsCollapseBtn" class="details-collapse-btn" title="Collapse details sidebar">Collapse</button>
      </div>
      <div id="detailsBody"><div class="empty-note">Click a node to inspect details</div></div>
    </aside>
  </div>
</div>

<div class="overlay" id="commentDialogOverlay">
  <div class="dialog">
    <h3 style="margin:0 0 8px;font-size:14px;color:var(--text-primary)">Add comment</h3>
    <div id="commentTarget" style="font-size:12px;color:var(--text-secondary);margin-bottom:8px"></div>
    <textarea id="commentText" placeholder="Type feedback..."></textarea>
    <div class="dialog-actions">
      <button id="commentCancel">Cancel</button>
      <button id="commentAdd">Add comment</button>
    </div>
  </div>
</div>

<div class="overlay" id="payloadOverlay">
  <div class="dialog">
    <h3 style="margin:0 0 8px;font-size:14px;color:var(--text-primary)">Comment payload (JSON)</h3>
    <p style="font-size:12px;color:var(--text-secondary);margin:0 0 8px">Copy this JSON and paste it into your coding agent.</p>
    <pre id="payloadPre"></pre>
    <div class="dialog-actions">
      <button id="payloadCopy">Copy</button>
      <button id="payloadClose">Close</button>
    </div>
  </div>
</div>

<script>
const DATA = __DIAGRAM_DATA_JSON__;
const MODE = "__DIAGRAM_MODE__";

const THEME = {
  bgPrimary: '#1F1F1E',
  bgSecondary: '#262626',
  bgTertiary: '#2C2C2B',
  textPrimary: '#F9F9F7',
  textSecondary: '#97958C',
  textDiagramSubtitle: '#F9F9F7B3',
  blueMuted: '#4C78A8',
  greenMuted: '#5A8F6A',
  purpleDusty: '#7A6FA6',
  amberWarm: '#B08968',
  cyanMuted: '#4F8F8B',
  redSoft: '#A05A5A',
  slateNeutral: '#6B7280',
  line: '#3A3937',
  lineStrong: '#4A4945',
};

const state = {
  viewId: DATA.initial_view_id,
  history: [],
  selectedId: null,
  detailsOpen: false,
  commentMode: false,
  comments: [],
  pendingTarget: null,
};

const nodesById = new Map((DATA.elements || []).map(function (e) { return [e.id, e]; }));
const viewsById = new Map((DATA.views || []).map(function (v) { return [v.id, v]; }));

const kindColor = {
  person: THEME.blueMuted,
  software_system: THEME.purpleDusty,
  system: THEME.purpleDusty,
  external_system: THEME.amberWarm,
  external_actor: THEME.amberWarm,
  actor: THEME.amberWarm,
  container: THEME.greenMuted,
  component: THEME.cyanMuted,
  database: THEME.slateNeutral,
  datastore: THEME.slateNeutral,
  queue: THEME.redSoft,
  cache: THEME.cyanMuted,
};

function hexToRgb(hex) {
  const clean = String(hex || '').trim().replace('#', '');
  if (!/^[0-9a-fA-F]{6}$/.test(clean)) return null;
  return {
    r: parseInt(clean.slice(0, 2), 16),
    g: parseInt(clean.slice(2, 4), 16),
    b: parseInt(clean.slice(4, 6), 16),
  };
}

function clampByte(n) {
  return Math.max(0, Math.min(255, Math.round(n)));
}

function rgbToHex(rgb) {
  if (!rgb) return '#000000';
  return '#'
    + clampByte(rgb.r).toString(16).padStart(2, '0')
    + clampByte(rgb.g).toString(16).padStart(2, '0')
    + clampByte(rgb.b).toString(16).padStart(2, '0');
}

function mixHex(baseHex, targetHex, targetWeight) {
  const base = hexToRgb(baseHex);
  const target = hexToRgb(targetHex);
  if (!base || !target) return baseHex;
  const w = Math.max(0, Math.min(1, Number(targetWeight) || 0));
  return rgbToHex({
    r: base.r * (1 - w) + target.r * w,
    g: base.g * (1 - w) + target.g * w,
    b: base.b * (1 - w) + target.b * w,
  });
}

function hexToRgba(hex, alpha) {
  const rgb = hexToRgb(hex);
  if (!rgb) return 'rgba(0, 0, 0, ' + String(alpha) + ')';
  return 'rgba(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ', ' + String(alpha) + ')';
}

function colorForKind(kind) {
  return kindColor[String(kind || '').toLowerCase()] || THEME.slateNeutral;
}

const edgeColor = mixHex(THEME.textSecondary, THEME.textPrimary, 0.14);
const edgeDetailColor = mixHex(THEME.textSecondary, THEME.bgPrimary, 0.18);
const drillStrokeColor = mixHex(THEME.purpleDusty, THEME.textPrimary, 0.16);
const scaffoldStrokeColor = mixHex(THEME.slateNeutral, THEME.textPrimary, 0.08);
const relationshipStrokeWidth = 1.15;
const relationshipStrokeWidthSelected = 1.75;

const SVG_COLOR_REMAP = {
  '#0b1220': THEME.bgPrimary,
  '#101a2f': THEME.bgSecondary,
  '#0d172a': THEME.bgSecondary,
  '#0a1324': THEME.bgTertiary,
  '#081024': '#1B1B1A',
  '#132449': THEME.bgSecondary,
  '#e6eeff': THEME.textPrimary,
  '#f0f9ff': THEME.textPrimary,
  '#dff0ff': THEME.textPrimary,
  '#f0fdf4': THEME.textPrimary,
  '#8fa4cb': edgeColor,
  '#5a7090': edgeDetailColor,
  '#91acd8': THEME.textSecondary,
  '#9fb7e2': THEME.textSecondary,
  '#9db7e2': THEME.textSecondary,
  '#9fb8e4': THEME.textSecondary,
  '#abc0e5': THEME.textSecondary,
  '#a8bcdf': THEME.textSecondary,
  '#9fc7ff': mixHex(THEME.purpleDusty, THEME.textPrimary, 0.16),
  '#27406f': THEME.line,
  '#35558f': THEME.lineStrong,
  '#2a446f': THEME.lineStrong,
  '#22385f': THEME.line,
  '#294474': THEME.lineStrong,
  '#2d4f83': THEME.lineStrong,
  '#2c4a7a': THEME.lineStrong,
  '#4f6186': scaffoldStrokeColor,
  '#1e3a5f': mixHex(THEME.blueMuted, THEME.bgPrimary, 0.26),
  '#3b82f6': THEME.blueMuted,
  '#60a5fa': mixHex(THEME.blueMuted, THEME.textPrimary, 0.22),
  '#16a34a': THEME.greenMuted,
  '#4ade80': mixHex(THEME.greenMuted, THEME.textPrimary, 0.18),
  '#86efac': mixHex(THEME.greenMuted, THEME.textPrimary, 0.28),
  '#0ea5e9': THEME.cyanMuted,
  '#38bdf8': mixHex(THEME.cyanMuted, THEME.textPrimary, 0.16),
  '#7dd3fc': mixHex(THEME.cyanMuted, THEME.textPrimary, 0.26),
  '#8b5cf6': THEME.purpleDusty,
  '#5f4aa0': mixHex(THEME.purpleDusty, THEME.textPrimary, 0.12),
  '#a78bfa': mixHex(THEME.purpleDusty, THEME.textPrimary, 0.18),
  '#f97316': THEME.amberWarm,
  '#d97706': THEME.amberWarm,
  '#b45309': THEME.redSoft,
  '#8a5f23': mixHex(THEME.amberWarm, THEME.textPrimary, 0.12),
  '#ffdca0': mixHex(THEME.amberWarm, THEME.textPrimary, 0.3),
  '#ffbd59': THEME.amberWarm,
  '#0f766e': THEME.cyanMuted,
  '#2dd4bf': mixHex(THEME.cyanMuted, THEME.textPrimary, 0.2),
  '#5eead4': mixHex(THEME.cyanMuted, THEME.textPrimary, 0.3),
  '#334155': THEME.slateNeutral,
  '#64748b': mixHex(THEME.slateNeutral, THEME.textPrimary, 0.08),
  '#94a3b8': mixHex(THEME.slateNeutral, THEME.textPrimary, 0.24),
  'rgba(20,52,105,0.22)': hexToRgba(THEME.blueMuted, 0.12),
  'rgba(20,52,105,0.20)': hexToRgba(THEME.blueMuted, 0.11),
  'rgba(45,20,89,0.20)': hexToRgba(THEME.purpleDusty, 0.12),
  'rgba(120,45,8,0.16)': hexToRgba(THEME.amberWarm, 0.11),
  'rgba(22,87,57,0.18)': hexToRgba(THEME.greenMuted, 0.12),
  'rgba(18,66,51,0.18)': hexToRgba(THEME.greenMuted, 0.12),
  'rgba(62,74,102,0.20)': hexToRgba(THEME.slateNeutral, 0.12),
};

function $(id) { return document.getElementById(id); }

function currentView() { return viewsById.get(state.viewId); }

function updateHeader() {
  const subtitle = DATA.system_subtitle || DATA.system_name || 'Architecture Diagram';
  $('systemSubtitle').textContent = subtitle;
  $('modeBadge').setAttribute('data-render-mode', MODE);
  $('commentHint').className = state.commentMode ? 'hint show' : 'hint';
  $('commentToggle').className = state.commentMode ? 'comment-toggle on' : 'comment-toggle';
  document.body.classList.toggle('comment-mode-on', state.commentMode);
}

function cleanedTitle(text) {
  const t = String(text || '').trim();
  if (!t) return '';
  const parts = t.split('—').map(function (x) { return x.trim(); }).filter(Boolean);
  if (parts.length <= 1) return t;
  return parts[parts.length - 1];
}

function tabLabel(view) {
  const t = String(view.type || '').toLowerCase();
  if (t === 'system_context') return 'System Context';
  if (t === 'container') return 'Containers';
  if (t === 'component') {
    const pid = view.parent_container_id;
    const p = pid ? nodesById.get(pid) : null;
    if (p && p.name) return p.name + ' Components';
    const tail = cleanedTitle(view.title || view.id || 'Components');
    if (/components?$/i.test(tail)) return tail;
    return tail + ' Components';
  }
  return cleanedTitle(view.title || view.id || 'View');
}

function updateTabs() {
  const tabs = $('tabs');
  tabs.innerHTML = '';
  const views = (DATA.views || []);
  views.forEach(function (view, idx) {
    const b = document.createElement('button');
    b.className = 'tab' + (view.id === state.viewId ? ' active' : '');
    b.textContent = tabLabel(view);
    b.addEventListener('click', function () {
      state.history = [];
      state.viewId = view.id;
      state.selectedId = null;
      render();
    });
    tabs.appendChild(b);

    if (idx < views.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'tab-sep';
      sep.textContent = '›';
      tabs.appendChild(sep);
    }
  });
}

function normalizeSvgFragment(fragment) {
  let t = String(fragment || '').trim();
  if (!t) return '';

  if (t.startsWith('```')) {
    const lines = t.split('\n');
    lines.shift();
    if (lines.length && lines[lines.length - 1].trim() === '```') lines.pop();
    t = lines.join('\n').trim();
  }

  t = t.replace(/<script[\s\S]*?<\/script>/gi, '');
  // Remove person-style emoji markers from injected diagrams.
  t = t.replace(/[👤👥🧑👨👩]/gu, '');
  return t;
}

function isConfidenceTokenText(text) {
  const t = String(text || '').toLowerCase().trim();
  if (!t) return false;
  const cleaned = t
    .replace(/[\[\]()]/g, '')
    .replace(/\s+/g, '_')
    .replace(/-+/g, '_');
  return cleaned === 'confirmed' || cleaned === 'strong_inference' || cleaned === 'weak_inference';
}

function stripConfidenceLabelsFromSvg(svg) {
  if (!svg) return;

  svg.querySelectorAll('[data-confidence-label], .confidence-label').forEach(function (el) {
    el.remove();
  });

  svg.querySelectorAll('text').forEach(function (textEl) {
    if (isConfidenceTokenText(textEl.textContent)) {
      textEl.remove();
    }
  });
}

function isVisiblePaint(value) {
  const v = String(value || '').trim().toLowerCase();
  if (!v || v === 'none' || v === 'transparent') return false;
  if (/rgba?\([^)]*,\s*0(?:\.0+)?\s*\)$/.test(v)) return false;
  return true;
}

function replaceColorTokens(value) {
  let out = String(value || '');
  Object.keys(SVG_COLOR_REMAP).forEach(function (from) {
    const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(escaped, 'gi'), SVG_COLOR_REMAP[from]);
  });
  return out;
}

function remapSvgPalette(svg) {
  if (!svg) return;
  svg.querySelectorAll('*').forEach(function (el) {
    ['fill', 'stroke', 'stop-color'].forEach(function (attr) {
      if (!el.hasAttribute(attr)) return;
      el.setAttribute(attr, replaceColorTokens(el.getAttribute(attr)));
    });
    if (el.hasAttribute('style')) {
      el.setAttribute('style', replaceColorTokens(el.getAttribute('style')));
    }
  });
}

function isSecondaryNodeText(textEl, idx) {
  const text = String(textEl.textContent || '').trim();
  if (!text) return false;
  if (idx > 0) return true;
  if (/^\[.*\]$/.test(text)) return true;
  const fontSize = parseFloat(textEl.getAttribute('font-size') || '0');
  return isFinite(fontSize) && fontSize > 0 && fontSize <= 10;
}

function isPersonKind(kind) {
  const normalized = String(kind || '').toLowerCase();
  return normalized === 'person' || normalized === 'actor' || normalized === 'external_actor';
}

function personSubtitleText(kind) {
  return '[👤 User]';
}

function isEmojiOnlyText(text) {
  const cleaned = String(text || '').trim();
  return cleaned === '👤' || cleaned === '👥' || cleaned === '🧑' || cleaned === '👨' || cleaned === '👩';
}

function estimateTextWidth(text, fontSize) {
  return String(text || '').trim().length * Number(fontSize || 0) * 0.58;
}

function simplifyPersonNodeGroup(group, node) {
  if (!group || !isPersonKind(node && node.kind)) return;

  group.querySelectorAll('circle').forEach(function (circle) {
    circle.remove();
  });

  const textEls = Array.from(group.querySelectorAll('text'));
  textEls.forEach(function (textEl) {
    if (isEmojiOnlyText(textEl.textContent || '')) {
      textEl.remove();
    }
  });

  let remainingTexts = Array.from(group.querySelectorAll('text'));
  remainingTexts.forEach(function (textEl) {
    const text = String(textEl.textContent || '').trim();
    if (!text) return;
    if (/^\[[^\]]*\]$/.test(text)) {
      textEl.textContent = personSubtitleText(node && node.kind);
    }
  });

  const rect = group.querySelector('rect');
  const box = elementBBox(rect);
  if (!rect || !box) return;

  remainingTexts = Array.from(group.querySelectorAll('text'));
  let titleText = null;
  let subtitleText = null;

  remainingTexts.forEach(function (textEl) {
    const text = String(textEl.textContent || '').trim();
    if (!text) return;
    if (/^\[[^\]]*\]$/.test(text)) subtitleText = textEl;
    else if (!titleText) titleText = textEl;
  });

  if (!subtitleText) {
    subtitleText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    subtitleText.textContent = personSubtitleText(node && node.kind);
    group.appendChild(subtitleText);
  }

  const centerX = box.x + box.width / 2;
  const centerY = box.y + box.height / 2;
  const titleFontSize = 12;
  const subtitleFontSize = 9;
  const titleWidth = titleText ? estimateTextWidth(titleText.textContent, titleFontSize) : 0;
  const subtitleWidth = estimateTextWidth(subtitleText.textContent, subtitleFontSize);
  const contentWidth = Math.max(titleWidth, subtitleWidth);
  const targetWidth = Math.max(box.width, Math.ceil(contentWidth + 28));
  const targetHeight = Math.max(box.height, 78);
  const nextX = centerX - targetWidth / 2;
  const nextY = centerY - targetHeight / 2;

  rect.setAttribute('x', String(nextX));
  rect.setAttribute('y', String(nextY));
  rect.setAttribute('width', String(targetWidth));
  rect.setAttribute('height', String(targetHeight));

  if (titleText) {
    titleText.setAttribute('x', String(centerX));
    titleText.setAttribute('y', String(nextY + targetHeight / 2 - 10));
    titleText.setAttribute('text-anchor', 'middle');
    titleText.setAttribute('dominant-baseline', 'middle');
    titleText.setAttribute('font-size', String(titleFontSize));
    titleText.setAttribute('font-weight', '600');
    titleText.setAttribute('pointer-events', 'none');
  }

  subtitleText.textContent = personSubtitleText(node && node.kind);
  subtitleText.setAttribute('x', String(centerX));
  subtitleText.setAttribute('y', String(nextY + targetHeight / 2 + 12));
  subtitleText.setAttribute('text-anchor', 'middle');
  subtitleText.setAttribute('dominant-baseline', 'middle');
  subtitleText.setAttribute('font-size', String(subtitleFontSize));
  subtitleText.setAttribute('pointer-events', 'none');
}

function applyNodeGroupTheme(group, node) {
  simplifyPersonNodeGroup(group, node);
  const base = colorForKind(node && node.kind);
  const stroke = mixHex(base, THEME.textPrimary, 0.22);

  group.querySelectorAll('rect,circle,ellipse,path,polygon').forEach(function (shape) {
    if (isVisiblePaint(shape.getAttribute('fill'))) {
      shape.setAttribute('fill', base);
    }
    if (isVisiblePaint(shape.getAttribute('stroke'))) {
      shape.setAttribute('stroke', stroke);
    }
  });

  const texts = Array.from(group.querySelectorAll('text'));
  texts.forEach(function (textEl, idx) {
    textEl.setAttribute('fill', isSecondaryNodeText(textEl, idx) ? THEME.textDiagramSubtitle : THEME.textPrimary);
  });
}

function fallbackNodeSubtitle(node) {
  if (!node) return '';
  if (node.technology) return String(node.technology);
  if (isPersonKind(node.kind)) return personSubtitleText(node.kind);
  return '';
}

function applyRelationshipGroupTheme(group) {
  group.querySelectorAll('line,path,polyline,polygon').forEach(function (shape) {
    if (shape.closest('defs')) return;
    if (isVisiblePaint(shape.getAttribute('stroke'))) {
      shape.setAttribute('stroke', edgeColor);
      const tag = String(shape.tagName || '').toLowerCase();
      if (tag === 'line' || tag === 'path' || tag === 'polyline') {
        const current = parseFloat(shape.getAttribute('stroke-width') || '');
        const next = isFinite(current) ? Math.min(current, relationshipStrokeWidth) : relationshipStrokeWidth;
        shape.setAttribute('stroke-width', String(next));
      }
    }
    if (isVisiblePaint(shape.getAttribute('fill'))) {
      shape.setAttribute('fill', edgeColor);
    }
  });

  const texts = Array.from(group.querySelectorAll('text'));
  texts.forEach(function (textEl, idx) {
    textEl.setAttribute('fill', idx === 0 ? THEME.textSecondary : edgeDetailColor);
  });
}

function isLargeScaffoldShape(el) {
  const w = parseFloat(el.getAttribute('width') || '0');
  const h = parseFloat(el.getAttribute('height') || '0');
  return isFinite(w) && isFinite(h) && (w >= 180 || h >= 110);
}

function applyScaffoldTheme(svg) {
  svg.querySelectorAll('defs polygon, defs path, defs line').forEach(function (el) {
    if (isVisiblePaint(el.getAttribute('fill'))) {
      el.setAttribute('fill', edgeColor);
    }
    if (isVisiblePaint(el.getAttribute('stroke'))) {
      el.setAttribute('stroke', edgeColor);
    }
  });

  svg.querySelectorAll('text').forEach(function (textEl) {
    if (textEl.closest('[data-element-id]') || textEl.closest('[data-relationship-id]')) return;
    const weight = String(textEl.getAttribute('font-weight') || '');
    const strong = weight === '700' || weight === '600';
    textEl.setAttribute('fill', strong ? THEME.textPrimary : THEME.textSecondary);
  });

  svg.querySelectorAll('rect,circle,ellipse,path,polygon,line,polyline').forEach(function (shape) {
    if (shape.closest('[data-element-id]') || shape.closest('[data-relationship-id]') || shape.closest('defs')) return;

    if (String(shape.getAttribute('stroke-dasharray') || '').trim()) {
      if (isVisiblePaint(shape.getAttribute('fill'))) {
        shape.setAttribute('fill', hexToRgba(THEME.purpleDusty, 0.08));
      }
      if (isVisiblePaint(shape.getAttribute('stroke'))) {
        shape.setAttribute('stroke', THEME.purpleDusty);
      }
      return;
    }

    if (isLargeScaffoldShape(shape)) {
      if (isVisiblePaint(shape.getAttribute('fill'))) {
        shape.setAttribute('fill', hexToRgba(THEME.slateNeutral, 0.08));
      }
      if (isVisiblePaint(shape.getAttribute('stroke'))) {
        shape.setAttribute('stroke', scaffoldStrokeColor);
      }
      return;
    }

    if (isVisiblePaint(shape.getAttribute('stroke'))) {
      shape.setAttribute('stroke', scaffoldStrokeColor);
    }
    if (isVisiblePaint(shape.getAttribute('fill'))) {
      shape.setAttribute('fill', scaffoldStrokeColor);
    }
  });
}

function nextTextSibling(el) {
  let cur = el ? el.nextElementSibling : null;
  while (cur) {
    if (String(cur.tagName || '').toLowerCase() === 'text') return cur;
    cur = cur.nextElementSibling;
  }
  return null;
}

function findLegendGroups(svg) {
  const groups = [];
  svg.querySelectorAll('g').forEach(function (g) {
    if (g.closest('[data-element-id]') || g.closest('[data-relationship-id]')) return;
    const labels = Array.from(g.querySelectorAll('text')).map(function (t) {
      return String(t.textContent || '').trim().toLowerCase();
    });
    const hasDirectionSignals =
      labels.includes('sync')
      && labels.includes('async')
      && labels.includes('bidirectional');
    const hasRoleSignals =
      labels.includes('person')
      || labels.includes('container')
      || labels.includes('internal system')
      || labels.includes('database')
      || labels.includes('cache/queue')
      || labels.includes('external')
      || labels.includes('external system');
    const hasLegendSignals = hasDirectionSignals && hasRoleSignals;
    if (hasLegendSignals) groups.push(g);
  });
  return groups;
}

function legendColorForLabel(label) {
  const normalized = String(label || '').trim().toLowerCase();
  if (normalized === 'person') return { fill: THEME.blueMuted };
  if (normalized === 'container') return { fill: THEME.greenMuted };
  if (normalized === 'internal system') return { fill: THEME.purpleDusty };
  if (normalized === 'database') return { fill: THEME.slateNeutral };
  if (normalized === 'cache/queue') return { fill: THEME.cyanMuted };
  if (normalized === 'external' || normalized === 'external system') {
    return {
      fill: THEME.amberWarm,
      stroke: mixHex(THEME.amberWarm, THEME.textPrimary, 0.18),
    };
  }
  return null;
}

function applyLegendTheme(svg) {
  findLegendGroups(svg).forEach(function (group) {
    Array.from(group.children).forEach(function (child) {
      const tag = String(child.tagName || '').toLowerCase();

      if (tag === 'rect') {
        const width = parseFloat(child.getAttribute('width') || '0');
        const height = parseFloat(child.getAttribute('height') || '0');
        if (width > 100 || height > 20) {
          child.setAttribute('fill', 'rgba(31, 31, 30, 0.84)');
          child.setAttribute('stroke', THEME.lineStrong);
          return;
        }

        const labelNode = nextTextSibling(child);
        const color = legendColorForLabel(labelNode && labelNode.textContent);
        if (color) {
          child.setAttribute('fill', color.fill);
          if (color.stroke) child.setAttribute('stroke', color.stroke);
          else child.removeAttribute('stroke');
        }
        return;
      }

      if (tag === 'line') {
        child.setAttribute('stroke', edgeColor);
        return;
      }

      if (tag === 'text') {
        child.setAttribute('fill', THEME.textSecondary);
      }
    });
  });
}

function applySvgTheme(svg, view) {
  if (!svg) return;
  remapSvgPalette(svg);

  svg.querySelectorAll('[data-element-id]').forEach(function (group) {
    const node = nodesById.get(group.getAttribute('data-element-id'));
    applyNodeGroupTheme(group, node || {});
  });

  svg.querySelectorAll('[data-relationship-id]').forEach(function (group) {
    applyRelationshipGroupTheme(group);
  });

  applyScaffoldTheme(svg);
  applyLegendTheme(svg);
}

function isDrillable(elementId) {
  return Boolean((DATA.drill_map || {})[String(elementId || '')]);
}

function buildCornerBadge(x, y) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('transform', 'translate(' + x + ' ' + y + ')');
  g.setAttribute('pointer-events', 'none');
  g.setAttribute('data-drill-badge', 'true');

  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  bg.setAttribute('cx', '0');
  bg.setAttribute('cy', '0');
  bg.setAttribute('r', '7');
  bg.setAttribute('fill', THEME.bgTertiary);
  bg.setAttribute('stroke', drillStrokeColor);
  bg.setAttribute('stroke-width', '1.2');
  g.appendChild(bg);

  const plusH = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  plusH.setAttribute('x1', '-2.4');
  plusH.setAttribute('y1', '0');
  plusH.setAttribute('x2', '2.4');
  plusH.setAttribute('y2', '0');
  plusH.setAttribute('stroke', THEME.textPrimary);
  plusH.setAttribute('stroke-width', '1.4');
  plusH.setAttribute('stroke-linecap', 'round');
  g.appendChild(plusH);

  const plusV = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  plusV.setAttribute('x1', '0');
  plusV.setAttribute('y1', '-2.4');
  plusV.setAttribute('x2', '0');
  plusV.setAttribute('y2', '2.4');
  plusV.setAttribute('stroke', THEME.textPrimary);
  plusV.setAttribute('stroke-width', '1.4');
  plusV.setAttribute('stroke-linecap', 'round');
  g.appendChild(plusV);

  return g;
}

function elementBBox(el) {
  if (!el) return null;

  const tag = String(el.tagName || '').toLowerCase();
  if (tag === 'rect') {
    const x = parseFloat(el.getAttribute('x') || '0');
    const y = parseFloat(el.getAttribute('y') || '0');
    const w = parseFloat(el.getAttribute('width') || '0');
    const h = parseFloat(el.getAttribute('height') || '0');
    if (isFinite(x) && isFinite(y) && isFinite(w) && isFinite(h)) {
      return { x: x, y: y, width: w, height: h };
    }
  }

  try {
    const box = el.getBBox();
    if (box && isFinite(box.x) && isFinite(box.y) && isFinite(box.width) && isFinite(box.height)) {
      return box;
    }
  } catch (_err) {
    // ignore
  }
  return null;
}

function applyDrillabilityAffordances(svg) {
  if (!svg) return;

  svg.querySelectorAll('[data-drill-badge="true"]').forEach(function (el) {
    el.remove();
  });

  const seen = new Set();
  svg.querySelectorAll('[data-element-id]').forEach(function (el) {
    const elementId = el.getAttribute('data-element-id');
    if (!elementId || seen.has(elementId)) return;
    seen.add(elementId);

    const drillable = isDrillable(elementId);
    el.setAttribute('data-drillable', drillable ? 'true' : 'false');
    if (!drillable) return;

    // Border affordance (option 2)
    let shape = null;
    const tag = String(el.tagName || '').toLowerCase();
    if (tag === 'rect' || tag === 'path' || tag === 'polygon') {
      shape = el;
    } else {
      shape = el.querySelector('rect, path, polygon');
    }
    if (shape) {
      shape.setAttribute('stroke', drillStrokeColor);
      const current = parseFloat(shape.getAttribute('stroke-width') || '1.2');
      shape.setAttribute('stroke-width', String(Math.max(1.8, current)));
    }

    // Corner badge affordance (option 1)
    const box = elementBBox(el);
    if (!box || box.width < 8 || box.height < 8) return;
    const bx = Number.isFinite(box.x) ? box.x : 0;
    const by = Number.isFinite(box.y) ? box.y : 0;
    const bw = Number.isFinite(box.width) ? box.width : 0;

    const badgeInset = 14;
    const badge = buildCornerBadge(bx + bw - badgeInset, by + badgeInset);
    badge.setAttribute('data-drill-badge-for', elementId);
    svg.appendChild(badge);
  });
}

function wireSvgInteractions(svg, view) {
  svg.querySelectorAll('[data-element-id]').forEach(function (el) {
    if (el.getAttribute('data-element-id') === state.selectedId) {
      el.setAttribute('data-selected', 'true');
    } else {
      el.removeAttribute('data-selected');
    }

    if (!el.getAttribute('data-view-id')) {
      el.setAttribute('data-view-id', view.id);
    }
    if (!el.getAttribute('data-target-label')) {
      el.setAttribute('data-target-label', el.getAttribute('data-element-id') || 'element');
    }
  });

  svg.querySelectorAll('[data-relationship-id]').forEach(function (el) {
    if (!el.getAttribute('data-view-id')) {
      el.setAttribute('data-view-id', view.id);
    }
    if (!el.getAttribute('data-target-label')) {
      el.setAttribute('data-target-label', el.getAttribute('data-relationship-id') || 'relationship');
    }
  });

  applyDrillabilityAffordances(svg);

  svg.addEventListener('click', function (ev) {
    const element = ev.target.closest('[data-element-id]');
    const rel = ev.target.closest('[data-relationship-id]');

    if (state.commentMode) {
      ev.preventDefault();
      const target = element
        ? {
            view_id: view.id,
            element_id: element.dataset.elementId,
            relationship_id: null,
            target_label: element.dataset.targetLabel || element.dataset.elementId,
          }
        : rel
        ? {
            view_id: view.id,
            element_id: null,
            relationship_id: rel.dataset.relationshipId || null,
            target_label: rel.dataset.targetLabel || rel.dataset.relationshipId || 'relationship',
          }
        : {
            view_id: view.id,
            element_id: null,
            relationship_id: null,
            target_label: 'canvas',
          };
      openCommentDialog(target);
      return;
    }

    if (!element) {
      state.selectedId = null;
      updateDetails();
      render();
      return;
    }

    const id = element.dataset.elementId;
    const nextView = (DATA.drill_map || {})[id];
    if (nextView && viewsById.has(nextView) && nextView !== state.viewId) {
      state.history.push(state.viewId);
      state.viewId = nextView;
      state.selectedId = null;
      render();
      return;
    }

    state.selectedId = id;
    state.detailsOpen = true;
    updateDetails();
    render();
  });
}

function drawDiagramView(view) {
  const host = $('canvas');
  host.innerHTML = '';

  const provided = normalizeSvgFragment(view.svg_fragment);
  if (provided) {
    const wrap = document.createElement('div');
    wrap.innerHTML = provided;
    const svg = wrap.querySelector('svg');
    if (svg) {
      svg.style.display = 'block';
      svg.style.width = '100%';
      svg.style.height = 'auto';
      svg.style.maxWidth = '100%';
      svg.style.cursor = state.commentMode ? 'crosshair' : 'default';
      if (!svg.getAttribute('data-view-id')) {
        svg.setAttribute('data-view-id', view.id);
      }
      stripConfidenceLabelsFromSvg(svg);
      applySvgTheme(svg, view);
      wireSvgInteractions(svg, view);
      host.appendChild(svg);
      return;
    }
  }

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  const layout = layoutNodes(view.nodes || [], view.edges || [], view.type || 'generic');
  const width = layout.width;
  const height = layout.height;
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(height));
  svg.style.display = 'block';
  svg.style.width = '100%';
  svg.style.height = 'auto';
  svg.style.maxWidth = '100%';
  svg.style.cursor = state.commentMode ? 'crosshair' : 'default';

  (layout.lanes || []).forEach(function (lane) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(lane.x));
    rect.setAttribute('y', String(lane.y));
    rect.setAttribute('width', String(lane.w));
    rect.setAttribute('height', String(lane.h));
    rect.setAttribute('rx', '12');
    rect.setAttribute('fill', lane.fill || hexToRgba(THEME.slateNeutral, 0.08));
    rect.setAttribute('stroke', lane.stroke || scaffoldStrokeColor);
    rect.setAttribute('stroke-width', '1');
    rect.setAttribute('stroke-dasharray', lane.dash || '');
    g.appendChild(rect);

    if (lane.label) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(lane.x + 10));
      text.setAttribute('y', String(lane.y + 14));
      text.setAttribute('font-size', '10');
      text.setAttribute('font-weight', '700');
      text.setAttribute('fill', lane.labelColor || THEME.textSecondary);
      text.textContent = lane.label;
      g.appendChild(text);
    }

    svg.appendChild(g);
  });

  // edges
  (view.edges || []).forEach(function (edge) {
    const a = layout.byId.get(edge.source_id);
    const b = layout.byId.get(edge.target_id);
    if (!a || !b) return;

    const x1 = a.x + a.w / 2;
    const y1 = a.y + a.h / 2;
    const x2 = b.x + b.w / 2;
    const y2 = b.y + b.h / 2;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', String(x1));
    line.setAttribute('y1', String(y1));
    line.setAttribute('x2', String(x2));
    line.setAttribute('y2', String(y2));
    line.setAttribute('stroke', edgeColor);
    line.setAttribute(
      'stroke-width',
      state.selectedId && (edge.source_id === state.selectedId || edge.target_id === state.selectedId)
        ? String(relationshipStrokeWidthSelected)
        : String(relationshipStrokeWidth)
    );
    line.setAttribute('opacity', '0.9');
    svg.appendChild(line);

    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    hit.setAttribute('x1', String(x1));
    hit.setAttribute('y1', String(y1));
    hit.setAttribute('x2', String(x2));
    hit.setAttribute('y2', String(y2));
    hit.setAttribute('stroke', state.commentMode ? 'transparent' : 'transparent');
    hit.setAttribute('stroke-width', '14');
    hit.setAttribute('fill', 'none');
    hit.setAttribute('data-relationship-id', edge.id || '');
    hit.setAttribute('data-view-id', view.id);
    hit.setAttribute('data-target-label', edge.label || edge.id || 'relationship');
    svg.appendChild(hit);

    if (MODE === 'rich' && edge.label) {
      const tx = (x1 + x2) / 2;
      const ty = (y1 + y2) / 2;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(tx));
      text.setAttribute('y', String(ty));
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('font-size', '10');
      text.setAttribute('fill', THEME.textSecondary);
      text.textContent = edge.label.length > 42 ? edge.label.slice(0, 42) + '…' : edge.label;
      svg.appendChild(text);
    }
  });

  // nodes
  (view.nodes || []).forEach(function (node) {
    const box = layout.byId.get(node.id);
    if (!box) return;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('data-element-id', node.id);
    g.setAttribute('data-view-id', view.id);
    g.setAttribute('data-target-label', node.name || node.id);
    g.style.cursor = state.commentMode ? 'crosshair' : 'pointer';

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(box.x));
    rect.setAttribute('y', String(box.y));
    rect.setAttribute('width', String(box.w));
    rect.setAttribute('height', String(box.h));
    rect.setAttribute('rx', '10');
    rect.setAttribute('fill', state.selectedId === node.id ? mixHex(colorForKind(node.kind), THEME.textPrimary, 0.12) : colorForKind(node.kind));
    rect.setAttribute('stroke', state.selectedId === node.id ? THEME.textPrimary : mixHex(colorForKind(node.kind), THEME.textPrimary, 0.24));
    rect.setAttribute('stroke-width', state.selectedId === node.id ? '2.2' : '1.1');
    g.appendChild(rect);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', String(box.x + box.w / 2));
    text.setAttribute('y', String(box.y + box.h / 2 - 4));
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('font-size', '12');
    text.setAttribute('font-weight', '600');
    text.setAttribute('fill', THEME.textPrimary);
    text.setAttribute('pointer-events', 'none');
    text.textContent = truncate(node.name || node.id, MODE === 'fast' ? 24 : 34);
    g.appendChild(text);

    const subtitle = fallbackNodeSubtitle(node);
    if (MODE === 'rich' && subtitle) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('x', String(box.x + box.w / 2));
      sub.setAttribute('y', String(box.y + box.h / 2 + 11));
      sub.setAttribute('text-anchor', 'middle');
      sub.setAttribute('dominant-baseline', 'middle');
      sub.setAttribute('font-size', '9');
      sub.setAttribute('fill', THEME.textDiagramSubtitle);
      sub.setAttribute('pointer-events', 'none');
      sub.textContent = truncate(subtitle, 24);
      g.appendChild(sub);
    }

    if (isDrillable(node.id)) {
      rect.setAttribute('stroke', drillStrokeColor);
      rect.setAttribute('stroke-width', String(Math.max(1.8, parseFloat(rect.getAttribute('stroke-width') || '1.2'))));
      g.setAttribute('data-drillable', 'true');

      const badgeInset = 14;
      const badge = buildCornerBadge(box.x + box.w - badgeInset, box.y + badgeInset);
      badge.setAttribute('data-drill-badge-for', node.id);
      g.appendChild(badge);
    }

    svg.appendChild(g);
  });

  wireSvgInteractions(svg, view);
  host.appendChild(svg);
}

function drawSequenceView(view) {
  const host = $('canvas');
  host.innerHTML = '';

  const provided = normalizeSvgFragment(view.svg_fragment);
  if (provided) {
    const wrap = document.createElement('div');
    wrap.innerHTML = provided;
    const svg = wrap.querySelector('svg');
    if (svg) {
      svg.style.display = 'block';
      svg.style.width = '100%';
      svg.style.height = 'auto';
      svg.style.maxWidth = '100%';
      svg.style.cursor = state.commentMode ? 'crosshair' : 'default';
      if (!svg.getAttribute('data-view-id')) {
        svg.setAttribute('data-view-id', view.id);
      }
      stripConfidenceLabelsFromSvg(svg);
      applySvgTheme(svg, view);
      wireSvgInteractions(svg, view);
      host.appendChild(svg);
      return;
    }
  }

  const box = document.createElement('div');
  box.style.padding = '8px';

  const title = document.createElement('div');
  title.textContent = view.title || 'Sequence';
  title.style.fontWeight = '700';
  title.style.marginBottom = '10px';
  title.style.color = THEME.textPrimary;
  box.appendChild(title);

  const list = document.createElement('div');
  (view.steps || []).forEach(function (s) {
    const row = document.createElement('div');
    row.style.border = '1px solid ' + THEME.line;
    row.style.borderRadius = '8px';
    row.style.padding = '8px';
    row.style.marginBottom = '6px';
    row.style.background = THEME.bgSecondary;
    row.style.fontSize = '12px';

    const step = document.createElement('div');
    step.style.color = THEME.textSecondary;
    step.style.fontSize = '11px';
    step.textContent = '#' + s.order + '  ' + (s.source_id || '?') + ' → ' + (s.target_id || '?');
    row.appendChild(step);

    const label = document.createElement('div');
    label.style.marginTop = '3px';
    label.style.color = THEME.textPrimary;
    label.textContent = s.label || '';
    row.appendChild(label);

    list.appendChild(row);
  });
  box.appendChild(list);
  host.appendChild(box);
}

function nodeLane(node) {
  const kind = String(node.kind || '').toLowerCase();
  if (kind === 'person' || kind === 'external_system' || kind === 'external_actor' || kind === 'actor') return 'external';
  if (kind === 'database' || kind === 'datastore' || kind === 'queue' || kind === 'cache') return 'storage';
  if (kind === 'software_system' || kind === 'system' || kind === 'container' || kind === 'component') return 'internal';
  return 'internal';
}

function sortByName(list) {
  return list.slice().sort(function (a, b) {
    return (a.name || a.id || '').localeCompare(b.name || b.id || '');
  });
}

function layoutNodes(nodes, edges, viewType) {
  const sorted = sortByName(nodes || []);
  const byId = new Map();
  const lanes = [];

  const cardW = MODE === 'fast' ? 186 : 214;
  const cardH = MODE === 'fast' ? 68 : 80;
  const pad = 28;
  const gapX = MODE === 'fast' ? 24 : 34;
  const gapY = MODE === 'fast' ? 26 : 36;

  const external = [];
  const storage = [];
  const internal = [];

  sorted.forEach(function (n) {
    const lane = nodeLane(n);
    if (lane === 'external') external.push(n);
    else if (lane === 'storage') storage.push(n);
    else internal.push(n);
  });

  // system-context gets a tailored shape: system center, actors/systems on sides.
  if (viewType === 'system_context') {
    const systems = internal.filter(function (n) {
      const k = String(n.kind || '').toLowerCase();
      return k === 'software_system' || k === 'system';
    });
    const others = internal.filter(function (n) {
      const k = String(n.kind || '').toLowerCase();
      return !(k === 'software_system' || k === 'system');
    });

    const people = external.filter(function (n) { return String(n.kind || '').toLowerCase() === 'person'; });
    const extSystems = external.filter(function (n) { return String(n.kind || '').toLowerCase() !== 'person'; });

    const centerNodes = systems.length ? systems : others;
    const width = Math.max(980, 340 + (Math.max(people.length, extSystems.length, 1) * (cardH + 20)));
    const height = Math.max(560, 210 + (Math.max(people.length, extSystems.length, centerNodes.length, 1) * (cardH + 18)));

    const centerX = Math.floor(width / 2 - cardW / 2);
    const centerStartY = Math.floor(height / 2 - ((centerNodes.length * (cardH + 18) - 18) / 2));
    centerNodes.forEach(function (n, i) {
      byId.set(n.id, { x: centerX, y: centerStartY + i * (cardH + 18), w: cardW + 26, h: cardH + 6 });
    });

    const leftStartY = Math.floor(height / 2 - ((people.length * (cardH + 18) - 18) / 2));
    people.forEach(function (n, i) {
      byId.set(n.id, { x: pad, y: leftStartY + i * (cardH + 18), w: cardW, h: cardH });
    });

    const rightStartY = Math.floor(height / 2 - ((extSystems.length * (cardH + 18) - 18) / 2));
    extSystems.forEach(function (n, i) {
      byId.set(n.id, { x: width - pad - cardW, y: rightStartY + i * (cardH + 18), w: cardW, h: cardH });
    });

    lanes.push(
      { x: 14, y: 14, w: 250, h: height - 28, label: 'External actors', fill: hexToRgba(THEME.blueMuted, 0.12), stroke: mixHex(THEME.blueMuted, THEME.textPrimary, 0.12), labelColor: THEME.textPrimary },
      { x: centerX - 20, y: 14, w: cardW + 66, h: height - 28, label: 'System', fill: hexToRgba(THEME.purpleDusty, 0.12), stroke: mixHex(THEME.purpleDusty, THEME.textPrimary, 0.12), labelColor: THEME.textPrimary },
      { x: width - 264, y: 14, w: 250, h: height - 28, label: 'External systems', fill: hexToRgba(THEME.amberWarm, 0.11), stroke: mixHex(THEME.amberWarm, THEME.textPrimary, 0.12), labelColor: THEME.textPrimary }
    );

    return { byId: byId, width: width, height: height, lanes: lanes };
  }

  if (MODE === 'fast') {
    const width = Math.max(980, pad * 2 + Math.max(external.length, internal.length, storage.length, 2) * (cardW + gapX));

    const placeRow = function (row, y, centered) {
      if (!row.length) return;
      const contentW = row.length * (cardW + gapX) - gapX;
      const startX = centered ? Math.max(pad, Math.floor((width - contentW) / 2)) : pad;
      row.forEach(function (n, i) {
        byId.set(n.id, { x: startX + i * (cardW + gapX), y: y, w: cardW, h: cardH });
      });
    };

    const extY = pad + 22;
    placeRow(external, extY, true);

    const internalRows = Math.max(1, Math.ceil(internal.length / Math.max(2, Math.ceil(Math.sqrt(internal.length || 1)))));
    const cols = Math.max(2, Math.ceil((internal.length || 1) / internalRows));
    const intStartY = extY + cardH + 62;
    internal.forEach(function (n, idx) {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const rowWidth = Math.min(cols, internal.length - row * cols) * (cardW + gapX) - gapX;
      const startX = Math.max(pad, Math.floor((width - rowWidth) / 2));
      byId.set(n.id, { x: startX + col * (cardW + gapX), y: intStartY + row * (cardH + gapY), w: cardW, h: cardH });
    });

    const intHeight = Math.max(cardH + 24, internalRows * (cardH + gapY) - gapY + 24);
    const storageY = intStartY + intHeight + 36;
    placeRow(storage, storageY, true);

    const height = Math.max(560, storageY + cardH + 44);

    lanes.push(
      { x: 14, y: extY - 16, w: width - 28, h: cardH + 36, label: 'External', fill: hexToRgba(THEME.amberWarm, 0.10), stroke: mixHex(THEME.amberWarm, THEME.textPrimary, 0.08), labelColor: THEME.textPrimary },
      { x: 14, y: intStartY - 16, w: width - 28, h: intHeight + 30, label: 'Application', fill: hexToRgba(THEME.greenMuted, 0.12), stroke: mixHex(THEME.greenMuted, THEME.textPrimary, 0.08), labelColor: THEME.textPrimary },
      { x: 14, y: storageY - 16, w: width - 28, h: cardH + 36, label: 'Data & Messaging', fill: hexToRgba(THEME.slateNeutral, 0.12), stroke: mixHex(THEME.slateNeutral, THEME.textPrimary, 0.08), labelColor: THEME.textPrimary }
    );

    return { byId: byId, width: width, height: height, lanes: lanes };
  }

  // rich mode: layered graph for internal nodes + explicit lanes.
  const internalIds = new Set(internal.map(function (n) { return n.id; }));
  const graphEdges = (edges || []).filter(function (e) {
    return internalIds.has(e.source_id) && internalIds.has(e.target_id);
  });

  const rank = {};
  internal.forEach(function (n) { rank[n.id] = 0; });

  for (let i = 0; i < internal.length; i += 1) {
    let changed = false;
    graphEdges.forEach(function (e) {
      const next = (rank[e.source_id] || 0) + 1;
      if (next > (rank[e.target_id] || 0)) {
        rank[e.target_id] = next;
        changed = true;
      }
    });
    if (!changed) break;
  }

  const ranks = new Map();
  internal.forEach(function (n) {
    const r = rank[n.id] || 0;
    if (!ranks.has(r)) ranks.set(r, []);
    ranks.get(r).push(n);
  });

  const maxRank = Math.max(0, ...Array.from(ranks.keys()));

  const predecessors = {};
  const successors = {};
  internal.forEach(function (n) { predecessors[n.id] = []; successors[n.id] = []; });
  graphEdges.forEach(function (e) {
    predecessors[e.target_id].push(e.source_id);
    successors[e.source_id].push(e.target_id);
  });

  const orderPos = {};
  const setOrderPos = function () {
    ranks.forEach(function (arr) {
      arr.forEach(function (n, idx) { orderPos[n.id] = idx; });
    });
  };

  setOrderPos();
  for (let sweep = 0; sweep < 4; sweep += 1) {
    for (let r = 1; r <= maxRank; r += 1) {
      const arr = ranks.get(r) || [];
      arr.sort(function (a, b) {
        const pa = predecessors[a.id] || [];
        const pb = predecessors[b.id] || [];
        const ba = pa.length ? pa.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / pa.length : orderPos[a.id] || 0;
        const bb = pb.length ? pb.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / pb.length : orderPos[b.id] || 0;
        return ba - bb;
      });
      ranks.set(r, arr);
      setOrderPos();
    }
    for (let r = maxRank - 1; r >= 0; r -= 1) {
      const arr = ranks.get(r) || [];
      arr.sort(function (a, b) {
        const sa = successors[a.id] || [];
        const sb = successors[b.id] || [];
        const ba = sa.length ? sa.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / sa.length : orderPos[a.id] || 0;
        const bb = sb.length ? sb.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / sb.length : orderPos[b.id] || 0;
        return ba - bb;
      });
      ranks.set(r, arr);
      setOrderPos();
    }
  }

  const cols = maxRank + 1;
  const internalContentW = cols * (cardW + gapX) - gapX;
  const maxPerRank = Math.max(1, ...Array.from(ranks.values()).map(function (arr) { return arr.length; }));
  const internalContentH = maxPerRank * (cardH + gapY) - gapY;

  const width = Math.max(1040, pad * 2 + Math.max(internalContentW, external.length * (cardW + gapX), storage.length * (cardW + gapX)));

  const extY = pad + 20;
  const intY = extY + cardH + 58;
  const storageY = intY + internalContentH + 56;
  const height = Math.max(620, storageY + cardH + 50);

  const placeCenteredRow = function (row, y) {
    if (!row.length) return;
    const contentW = row.length * (cardW + gapX) - gapX;
    const startX = Math.max(pad, Math.floor((width - contentW) / 2));
    row.forEach(function (n, i) {
      byId.set(n.id, { x: startX + i * (cardW + gapX), y: y, w: cardW, h: cardH });
    });
  };

  placeCenteredRow(external, extY);
  placeCenteredRow(storage, storageY);

  const startX = Math.max(pad, Math.floor((width - internalContentW) / 2));
  for (let r = 0; r <= maxRank; r += 1) {
    const arr = ranks.get(r) || [];
    const colX = startX + r * (cardW + gapX);
    const contentH = arr.length * (cardH + gapY) - gapY;
    const startY = intY + Math.max(0, Math.floor((internalContentH - contentH) / 2));
    arr.forEach(function (n, idx) {
      byId.set(n.id, { x: colX, y: startY + idx * (cardH + gapY), w: cardW, h: cardH });
    });
  }

  lanes.push(
    { x: 14, y: extY - 16, w: width - 28, h: cardH + 36, label: 'External', fill: hexToRgba(THEME.amberWarm, 0.10), stroke: mixHex(THEME.amberWarm, THEME.textPrimary, 0.08), labelColor: THEME.textPrimary },
    { x: 14, y: intY - 16, w: width - 28, h: internalContentH + 34, label: 'Application graph (layered)', fill: hexToRgba(THEME.greenMuted, 0.12), stroke: mixHex(THEME.greenMuted, THEME.textPrimary, 0.08), labelColor: THEME.textPrimary },
    { x: 14, y: storageY - 16, w: width - 28, h: cardH + 36, label: 'Data & Messaging', fill: hexToRgba(THEME.slateNeutral, 0.12), stroke: mixHex(THEME.slateNeutral, THEME.textPrimary, 0.08), labelColor: THEME.textPrimary }
  );

  return { byId: byId, width: width, height: height, lanes: lanes };
}

function updateDetails() {
  const pane = $('detailsBody');
  if (!state.selectedId) {
    pane.innerHTML = '<div class="empty-note">Click a node to inspect details</div>';
    return;
  }
  const node = nodesById.get(state.selectedId);
  if (!node) {
    pane.innerHTML = '<div class="empty-note">Selected node missing from model</div>';
    return;
  }

  const rels = [];
  (DATA.views || []).forEach(function (v) {
    (v.edges || []).forEach(function (e) {
      if (e.source_id === node.id || e.target_id === node.id) rels.push(e);
    });
  });

  const html = [];
  html.push('<div style="font-size:15px;font-weight:700;color:' + THEME.textPrimary + '">' + esc(node.name || node.id) + '</div>');

  if (node.description) html.push('<div class="meta-label">Description</div><div>' + esc(node.description) + '</div>');
  html.push('<div class="meta-label">Kind</div><div class="chip">' + esc(node.kind || 'unknown') + '</div>');
  if (node.technology) html.push('<div class="meta-label">Technology</div><div>' + esc(node.technology) + '</div>');
  if (node.confidence) html.push('<div class="meta-label">Confidence</div><div class="chip">' + esc(node.confidence) + '</div>');

  if ((node.tags || []).length) {
    html.push('<div class="meta-label">Tags</div>');
    node.tags.forEach(function (t) { html.push('<span class="chip">' + esc(t) + '</span>'); });
  }

  if (rels.length) {
    html.push('<div class="meta-label">Relationships</div>');
    rels.slice(0, 20).forEach(function (r) {
      html.push('<div style="margin-bottom:6px;border:1px solid ' + THEME.line + ';border-radius:8px;padding:6px;background:' + THEME.bgTertiary + '">'
        + '<div style="color:' + THEME.textSecondary + ';font-size:11px">' + esc(r.source_id) + ' → ' + esc(r.target_id) + '</div>'
        + '<div>' + esc(r.label || r.id || '') + '</div>'
        + '</div>');
    });
  }

  pane.innerHTML = html.join('');
}

function updateQueue() {
  const bar = $('queueBar');
  const items = $('queueItems');
  items.innerHTML = '';

  if (!state.comments.length) {
    bar.className = 'queue';
    $('submitBtn').disabled = true;
    return;
  }

  state.comments.forEach(function (c) {
    const div = document.createElement('div');
    div.className = 'queue-item';

    const text = document.createElement('span');
    text.className = 'queue-item-text';
    text.textContent = (c.target_label || 'target') + ': ' + c.comment;

    const remove = document.createElement('button');
    remove.className = 'queue-remove';
    remove.type = 'button';
    remove.setAttribute('aria-label', 'Remove queued comment');
    remove.textContent = '×';
    remove.addEventListener('click', function () {
      const idx = state.comments.indexOf(c);
      if (idx === -1) return;
      state.comments.splice(idx, 1);
      updateQueue();
    });

    div.appendChild(remove);
    div.appendChild(text);
    items.appendChild(div);
  });

  $('submitBtn').disabled = false;
  bar.className = 'queue show';
}

function openCommentDialog(target) {
  state.pendingTarget = target;
  $('commentTarget').innerHTML =
    'view_id: <code>' + esc(String(target.view_id)) + '</code> · '
    + 'element_id: <code>' + esc(String(target.element_id)) + '</code> · '
    + 'relationship_id: <code>' + esc(String(target.relationship_id)) + '</code>';
  $('commentText').value = '';
  $('commentDialogOverlay').className = 'overlay show';
  $('commentText').focus();
}

function closeCommentDialog() {
  $('commentDialogOverlay').className = 'overlay';
  state.pendingTarget = null;
}

function submitPayload() {
  const payload = {
    system_name: DATA.system_name,
    mode: MODE,
    comments: state.comments.map(function (c, i) {
      return {
        index: i + 1,
        view_id: c.view_id,
        element_id: c.element_id,
        relationship_id: c.relationship_id,
        target_label: c.target_label || null,
        comment: c.comment,
      };
    }),
  };
  const text = JSON.stringify(payload, null, 2);
  $('payloadPre').textContent = text;
  $('payloadOverlay').className = 'overlay show';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;');
}

function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function render() {
  updateHeader();
  updateTabs();
  updateDetails();
  updateQueue();

  const ws = $('workspace');
  if (ws) {
    ws.className = state.detailsOpen ? 'workspace details-open' : 'workspace';
  }

  const view = currentView();
  if (!view) return;

  if (view.kind === 'sequence') drawSequenceView(view);
  else drawDiagramView(view);
}

$('commentToggle').addEventListener('click', function () {
  state.commentMode = !state.commentMode;
  render();
});

$('detailsCollapseBtn').addEventListener('click', function () {
  state.detailsOpen = false;
  state.selectedId = null;
  render();
});

$('submitBtn').addEventListener('click', submitPayload);

$('commentCancel').addEventListener('click', closeCommentDialog);
$('commentDialogOverlay').addEventListener('click', function (e) {
  if (e.target === $('commentDialogOverlay')) closeCommentDialog();
});

$('commentAdd').addEventListener('click', function () {
  const txt = $('commentText').value.trim();
  if (!txt || !state.pendingTarget) return;
  state.comments.push({
    view_id: state.pendingTarget.view_id,
    element_id: state.pendingTarget.element_id,
    relationship_id: state.pendingTarget.relationship_id,
    target_label: state.pendingTarget.target_label,
    comment: txt,
  });
  closeCommentDialog();
  updateQueue();
});

$('payloadClose').addEventListener('click', function () {
  $('payloadOverlay').className = 'overlay';
});

$('payloadOverlay').addEventListener('click', function (e) {
  if (e.target === $('payloadOverlay')) $('payloadOverlay').className = 'overlay';
});

$('payloadCopy').addEventListener('click', async function () {
  try {
    await navigator.clipboard.writeText($('payloadPre').textContent || '');
  } catch (err) {
    // ignore clipboard failures in restricted environments
  }
});

document.addEventListener('keydown', function (e) {
  if (e.key.toLowerCase() === 'c' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    state.commentMode = !state.commentMode;
    render();
  }
  if (e.key === 'Escape') {
    closeCommentDialog();
    $('payloadOverlay').className = 'overlay';
  }
});

render();
</script>
</body>
</html>
