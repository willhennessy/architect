<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architecture Diagram</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #101a2f;
      --ink: #e6eeff;
      --muted: #8fa4cb;
      --line: #27406f;
      --accent: #5fd4ff;
      --accent-2: #8a6dff;
      --warn: #ffbd59;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #132449 0%, var(--bg) 58%);
      color: var(--ink);
      min-height: 100vh;
    }

    #app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #263f6f;
      background: rgba(11, 18, 32, 0.88);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .title {
      font-weight: 700;
      font-size: 14px;
    }

    .mode-badge {
      font-size: 10px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #061629;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      padding: 3px 7px;
      border-radius: 999px;
      font-weight: 700;
    }

    .breadcrumbs {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .crumb {
      cursor: pointer;
      color: #b9c9e8;
    }

    .crumb.current { color: #fff; cursor: default; }

    .tabbar {
      padding: 0 14px;
      border-bottom: 1px solid #22385f;
      background: rgba(11, 18, 32, 0.65);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 10px 11px;
      font-size: 12px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }

    .tab.active {
      color: #fff;
      border-bottom-color: var(--accent);
    }

    .toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid #22385f;
      background: rgba(11, 18, 32, 0.55);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 1px solid #35558f;
      background: #14264a;
      color: var(--ink);
      border-radius: 9px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    button:disabled { opacity: .5; cursor: default; }

    .comment-toggle.on {
      color: #1f1200;
      border-color: transparent;
      background: linear-gradient(135deg, #ffd07b, #ffad42);
      font-weight: 700;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px;
      transition: grid-template-columns 140ms ease;
    }

    .workspace.details-open {
      grid-template-columns: 1fr 320px;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      border: 1px solid #2a446f;
      border-radius: 14px;
      background: linear-gradient(180deg, #0f1a31 0%, #0b1428 100%);
      overflow: hidden;
    }

    #canvas {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 14px;
    }

    .hint {
      position: absolute;
      right: 10px;
      top: 10px;
      font-size: 11px;
      color: #ffe2a6;
      background: rgba(72, 48, 0, 0.6);
      border: 1px solid #946300;
      border-radius: 8px;
      padding: 4px 8px;
      display: none;
    }

    .hint.show { display: block; }

    #details {
      border: 1px solid #2a446f;
      border-radius: 14px;
      background: #101a2f;
      overflow: hidden;
      font-size: 12px;
      display: none;
      min-width: 0;
    }

    .workspace.details-open #details {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .details-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #2a446f;
      background: #0f1a30;
    }

    .details-title {
      font-size: 11px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #9fb7e2;
      font-weight: 700;
    }

    #detailsBody {
      overflow: auto;
      padding: 12px;
      min-height: 0;
    }

    .details-collapse-btn {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 8px;
    }

    .empty-note { color: var(--muted); text-align: center; padding-top: 40px; }

    .meta-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-top: 12px;
      margin-bottom: 4px;
    }

    .chip {
      display: inline-block;
      border: 1px solid #35558f;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 10px;
      margin-right: 4px;
      margin-top: 3px;
      color: #cbe0ff;
      background: #14284f;
    }

    .queue {
      border-top: 1px solid #2b456f;
      background: #0f1a2f;
      padding: 8px 14px;
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .queue.show { display: flex; }

    .queue-items {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .queue-item {
      border: 1px solid #5f4a15;
      background: #312507;
      color: #ffdca0;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 11px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 7, 14, .55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .overlay.show { display: flex; }

    .dialog {
      width: min(720px, 96vw);
      max-height: 86vh;
      overflow: auto;
      border: 1px solid #395e9c;
      border-radius: 12px;
      background: #0d172a;
      padding: 12px;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      border-radius: 8px;
      border: 1px solid #3c5f9f;
      background: #0a1324;
      color: #ecf3ff;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }

    pre {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #35558f;
      background: #081024;
      color: #89ffb6;
      font-size: 11px;
      line-height: 1.45;
      overflow: auto;
      white-space: pre-wrap;
    }

    .dialog-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    svg text { user-select: none; }
    svg [data-element-id] { cursor: pointer; }
    .comment-mode-on svg [data-element-id],
    .comment-mode-on svg [data-relationship-id] { cursor: crosshair; }
    svg [data-element-id][data-selected='true'] {
      filter: drop-shadow(0 0 5px rgba(255, 208, 114, 0.95));
    }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="title" id="systemName"></div>
    <span class="mode-badge" id="modeBadge"></span>
    <div class="breadcrumbs" id="breadcrumbs"></div>
  </div>
  <div class="tabbar" id="tabs"></div>
  <div class="toolbar">
    <button id="commentToggle" class="comment-toggle">Comment (C)</button>
    <button id="submitBtn" disabled>Submit comments</button>
  </div>
  <div class="workspace" id="workspace">
    <div class="canvas-wrap">
      <div class="hint" id="commentHint">Comment mode: click node, edge, or canvas</div>
      <div id="canvas"></div>
    </div>
    <aside id="details" aria-label="Details sidebar">
      <div class="details-header">
        <div class="details-title">Details</div>
        <button id="detailsCollapseBtn" class="details-collapse-btn" title="Collapse details sidebar">Collapse</button>
      </div>
      <div id="detailsBody"><div class="empty-note">Click a node to inspect details</div></div>
    </aside>
  </div>
  <div class="queue" id="queueBar">
    <strong style="font-size:11px;color:#ffdca0">Queued</strong>
    <div class="queue-items" id="queueItems"></div>
  </div>
</div>

<div class="overlay" id="commentDialogOverlay">
  <div class="dialog">
    <h3 style="margin:0 0 8px;font-size:14px">Add comment</h3>
    <div id="commentTarget" style="font-size:12px;color:#abc0e5;margin-bottom:8px"></div>
    <textarea id="commentText" placeholder="Type feedback..."></textarea>
    <div class="dialog-actions">
      <button id="commentCancel">Cancel</button>
      <button id="commentAdd">Add comment</button>
    </div>
  </div>
</div>

<div class="overlay" id="payloadOverlay">
  <div class="dialog">
    <h3 style="margin:0 0 8px;font-size:14px">Comment payload (JSON)</h3>
    <p style="font-size:12px;color:#abc0e5;margin:0 0 8px">Copy this JSON and paste it into your coding agent.</p>
    <pre id="payloadPre"></pre>
    <div class="dialog-actions">
      <button id="payloadCopy">Copy</button>
      <button id="payloadClose">Close</button>
    </div>
  </div>
</div>

<script>
const DATA = __DIAGRAM_DATA_JSON__;
const MODE = "__DIAGRAM_MODE__";

const state = {
  viewId: DATA.initial_view_id,
  history: [],
  selectedId: null,
  detailsOpen: false,
  commentMode: false,
  comments: [],
  pendingTarget: null,
};

const nodesById = new Map((DATA.elements || []).map(function (e) { return [e.id, e]; }));
const viewsById = new Map((DATA.views || []).map(function (v) { return [v.id, v]; }));

const kindColor = {
  person: '#3b82f6',
  software_system: '#8b5cf6',
  external_system: '#f97316',
  container: '#16a34a',
  component: '#0ea5e9',
  database: '#334155',
  queue: '#b45309',
  cache: '#0f766e',
};

function $(id) { return document.getElementById(id); }

function currentView() { return viewsById.get(state.viewId); }

function updateHeader() {
  $('systemName').textContent = DATA.system_name || 'Architecture Diagram';
  $('modeBadge').textContent = MODE;

  const crumbs = [];
  state.history.forEach(function (viewId, idx) {
    const v = viewsById.get(viewId);
    if (!v) return;
    crumbs.push({ label: v.title || viewId, viewId: viewId, idx: idx, current: false });
  });
  const cv = currentView();
  crumbs.push({ label: (cv && cv.title) || state.viewId, viewId: state.viewId, current: true });

  const bc = $('breadcrumbs');
  bc.innerHTML = '';
  crumbs.forEach(function (c, i) {
    const span = document.createElement('span');
    span.textContent = c.label;
    span.className = c.current ? 'crumb current' : 'crumb';
    if (!c.current) {
      span.addEventListener('click', function () {
        state.history = state.history.slice(0, c.idx);
        state.viewId = c.viewId;
        state.selectedId = null;
        render();
      });
    }
    bc.appendChild(span);
    if (i < crumbs.length - 1) {
      const sep = document.createElement('span');
      sep.textContent = '›';
      sep.style.color = '#6f86ad';
      bc.appendChild(sep);
    }
  });

  $('commentHint').className = state.commentMode ? 'hint show' : 'hint';
  $('commentToggle').className = state.commentMode ? 'comment-toggle on' : 'comment-toggle';
  document.body.classList.toggle('comment-mode-on', state.commentMode);
}

function updateTabs() {
  const tabs = $('tabs');
  tabs.innerHTML = '';
  (DATA.views || []).forEach(function (view) {
    const b = document.createElement('button');
    b.className = 'tab' + (view.id === state.viewId ? ' active' : '');
    b.textContent = view.title || view.id;
    b.addEventListener('click', function () {
      state.history = [];
      state.viewId = view.id;
      state.selectedId = null;
      render();
    });
    tabs.appendChild(b);
  });
}

function normalizeSvgFragment(fragment) {
  let t = String(fragment || '').trim();
  if (!t) return '';

  if (t.startsWith('```')) {
    const lines = t.split('\n');
    lines.shift();
    if (lines.length && lines[lines.length - 1].trim() === '```') lines.pop();
    t = lines.join('\n').trim();
  }

  t = t.replace(/<script[\s\S]*?<\/script>/gi, '');
  return t;
}

function isConfidenceTokenText(text) {
  const t = String(text || '').toLowerCase().trim();
  if (!t) return false;
  const cleaned = t
    .replace(/[\[\]()]/g, '')
    .replace(/\s+/g, '_')
    .replace(/-+/g, '_');
  return cleaned === 'confirmed' || cleaned === 'strong_inference' || cleaned === 'weak_inference';
}

function stripConfidenceLabelsFromSvg(svg) {
  if (!svg) return;

  svg.querySelectorAll('[data-confidence-label], .confidence-label').forEach(function (el) {
    el.remove();
  });

  svg.querySelectorAll('text').forEach(function (textEl) {
    if (isConfidenceTokenText(textEl.textContent)) {
      textEl.remove();
    }
  });
}

function wireSvgInteractions(svg, view) {
  svg.querySelectorAll('[data-element-id]').forEach(function (el) {
    if (el.getAttribute('data-element-id') === state.selectedId) {
      el.setAttribute('data-selected', 'true');
    } else {
      el.removeAttribute('data-selected');
    }

    if (!el.getAttribute('data-view-id')) {
      el.setAttribute('data-view-id', view.id);
    }
    if (!el.getAttribute('data-target-label')) {
      el.setAttribute('data-target-label', el.getAttribute('data-element-id') || 'element');
    }
  });

  svg.querySelectorAll('[data-relationship-id]').forEach(function (el) {
    if (!el.getAttribute('data-view-id')) {
      el.setAttribute('data-view-id', view.id);
    }
    if (!el.getAttribute('data-target-label')) {
      el.setAttribute('data-target-label', el.getAttribute('data-relationship-id') || 'relationship');
    }
  });

  svg.addEventListener('click', function (ev) {
    const element = ev.target.closest('[data-element-id]');
    const rel = ev.target.closest('[data-relationship-id]');

    if (state.commentMode) {
      ev.preventDefault();
      const target = element
        ? {
            view_id: view.id,
            element_id: element.dataset.elementId,
            relationship_id: null,
            target_label: element.dataset.targetLabel || element.dataset.elementId,
          }
        : rel
        ? {
            view_id: view.id,
            element_id: null,
            relationship_id: rel.dataset.relationshipId || null,
            target_label: rel.dataset.targetLabel || rel.dataset.relationshipId || 'relationship',
          }
        : {
            view_id: view.id,
            element_id: null,
            relationship_id: null,
            target_label: 'canvas',
          };
      openCommentDialog(target);
      return;
    }

    if (!element) {
      state.selectedId = null;
      updateDetails();
      render();
      return;
    }

    const id = element.dataset.elementId;
    const nextView = (DATA.drill_map || {})[id];
    if (nextView && viewsById.has(nextView) && nextView !== state.viewId) {
      state.history.push(state.viewId);
      state.viewId = nextView;
      state.selectedId = null;
      render();
      return;
    }

    state.selectedId = id;
    state.detailsOpen = true;
    updateDetails();
    render();
  });
}

function drawDiagramView(view) {
  const host = $('canvas');
  host.innerHTML = '';

  const provided = normalizeSvgFragment(view.svg_fragment);
  if (provided) {
    const wrap = document.createElement('div');
    wrap.innerHTML = provided;
    const svg = wrap.querySelector('svg');
    if (svg) {
      svg.style.display = 'block';
      svg.style.maxWidth = 'none';
      svg.style.cursor = state.commentMode ? 'crosshair' : 'default';
      if (!svg.getAttribute('data-view-id')) {
        svg.setAttribute('data-view-id', view.id);
      }
      stripConfidenceLabelsFromSvg(svg);
      wireSvgInteractions(svg, view);
      host.appendChild(svg);
      return;
    }
  }

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  const layout = layoutNodes(view.nodes || [], view.edges || [], view.type || 'generic');
  const width = layout.width;
  const height = layout.height;
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(height));
  svg.style.display = 'block';
  svg.style.cursor = state.commentMode ? 'crosshair' : 'default';

  (layout.lanes || []).forEach(function (lane) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(lane.x));
    rect.setAttribute('y', String(lane.y));
    rect.setAttribute('width', String(lane.w));
    rect.setAttribute('height', String(lane.h));
    rect.setAttribute('rx', '12');
    rect.setAttribute('fill', lane.fill || 'rgba(20,35,65,0.45)');
    rect.setAttribute('stroke', lane.stroke || '#2c4a7a');
    rect.setAttribute('stroke-width', '1');
    rect.setAttribute('stroke-dasharray', lane.dash || '');
    g.appendChild(rect);

    if (lane.label) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(lane.x + 10));
      text.setAttribute('y', String(lane.y + 14));
      text.setAttribute('font-size', '10');
      text.setAttribute('font-weight', '700');
      text.setAttribute('fill', lane.labelColor || '#91acd8');
      text.textContent = lane.label;
      g.appendChild(text);
    }

    svg.appendChild(g);
  });

  // edges
  (view.edges || []).forEach(function (edge) {
    const a = layout.byId.get(edge.source_id);
    const b = layout.byId.get(edge.target_id);
    if (!a || !b) return;

    const x1 = a.x + a.w / 2;
    const y1 = a.y + a.h / 2;
    const x2 = b.x + b.w / 2;
    const y2 = b.y + b.h / 2;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', String(x1));
    line.setAttribute('y1', String(y1));
    line.setAttribute('x2', String(x2));
    line.setAttribute('y2', String(y2));
    line.setAttribute('stroke', '#8fa4cb');
    line.setAttribute('stroke-width', state.selectedId && (edge.source_id === state.selectedId || edge.target_id === state.selectedId) ? '2.2' : '1.4');
    line.setAttribute('opacity', '0.9');
    svg.appendChild(line);

    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    hit.setAttribute('x1', String(x1));
    hit.setAttribute('y1', String(y1));
    hit.setAttribute('x2', String(x2));
    hit.setAttribute('y2', String(y2));
    hit.setAttribute('stroke', state.commentMode ? 'transparent' : 'transparent');
    hit.setAttribute('stroke-width', '14');
    hit.setAttribute('fill', 'none');
    hit.setAttribute('data-relationship-id', edge.id || '');
    hit.setAttribute('data-view-id', view.id);
    hit.setAttribute('data-target-label', edge.label || edge.id || 'relationship');
    svg.appendChild(hit);

    if (MODE === 'rich' && edge.label) {
      const tx = (x1 + x2) / 2;
      const ty = (y1 + y2) / 2;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(tx));
      text.setAttribute('y', String(ty));
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('font-size', '10');
      text.setAttribute('fill', '#a8bcdf');
      text.textContent = edge.label.length > 42 ? edge.label.slice(0, 42) + '…' : edge.label;
      svg.appendChild(text);
    }
  });

  // nodes
  (view.nodes || []).forEach(function (node) {
    const box = layout.byId.get(node.id);
    if (!box) return;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('data-element-id', node.id);
    g.setAttribute('data-view-id', view.id);
    g.setAttribute('data-target-label', node.name || node.id);
    g.style.cursor = state.commentMode ? 'crosshair' : 'pointer';

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(box.x));
    rect.setAttribute('y', String(box.y));
    rect.setAttribute('width', String(box.w));
    rect.setAttribute('height', String(box.h));
    rect.setAttribute('rx', '10');
    rect.setAttribute('fill', state.selectedId === node.id ? '#132545' : (kindColor[node.kind] || '#1e40af'));
    rect.setAttribute('stroke', state.selectedId === node.id ? '#ffbd59' : '#d0e1ff');
    rect.setAttribute('stroke-width', state.selectedId === node.id ? '2.2' : '1.1');
    g.appendChild(rect);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', String(box.x + box.w / 2));
    text.setAttribute('y', String(box.y + box.h / 2 - 4));
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('font-size', '12');
    text.setAttribute('font-weight', '600');
    text.setAttribute('fill', '#ffffff');
    text.setAttribute('pointer-events', 'none');
    text.textContent = truncate(node.name || node.id, MODE === 'fast' ? 24 : 34);
    g.appendChild(text);

    if (MODE === 'rich' && node.technology) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('x', String(box.x + box.w / 2));
      sub.setAttribute('y', String(box.y + box.h / 2 + 11));
      sub.setAttribute('text-anchor', 'middle');
      sub.setAttribute('dominant-baseline', 'middle');
      sub.setAttribute('font-size', '9');
      sub.setAttribute('fill', '#d4e2ff');
      sub.setAttribute('pointer-events', 'none');
      sub.textContent = truncate(node.technology, 24);
      g.appendChild(sub);
    }

    if ((DATA.drill_map || {})[node.id]) {
      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      badge.setAttribute('x', String(box.x + box.w - 10));
      badge.setAttribute('y', String(box.y + 12));
      badge.setAttribute('text-anchor', 'middle');
      badge.setAttribute('font-size', '10');
      badge.setAttribute('fill', '#ffe6a9');
      badge.textContent = '↘';
      g.appendChild(badge);
    }

    svg.appendChild(g);
  });

  wireSvgInteractions(svg, view);
  host.appendChild(svg);
}

function drawSequenceView(view) {
  const host = $('canvas');
  host.innerHTML = '';

  const provided = normalizeSvgFragment(view.svg_fragment);
  if (provided) {
    const wrap = document.createElement('div');
    wrap.innerHTML = provided;
    const svg = wrap.querySelector('svg');
    if (svg) {
      svg.style.display = 'block';
      svg.style.maxWidth = 'none';
      svg.style.cursor = state.commentMode ? 'crosshair' : 'default';
      if (!svg.getAttribute('data-view-id')) {
        svg.setAttribute('data-view-id', view.id);
      }
      stripConfidenceLabelsFromSvg(svg);
      wireSvgInteractions(svg, view);
      host.appendChild(svg);
      return;
    }
  }

  const box = document.createElement('div');
  box.style.padding = '8px';

  const title = document.createElement('div');
  title.textContent = view.title || 'Sequence';
  title.style.fontWeight = '700';
  title.style.marginBottom = '10px';
  box.appendChild(title);

  const list = document.createElement('div');
  (view.steps || []).forEach(function (s) {
    const row = document.createElement('div');
    row.style.border = '1px solid #294474';
    row.style.borderRadius = '8px';
    row.style.padding = '8px';
    row.style.marginBottom = '6px';
    row.style.background = '#0d172b';
    row.style.fontSize = '12px';

    const step = document.createElement('div');
    step.style.color = '#9fb8e4';
    step.style.fontSize = '11px';
    step.textContent = '#' + s.order + '  ' + (s.source_id || '?') + ' → ' + (s.target_id || '?');
    row.appendChild(step);

    const label = document.createElement('div');
    label.style.marginTop = '3px';
    label.textContent = s.label || '';
    row.appendChild(label);

    list.appendChild(row);
  });
  box.appendChild(list);
  host.appendChild(box);
}

function nodeLane(node) {
  const kind = String(node.kind || '').toLowerCase();
  if (kind === 'person' || kind === 'external_system' || kind === 'external_actor' || kind === 'actor') return 'external';
  if (kind === 'database' || kind === 'datastore' || kind === 'queue' || kind === 'cache') return 'storage';
  if (kind === 'software_system' || kind === 'system' || kind === 'container' || kind === 'component') return 'internal';
  return 'internal';
}

function sortByName(list) {
  return list.slice().sort(function (a, b) {
    return (a.name || a.id || '').localeCompare(b.name || b.id || '');
  });
}

function layoutNodes(nodes, edges, viewType) {
  const sorted = sortByName(nodes || []);
  const byId = new Map();
  const lanes = [];

  const cardW = MODE === 'fast' ? 186 : 214;
  const cardH = MODE === 'fast' ? 68 : 80;
  const pad = 28;
  const gapX = MODE === 'fast' ? 24 : 34;
  const gapY = MODE === 'fast' ? 26 : 36;

  const external = [];
  const storage = [];
  const internal = [];

  sorted.forEach(function (n) {
    const lane = nodeLane(n);
    if (lane === 'external') external.push(n);
    else if (lane === 'storage') storage.push(n);
    else internal.push(n);
  });

  // system-context gets a tailored shape: system center, actors/systems on sides.
  if (viewType === 'system_context') {
    const systems = internal.filter(function (n) {
      const k = String(n.kind || '').toLowerCase();
      return k === 'software_system' || k === 'system';
    });
    const others = internal.filter(function (n) {
      const k = String(n.kind || '').toLowerCase();
      return !(k === 'software_system' || k === 'system');
    });

    const people = external.filter(function (n) { return String(n.kind || '').toLowerCase() === 'person'; });
    const extSystems = external.filter(function (n) { return String(n.kind || '').toLowerCase() !== 'person'; });

    const centerNodes = systems.length ? systems : others;
    const width = Math.max(980, 340 + (Math.max(people.length, extSystems.length, 1) * (cardH + 20)));
    const height = Math.max(560, 210 + (Math.max(people.length, extSystems.length, centerNodes.length, 1) * (cardH + 18)));

    const centerX = Math.floor(width / 2 - cardW / 2);
    const centerStartY = Math.floor(height / 2 - ((centerNodes.length * (cardH + 18) - 18) / 2));
    centerNodes.forEach(function (n, i) {
      byId.set(n.id, { x: centerX, y: centerStartY + i * (cardH + 18), w: cardW + 26, h: cardH + 6 });
    });

    const leftStartY = Math.floor(height / 2 - ((people.length * (cardH + 18) - 18) / 2));
    people.forEach(function (n, i) {
      byId.set(n.id, { x: pad, y: leftStartY + i * (cardH + 18), w: cardW, h: cardH });
    });

    const rightStartY = Math.floor(height / 2 - ((extSystems.length * (cardH + 18) - 18) / 2));
    extSystems.forEach(function (n, i) {
      byId.set(n.id, { x: width - pad - cardW, y: rightStartY + i * (cardH + 18), w: cardW, h: cardH });
    });

    lanes.push(
      { x: 14, y: 14, w: 250, h: height - 28, label: 'External actors', fill: 'rgba(20,52,105,0.22)', stroke: '#2c4a7a' },
      { x: centerX - 20, y: 14, w: cardW + 66, h: height - 28, label: 'System', fill: 'rgba(45,20,89,0.20)', stroke: '#5f4aa0' },
      { x: width - 264, y: 14, w: 250, h: height - 28, label: 'External systems', fill: 'rgba(120,45,8,0.16)', stroke: '#8a5f23' }
    );

    return { byId: byId, width: width, height: height, lanes: lanes };
  }

  if (MODE === 'fast') {
    const width = Math.max(980, pad * 2 + Math.max(external.length, internal.length, storage.length, 2) * (cardW + gapX));

    const placeRow = function (row, y, centered) {
      if (!row.length) return;
      const contentW = row.length * (cardW + gapX) - gapX;
      const startX = centered ? Math.max(pad, Math.floor((width - contentW) / 2)) : pad;
      row.forEach(function (n, i) {
        byId.set(n.id, { x: startX + i * (cardW + gapX), y: y, w: cardW, h: cardH });
      });
    };

    const extY = pad + 22;
    placeRow(external, extY, true);

    const internalRows = Math.max(1, Math.ceil(internal.length / Math.max(2, Math.ceil(Math.sqrt(internal.length || 1)))));
    const cols = Math.max(2, Math.ceil((internal.length || 1) / internalRows));
    const intStartY = extY + cardH + 62;
    internal.forEach(function (n, idx) {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const rowWidth = Math.min(cols, internal.length - row * cols) * (cardW + gapX) - gapX;
      const startX = Math.max(pad, Math.floor((width - rowWidth) / 2));
      byId.set(n.id, { x: startX + col * (cardW + gapX), y: intStartY + row * (cardH + gapY), w: cardW, h: cardH });
    });

    const intHeight = Math.max(cardH + 24, internalRows * (cardH + gapY) - gapY + 24);
    const storageY = intStartY + intHeight + 36;
    placeRow(storage, storageY, true);

    const height = Math.max(560, storageY + cardH + 44);

    lanes.push(
      { x: 14, y: extY - 16, w: width - 28, h: cardH + 36, label: 'External', fill: 'rgba(20,52,105,0.20)', stroke: '#2d4f83' },
      { x: 14, y: intStartY - 16, w: width - 28, h: intHeight + 30, label: 'Application', fill: 'rgba(22,87,57,0.18)', stroke: '#2b6a4a' },
      { x: 14, y: storageY - 16, w: width - 28, h: cardH + 36, label: 'Data & Messaging', fill: 'rgba(62,74,102,0.20)', stroke: '#4f6186' }
    );

    return { byId: byId, width: width, height: height, lanes: lanes };
  }

  // rich mode: layered graph for internal nodes + explicit lanes.
  const internalIds = new Set(internal.map(function (n) { return n.id; }));
  const graphEdges = (edges || []).filter(function (e) {
    return internalIds.has(e.source_id) && internalIds.has(e.target_id);
  });

  const rank = {};
  internal.forEach(function (n) { rank[n.id] = 0; });

  for (let i = 0; i < internal.length; i += 1) {
    let changed = false;
    graphEdges.forEach(function (e) {
      const next = (rank[e.source_id] || 0) + 1;
      if (next > (rank[e.target_id] || 0)) {
        rank[e.target_id] = next;
        changed = true;
      }
    });
    if (!changed) break;
  }

  const ranks = new Map();
  internal.forEach(function (n) {
    const r = rank[n.id] || 0;
    if (!ranks.has(r)) ranks.set(r, []);
    ranks.get(r).push(n);
  });

  const maxRank = Math.max(0, ...Array.from(ranks.keys()));

  const predecessors = {};
  const successors = {};
  internal.forEach(function (n) { predecessors[n.id] = []; successors[n.id] = []; });
  graphEdges.forEach(function (e) {
    predecessors[e.target_id].push(e.source_id);
    successors[e.source_id].push(e.target_id);
  });

  const orderPos = {};
  const setOrderPos = function () {
    ranks.forEach(function (arr) {
      arr.forEach(function (n, idx) { orderPos[n.id] = idx; });
    });
  };

  setOrderPos();
  for (let sweep = 0; sweep < 4; sweep += 1) {
    for (let r = 1; r <= maxRank; r += 1) {
      const arr = ranks.get(r) || [];
      arr.sort(function (a, b) {
        const pa = predecessors[a.id] || [];
        const pb = predecessors[b.id] || [];
        const ba = pa.length ? pa.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / pa.length : orderPos[a.id] || 0;
        const bb = pb.length ? pb.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / pb.length : orderPos[b.id] || 0;
        return ba - bb;
      });
      ranks.set(r, arr);
      setOrderPos();
    }
    for (let r = maxRank - 1; r >= 0; r -= 1) {
      const arr = ranks.get(r) || [];
      arr.sort(function (a, b) {
        const sa = successors[a.id] || [];
        const sb = successors[b.id] || [];
        const ba = sa.length ? sa.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / sa.length : orderPos[a.id] || 0;
        const bb = sb.length ? sb.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / sb.length : orderPos[b.id] || 0;
        return ba - bb;
      });
      ranks.set(r, arr);
      setOrderPos();
    }
  }

  const cols = maxRank + 1;
  const internalContentW = cols * (cardW + gapX) - gapX;
  const maxPerRank = Math.max(1, ...Array.from(ranks.values()).map(function (arr) { return arr.length; }));
  const internalContentH = maxPerRank * (cardH + gapY) - gapY;

  const width = Math.max(1040, pad * 2 + Math.max(internalContentW, external.length * (cardW + gapX), storage.length * (cardW + gapX)));

  const extY = pad + 20;
  const intY = extY + cardH + 58;
  const storageY = intY + internalContentH + 56;
  const height = Math.max(620, storageY + cardH + 50);

  const placeCenteredRow = function (row, y) {
    if (!row.length) return;
    const contentW = row.length * (cardW + gapX) - gapX;
    const startX = Math.max(pad, Math.floor((width - contentW) / 2));
    row.forEach(function (n, i) {
      byId.set(n.id, { x: startX + i * (cardW + gapX), y: y, w: cardW, h: cardH });
    });
  };

  placeCenteredRow(external, extY);
  placeCenteredRow(storage, storageY);

  const startX = Math.max(pad, Math.floor((width - internalContentW) / 2));
  for (let r = 0; r <= maxRank; r += 1) {
    const arr = ranks.get(r) || [];
    const colX = startX + r * (cardW + gapX);
    const contentH = arr.length * (cardH + gapY) - gapY;
    const startY = intY + Math.max(0, Math.floor((internalContentH - contentH) / 2));
    arr.forEach(function (n, idx) {
      byId.set(n.id, { x: colX, y: startY + idx * (cardH + gapY), w: cardW, h: cardH });
    });
  }

  lanes.push(
    { x: 14, y: extY - 16, w: width - 28, h: cardH + 36, label: 'External', fill: 'rgba(20,52,105,0.20)', stroke: '#2d4f83' },
    { x: 14, y: intY - 16, w: width - 28, h: internalContentH + 34, label: 'Application graph (layered)', fill: 'rgba(18,66,51,0.18)', stroke: '#2f6e54' },
    { x: 14, y: storageY - 16, w: width - 28, h: cardH + 36, label: 'Data & Messaging', fill: 'rgba(62,74,102,0.20)', stroke: '#4f6186' }
  );

  return { byId: byId, width: width, height: height, lanes: lanes };
}

function updateDetails() {
  const pane = $('detailsBody');
  if (!state.selectedId) {
    pane.innerHTML = '<div class="empty-note">Click a node to inspect details</div>';
    return;
  }
  const node = nodesById.get(state.selectedId);
  if (!node) {
    pane.innerHTML = '<div class="empty-note">Selected node missing from model</div>';
    return;
  }

  const rels = [];
  (DATA.views || []).forEach(function (v) {
    (v.edges || []).forEach(function (e) {
      if (e.source_id === node.id || e.target_id === node.id) rels.push(e);
    });
  });

  const html = [];
  html.push('<div style="font-size:15px;font-weight:700">' + esc(node.name || node.id) + '</div>');

  if (node.description) html.push('<div class="meta-label">Description</div><div>' + esc(node.description) + '</div>');
  html.push('<div class="meta-label">Kind</div><div class="chip">' + esc(node.kind || 'unknown') + '</div>');
  if (node.technology) html.push('<div class="meta-label">Technology</div><div>' + esc(node.technology) + '</div>');
  if (node.confidence) html.push('<div class="meta-label">Confidence</div><div class="chip">' + esc(node.confidence) + '</div>');

  if ((node.tags || []).length) {
    html.push('<div class="meta-label">Tags</div>');
    node.tags.forEach(function (t) { html.push('<span class="chip">' + esc(t) + '</span>'); });
  }

  if (rels.length) {
    html.push('<div class="meta-label">Relationships</div>');
    rels.slice(0, 20).forEach(function (r) {
      html.push('<div style="margin-bottom:6px;border:1px solid #294474;border-radius:8px;padding:6px">'
        + '<div style="color:#9db7e2;font-size:11px">' + esc(r.source_id) + ' → ' + esc(r.target_id) + '</div>'
        + '<div>' + esc(r.label || r.id || '') + '</div>'
        + '</div>');
    });
  }

  pane.innerHTML = html.join('');
}

function updateQueue() {
  const bar = $('queueBar');
  const items = $('queueItems');
  items.innerHTML = '';

  if (!state.comments.length) {
    bar.className = 'queue';
    $('submitBtn').disabled = true;
    return;
  }

  state.comments.forEach(function (c) {
    const div = document.createElement('div');
    div.className = 'queue-item';
    div.textContent = (c.target_label || 'target') + ': ' + c.comment;
    items.appendChild(div);
  });

  $('submitBtn').disabled = false;
  bar.className = 'queue show';
}

function openCommentDialog(target) {
  state.pendingTarget = target;
  $('commentTarget').innerHTML =
    'view_id: <code>' + esc(String(target.view_id)) + '</code> · '
    + 'element_id: <code>' + esc(String(target.element_id)) + '</code> · '
    + 'relationship_id: <code>' + esc(String(target.relationship_id)) + '</code>';
  $('commentText').value = '';
  $('commentDialogOverlay').className = 'overlay show';
  $('commentText').focus();
}

function closeCommentDialog() {
  $('commentDialogOverlay').className = 'overlay';
  state.pendingTarget = null;
}

function submitPayload() {
  const payload = {
    system_name: DATA.system_name,
    mode: MODE,
    comments: state.comments.map(function (c, i) {
      return {
        index: i + 1,
        view_id: c.view_id,
        element_id: c.element_id,
        relationship_id: c.relationship_id,
        target_label: c.target_label || null,
        comment: c.comment,
      };
    }),
  };
  const text = JSON.stringify(payload, null, 2);
  $('payloadPre').textContent = text;
  $('payloadOverlay').className = 'overlay show';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;');
}

function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function render() {
  updateHeader();
  updateTabs();
  updateDetails();
  updateQueue();

  const ws = $('workspace');
  if (ws) {
    ws.className = state.detailsOpen ? 'workspace details-open' : 'workspace';
  }

  const view = currentView();
  if (!view) return;

  if (view.kind === 'sequence') drawSequenceView(view);
  else drawDiagramView(view);
}

$('commentToggle').addEventListener('click', function () {
  state.commentMode = !state.commentMode;
  render();
});

$('detailsCollapseBtn').addEventListener('click', function () {
  state.detailsOpen = false;
  state.selectedId = null;
  render();
});

$('submitBtn').addEventListener('click', submitPayload);

$('commentCancel').addEventListener('click', closeCommentDialog);
$('commentDialogOverlay').addEventListener('click', function (e) {
  if (e.target === $('commentDialogOverlay')) closeCommentDialog();
});

$('commentAdd').addEventListener('click', function () {
  const txt = $('commentText').value.trim();
  if (!txt || !state.pendingTarget) return;
  state.comments.push({
    view_id: state.pendingTarget.view_id,
    element_id: state.pendingTarget.element_id,
    relationship_id: state.pendingTarget.relationship_id,
    target_label: state.pendingTarget.target_label,
    comment: txt,
  });
  closeCommentDialog();
  updateQueue();
});

$('payloadClose').addEventListener('click', function () {
  $('payloadOverlay').className = 'overlay';
});

$('payloadOverlay').addEventListener('click', function (e) {
  if (e.target === $('payloadOverlay')) $('payloadOverlay').className = 'overlay';
});

$('payloadCopy').addEventListener('click', async function () {
  try {
    await navigator.clipboard.writeText($('payloadPre').textContent || '');
  } catch (err) {
    // ignore clipboard failures in restricted environments
  }
});

document.addEventListener('keydown', function (e) {
  if (e.key.toLowerCase() === 'c' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    state.commentMode = !state.commentMode;
    render();
  }
  if (e.key === 'Escape') {
    closeCommentDialog();
    $('payloadOverlay').className = 'overlay';
  }
});

render();
</script>
</body>
</html>
