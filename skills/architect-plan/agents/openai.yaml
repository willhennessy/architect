interface:
  display_name: "Architecture Planning"
  short_description: "Generate planning-mode architecture artifacts before implementation"
  default_prompt: "Use $architect-plan to turn planning intent and constraints into canonical architecture artifacts using the shared output schema, then automatically run architect-diagram so the planning output includes an interactive HTML diagram (not ASCII). For demo-quality runs, use architect-diagram demo mode (no fallback) and run decision coverage + container decomposition + semantic drift checks before finalizing."

policy:
  allow_implicit_invocation: true
