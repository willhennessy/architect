  if (view.kind === 'sequence') drawSequenceView(view);
  else drawDiagramView(view);

  if (state.pendingTarget) {
    window.requestAnimationFrame(function () {
      applyCommentTargetIndicators(currentDiagramSvg());
      positionCommentDialog();
    });
  }
}

['modeExploreBtn', 'modeCommentBtn'].forEach(function (id) {
  const button = $(id);
  if (!button) return;
  button.addEventListener('click', function () {
    setMode(button.getAttribute('data-mode'), { animate: true });
  });
});

$('themeToggle').addEventListener('click', function () {
  setTheme(currentTheme() === 'dark' ? 'light' : 'dark', true);
});

$('submitBtn').addEventListener('click', submitPayload);

$('commentDialogOverlay').addEventListener('click', function (e) {
  if (isCommentEditingLocked()) return;
  if (e.target !== $('commentDialogOverlay')) return;
  const underlying = elementUnderPopoverClick(e);
  if (!underlying) return;
  if (isPendingTargetMatch(underlying)) return;
  const interactionTarget = underlyingInteractionTarget(underlying);
  if (interactionTarget) {
    const target = commentTargetFromInteractionTarget(interactionTarget);
    if (!target) return;
    openCommentDialog(target, commentAnchorFromEvent(interactionTarget, e));
    return;
  }
  if (underlying.closest('#canvas')) {
    attemptCloseCommentDialog('canvas');
  }
});

$('canvas').addEventListener('click', function (e) {
  if (isCommentEditingLocked()) return;
  if (!isCommentMode()) return;
  if (!e.target.closest('#canvas')) return;
  if (underlyingInteractionTarget(e.target)) return;
  const view = currentView();
  if (!view) return;
  e.preventDefault();
  const target = canvasCommentTarget(view);
  if (!target) return;
  openCommentDialog(target, commentAnchorForCanvasEvent(e));
});

$('commentAdd').addEventListener('click', addPendingComment);

$('commentText').addEventListener('input', function () {
  clearDiscardPrompt();
  autosizeCommentTextarea();
  updateCommentComposerState();
});

$('commentText').addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    e.stopPropagation();
    attemptCloseCommentDialog('escape');
    return;
  }
  if (e.key !== 'Enter' || e.shiftKey || e.altKey || e.isComposing) return;
  if (!e.metaKey && !e.ctrlKey) return;
  e.preventDefault();
  e.stopPropagation();
  addPendingComment();
});

window.addEventListener('resize', function () {
  dismissEdgeTooltip();
  if (state.pendingTarget) positionCommentDialog();
});

$('canvas').addEventListener('scroll', function () {
  dismissEdgeTooltip();
  if (state.pendingTarget) positionCommentDialog();
});

$('payloadClose').addEventListener('click', function () {
  $('payloadOverlay').className = 'overlay';
});

$('payloadOverlay').addEventListener('click', function (e) {
  if (e.target === $('payloadOverlay')) $('payloadOverlay').className = 'overlay';
});

document.addEventListener('click', function (e) {
  if (!state.viewOverviewOpen) return;
  const path = typeof e.composedPath === 'function' ? e.composedPath() : [];
  const clickedInsideOverview = path.some(function (node) {
    return Boolean(
      node
      && node.id
      && (node.id === 'breadcrumbNav' || node.id === 'viewOverviewTrigger' || node.id === 'viewOverviewPopover')
    );
  });
  if (clickedInsideOverview) return;
  closeViewOverview();
});

$('payloadCopy').addEventListener('click', async function () {
  try {
    await navigator.clipboard.writeText($('payloadPre').textContent || '');
  } catch (err) {
    // ignore clipboard failures in restricted environments
  }
});

document.addEventListener('keydown', function (e) {
  if (state.viewOverviewOpen) {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeViewOverview({ focusTrigger: true });
      return;
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      const active = document.activeElement;
      if (isViewOverviewFocusTarget(active)) {
        e.preventDefault();
        focusAdjacentViewOverviewItem(e.key === 'ArrowDown' ? 1 : -1);
        return;
      }
    }
  }

  const key = e.key.toLowerCase();
  const t = e.target;
  if (!e.metaKey && !e.ctrlKey && !e.altKey && !(t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA'))) {
    if (key === 'c') {
      e.preventDefault();
      setMode('comment', { animate: false });
      return;
    }
    if (key === 'e') {
      e.preventDefault();
      setMode('explore', { animate: false });
      return;
    }
  }
  if (e.key === 'Escape') {
    if (state.pendingTarget) {
      e.preventDefault();
      attemptCloseCommentDialog('escape');
      return;
    }
    $('payloadOverlay').className = 'overlay';
  }
});

if (window.matchMedia) {
  const media = window.matchMedia('(prefers-color-scheme: dark)');
  const syncSystemTheme = function (event) {
    if (storedTheme()) return;
    setTheme(event.matches ? 'dark' : 'light', false);
  };
  if (typeof media.addEventListener === 'function') media.addEventListener('change', syncSystemTheme);
  else if (typeof media.addListener === 'function') media.addListener(syncSystemTheme);
}

updateThemeToggle();
updateCommentComposerState();
render();
hydrateLatestStatus();
</script>
</body>
</html>
