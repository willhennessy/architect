<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="diagram-render-mode" content="__DIAGRAM_MODE__" />
  <title>Architect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script>
    (function () {
      const root = document.documentElement;
      const storageKey = 'theme';
      let theme = null;

      try {
        const stored = localStorage.getItem(storageKey);
        if (stored === 'light' || stored === 'dark') theme = stored;
      } catch (_err) {
        // ignore storage failures in restricted environments
      }

      if (!theme) {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = prefersDark ? 'dark' : 'light';
      }

      root.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    /*
     * DESIGN SYSTEM RULE: No box-shadows.
     *
     * This codebase uses color-based elevation, not shadow-based elevation.
     * Surfaces are distinguished by their background tokens
     * (--color-bg-app, --color-bg-sidebar, --color-bg-surface, --color-bg-surface-elevated).
     *
     * Do not add box-shadow, filter: drop-shadow, or stacked-background shadow
     * simulations to any element. If an element feels insufficiently grounded,
     * use a 1px border in --color-border-subtle or step the background up
     * the elevation ramp.
     *
     * Permitted exceptions: outline (for :focus-visible focus rings only).
     */
    :root,
    [data-theme="light"] {
      --color-bg-app: #FCFCF8;
      --color-bg-sidebar: #F6F5F0;
      --color-bg-surface: #FFFFFF;
      --color-bg-surface-raised: #FFFFFF;
      --color-bg-surface-elevated: #FFFFFF;
      --color-bg-dotted-pattern: #F2F2EE;

      --color-border-default: #E4E3DE;
      --color-border-subtle: #EDECE6;
      --color-border-strong: #D9D9D9;
      --color-border-input: #DADADA;

      --color-text-primary: #121210;
      --color-text-secondary: #383836;
      --color-text-tertiary: #6B6B68;
      --color-text-muted: #969694;
      --color-text-placeholder: #A8A8A5;
      --color-text-inverse: #FFFFFF;

      --color-brand: #C99A5B;
      --color-brand-hover: #B8883F;
      --color-signal: #4A9C95;
      --color-signal-hover: #3A8780;
      --color-status-success: #6B9A5F;
      --color-status-error: #B55A4A;
      --color-modal-scrim: rgba(30, 25, 15, 0.35);
      --color-signal-glow: color-mix(in srgb, var(--color-signal) 28%, transparent);

      --color-pill-active-bg: #EEEFEA;
      --color-hover-bg: #EFEEE8;
      --color-selected-bg: #E8E7E1;
      --color-focus-ring: #4A9C95;

      --color-icon-default: #383836;
      --color-icon-muted: #8F8F8C;

      --color-element-ochre: #C99A5B;
      --color-element-teal: #4A9C95;
      --color-element-sage: #8AA870;
      --color-element-indigo: #6B7FC9;
      --color-element-plum: #9B6B9E;
      --color-element-rose: #C97085;
      --color-element-slate: #6B8294;

      --color-element-ochre-fill: #F3EADC;
      --color-element-teal-fill: #DCEBE6;
      --color-element-sage-fill: #E7EDE0;
      --color-element-indigo-fill: #E2E6F0;
      --color-element-plum-fill: #EBE2E8;
      --color-element-rose-fill: #F3E3E3;
      --color-element-slate-fill: #E2E6E6;
      --color-bg-frame: var(--color-bg-sidebar);
      --color-bg-panel: var(--color-bg-surface);
      --color-bg-canvas-glow: var(--color-bg-app);
    }

    [data-theme="dark"] {
      --color-bg-app: #1F1F1D;
      --color-bg-sidebar: #262625;
      --color-bg-surface: #2C2C2A;
      --color-bg-surface-raised: #313130;
      --color-bg-surface-elevated: #3D3D3C;
      --color-bg-dotted-pattern: #2A2A28;

      --color-border-default: #3A3A38;
      --color-border-subtle: #2F2F2D;
      --color-border-strong: #575651;
      --color-border-input: #575651;

      --color-text-primary: #C2C2B8;
      --color-text-secondary: #A8A8A0;
      --color-text-tertiary: #8A8A85;
      --color-text-muted: #7E7E7C;
      --color-text-placeholder: #6B6B68;
      --color-text-inverse: #121210;

      --color-brand: #C99A5B;
      --color-brand-hover: #D8AB6E;
      --color-signal: #5FB3AB;
      --color-signal-hover: #4F9E96;
      --color-status-success: #7FAE73;
      --color-status-error: #C97060;
      --color-modal-scrim: rgba(0, 0, 0, 0.6);
      --color-signal-glow: color-mix(in srgb, var(--color-signal) 34%, transparent);

      --color-pill-active-bg: #3D3D3C;
      --color-hover-bg: #313130;
      --color-selected-bg: #3D3D3C;
      --color-focus-ring: #5FB3AB;

      --color-icon-default: #A8A8A0;
      --color-icon-muted: #7E7E7C;

      --color-element-ochre: #C99A5B;
      --color-element-teal: #5FB3AB;
      --color-element-sage: #9AB880;
      --color-element-indigo: #8093D4;
      --color-element-plum: #AE7FB2;
      --color-element-rose: #D68396;
      --color-element-slate: #8197A8;

      --color-element-ochre-fill: #443A2B;
      --color-element-teal-fill: #2D403C;
      --color-element-sage-fill: #3A4133;
      --color-element-indigo-fill: #343945;
      --color-element-plum-fill: #3E343E;
      --color-element-rose-fill: #473538;
      --color-element-slate-fill: #35393C;
      --color-bg-frame: var(--color-bg-app);
      --color-bg-panel: var(--color-bg-surface);
      --color-bg-canvas-glow: var(--color-bg-surface-elevated);
    }

    :root {
      --color-traffic-light-close: #FF5C5C;
      --color-traffic-light-minimize: #F8C800;
      --color-traffic-light-maximize: #37C65A;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      --duration-press: 140ms;
      --duration-fast: 180ms;
      --duration-medium: 240ms;
      --duration-slow: 320ms;
      --font-sans: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html {
      background: var(--color-bg-app);
      color-scheme: light;
      height: 100%;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background-color: var(--color-bg-app);
      background: var(--color-bg-app);
      color: var(--color-text-primary);
      height: 100%;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #app {
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    @supports (height: 100dvh) {
      #app {
        height: 100dvh;
        min-height: 100dvh;
      }
    }

    .topbar {
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      min-height: 58px;
      box-sizing: border-box;
      background: var(--color-bg-app);
      border-bottom: 1px solid var(--color-border-subtle);
      position: sticky;
      top: 0;
      z-index: 42;
    }

    .topbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .title {
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.01em;
      color: var(--color-text-primary);
      white-space: nowrap;
    }

    .subtitle {
      font-size: 12px;
      color: var(--color-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(72vw, 980px);
      font-variant-numeric: tabular-nums;
    }

    .theme-toggle {
      --theme-toggle-width: 80px;
      --theme-toggle-height: 40px;
      --theme-slot-size: 18px;
      --theme-slot-edge: 11px;
      --theme-thumb-size: 30px;
      --theme-thumb-inset: calc(var(--theme-slot-edge) + (var(--theme-slot-size) / 2) - (var(--theme-thumb-size) / 2));
      --theme-thumb-left: var(--theme-thumb-inset);
      --theme-accent: var(--color-brand);
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--theme-toggle-width);
      min-width: var(--theme-toggle-width);
      height: var(--theme-toggle-height);
      padding: 4px;
      background-color: color-mix(in srgb, var(--color-bg-surface) 88%, var(--color-bg-sidebar));
      color: var(--color-text-primary);
      border-color: var(--color-border-default);
      border-radius: 999px;
      overflow: hidden;
      isolation: isolate;
      transition:
        border-color var(--duration-fast) var(--ease-out),
        background-color var(--duration-fast) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
    }

    .theme-toggle::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: radial-gradient(circle at 24% 30%, color-mix(in srgb, var(--theme-accent) 16%, transparent), transparent 44%);
      opacity: 0.95;
      transition:
        opacity var(--duration-fast) var(--ease-out),
        background-position var(--duration-medium) var(--ease-drawer);
      pointer-events: none;
    }

    .theme-toggle[data-current-theme="dark"] {
      --theme-accent: var(--color-signal);
      --theme-thumb-left: calc(100% - var(--theme-thumb-size) - var(--theme-thumb-inset));
    }

    .theme-toggle[data-current-theme="dark"]::before {
      background: radial-gradient(circle at 76% 30%, color-mix(in srgb, var(--theme-accent) 18%, transparent), transparent 44%);
    }

    .theme-toggle-track {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .theme-toggle-slot,
    .theme-toggle-thumb {
      position: absolute;
      top: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      transform: translateY(-50%);
    }

    .theme-toggle-slot {
      width: var(--theme-slot-size);
      height: var(--theme-slot-size);
      color: var(--color-text-tertiary);
      opacity: 0.84;
      z-index: 2;
      transition:
        opacity var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        transform var(--duration-medium) var(--ease-drawer);
    }

    .theme-toggle-slot svg,
    .theme-toggle-thumb svg {
      display: block;
      width: 15px;
      height: 15px;
    }

    .theme-toggle-slot-light {
      left: var(--theme-slot-edge);
    }

    .theme-toggle-slot-dark {
      right: var(--theme-slot-edge);
    }

    .theme-toggle-thumb {
      left: var(--theme-thumb-left);
      width: var(--theme-thumb-size);
      height: var(--theme-thumb-size);
      z-index: 1;
      background-color: color-mix(in srgb, var(--color-bg-surface-elevated) 92%, var(--color-bg-surface));
      border: 1px solid var(--color-border-default);
      color: var(--theme-accent);
      transition:
        left var(--duration-medium) var(--ease-drawer),
        background-color var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        border-color var(--duration-fast) var(--ease-out);
    }

    .theme-toggle-thumb::before {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background: radial-gradient(circle at 34% 30%, color-mix(in srgb, var(--theme-accent) 14%, white 14%), transparent 66%);
      opacity: 0.95;
      pointer-events: none;
    }

    .theme-toggle-thumb-icon {
      position: absolute;
      inset: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.82);
      pointer-events: none;
    }

    .theme-toggle[data-current-theme="dark"] .theme-toggle-thumb {
      color: var(--color-signal);
      background-color: color-mix(in srgb, var(--color-bg-surface-elevated) 88%, var(--color-bg-surface-raised));
      border-color: var(--color-border-strong);
    }

    .theme-toggle[data-current-theme="light"] .theme-toggle-slot-light {
      color: var(--color-brand);
      opacity: 1;
      transform: translateY(-50%) scale(1.02);
    }

    .theme-toggle[data-current-theme="dark"] .theme-toggle-slot-dark {
      color: var(--color-signal);
      opacity: 1;
      transform: translateY(-50%) scale(1.02);
    }

    .theme-toggle[data-current-theme="light"] .theme-toggle-slot-dark {
      color: var(--color-icon-muted);
      opacity: 0.74;
      transform: translateY(-50%) scale(1);
    }

    .theme-toggle[data-current-theme="dark"] .theme-toggle-slot-light {
      color: var(--color-icon-muted);
      opacity: 0.74;
      transform: translateY(-50%) scale(1);
    }

    .tabbar {
      display: none;
    }

    .tabbar::-webkit-scrollbar {
      display: none;
    }

    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      position: relative;
    }

    .view-overview-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      margin-right: 0;
      background: transparent;
      border: 1px solid var(--color-border-default);
      border-radius: 6px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition:
        background var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out);
    }

    .view-overview-anchor {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .view-overview-trigger .icon {
      width: 12px;
      height: 12px;
      display: block;
      flex: 0 0 auto;
    }

    .view-overview-trigger:hover {
      background: var(--color-hover-bg);
      color: var(--color-text-primary);
    }

    .view-overview-trigger.is-open {
      background: var(--color-pill-active-bg);
      color: var(--color-text-primary);
    }

    .view-overview-trigger:focus-visible {
      outline: 2px solid var(--color-signal);
      outline-offset: 2px;
    }

    .view-overview-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 180px;
      max-width: 320px;
      max-height: 420px;
      overflow-y: auto;
      padding: 6px;
      background-color: var(--color-bg-surface-elevated);
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      z-index: 100;
    }

    [data-theme="dark"] .view-overview-popover {
      border-color: var(--color-border-strong);
    }

    .view-overview-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .view-overview-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 10px;
      padding-left: calc(7px + var(--depth, 0) * 16px);
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      border-radius: 6px;
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .view-overview-item:hover:not(.is-current) {
      background: var(--color-hover-bg);
      color: var(--color-text-primary);
    }

    .view-overview-item.is-current {
      background: var(--color-pill-active-bg);
      color: var(--color-text-primary);
      border-left-color: var(--color-signal);
      cursor: default;
    }

    .view-overview-item:focus-visible {
      outline: 2px solid var(--color-signal);
      outline-offset: -2px;
    }

    .breadcrumb-item {
      display: inline-flex;
      align-items: center;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      height: 24px;
      padding: 4px 10px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1.3;
      font-weight: 500;
      transition-property: transform, color, opacity;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
      view-transition-name: none;
    }

    .breadcrumb-item:hover:not(.is-current) {
      color: var(--color-text-primary);
      background: var(--color-hover-bg);
    }

    .breadcrumb-item.is-current {
      color: var(--color-text-primary);
      background: var(--color-pill-active-bg);
      cursor: default;
    }

    .breadcrumb-separator {
      color: var(--color-text-muted);
      font-size: 14px;
      line-height: 1;
    }

    button {
      border: 1px solid var(--color-border-default);
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
      transition-property: transform, border-color, background-color, color, opacity;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
      transform: translateZ(0);
    }

    button:focus-visible:not(.view-overview-trigger),
    textarea:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    button:hover:not(:disabled):not(.btn-submit-comments):not(.btn-comment-submit):not(.mode-toggle-segment):not(.breadcrumb-item):not(.theme-toggle):not(.view-overview-trigger):not(.view-overview-item) {
      border-color: var(--color-border-strong);
      background: var(--color-hover-bg);
    }

    button:disabled { opacity: .5; cursor: default; }

    button:active:not(:disabled),
    .mode-toggle-segment:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background-color: var(--color-text-primary);
      color: var(--color-text-inverse);
      border-color: transparent;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 500;
      font-size: 14px;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.96;
    }

    .btn-primary:disabled {
      opacity: 0.82;
    }

    .theme-toggle:hover:not(:disabled) {
      border-color: var(--color-border-strong);
      background-color: color-mix(in srgb, var(--color-hover-bg) 72%, var(--color-bg-surface));
    }

    .workspace {
      grid-row: 2;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(270px, 330px);
      gap: 0;
      padding: 0 12px 12px 0;
      overflow: hidden;
      align-items: stretch;
    }

    .diagram-panel {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--color-bg-app);
    }

    .canvas-region {
      background: transparent;
      overflow: hidden;
      padding-bottom: 12px;
    }

    .canvas-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 52px;
      padding: 12px 16px 8px;
      background: transparent;
      box-sizing: border-box;
    }

    .canvas-header-left {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .canvas-header-left .breadcrumb {
      flex: 1 1 auto;
      min-width: 0;
    }

    .canvas-header-right {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .canvas-surface {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      padding-block: 0;
      overflow: hidden;
      background: transparent;
    }

    .mode-toggle {
      position: relative;
      top: auto;
      left: auto;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      min-width: 244px;
      background: color-mix(in srgb, var(--color-bg-surface) 86%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-border-default) 76%, transparent);
      border-radius: 16px;
      padding: 4px;
      backdrop-filter: blur(18px) saturate(1.18);
      isolation: isolate;
      view-transition-name: mode-toggle-control;
    }

    .mode-toggle::before {
      content: "";
      position: absolute;
      inset: 4px 50% 4px 4px;
      border-radius: 12px;
      border: 1px solid color-mix(in srgb, var(--color-bg-surface-elevated) 78%, transparent);
      background: var(--color-signal);
      transform: translateX(0%);
      transform-origin: center;
      transition: transform var(--duration-slow) var(--ease-drawer);
      z-index: 0;
    }

    .mode-toggle[data-active-mode="comment"]::before {
      transform: translateX(100%);
    }

    .mode-toggle-segment {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 12px;
      background: transparent;
      color: var(--color-text-secondary);
      border: none;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition-property: color, opacity, transform;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
    }

    .sidebar[data-mode="comment"] .sidebar-footer {

    .btn-submit-comments {

    .btn-submit-comments:disabled {

    }

    .comment-status-card {

      gap: 10px;

    }

    .comment-status-card[data-tone="pending"] {
      background: color-mix(in srgb, var(--color-bg-sidebar) 82%, var(--color-bg-surface));
    }

    .comment-status-card[data-tone="success"] {
      background: color-mix(in srgb, var(--color-status-success) 16%, var(--color-bg-surface));
    }

    .comment-status-card[data-tone="failed"] {
      background: color-mix(in srgb, var(--color-status-error) 16%, var(--color-bg-surface));
    }

    .comment-status-card-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .comment-status-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      color: var(--color-text-primary);
    }

    .comment-status-card[data-tone="success"] .comment-status-icon {
      color: var(--color-status-success);
    }

    .comment-status-card[data-tone="failed"] .comment-status-icon {
      color: var(--color-status-error);
    }

    .comment-status-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .comment-status-icon.is-spinner::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1.5px solid color-mix(in srgb, var(--color-border-default) 82%, var(--color-border-strong));
      border-top-color: var(--color-text-primary);
      animation: status-spin 0.9s linear infinite;
    }

    .comment-status-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      gap: 2px;
    }

    .comment-status-title {
      margin: 0;
      color: var(--color-text-primary);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
      text-wrap: pretty;
    }

    .comment-status-title[data-animated="true"]::after {
      content: "";
      display: inline-block;
      width: 1.2em;
      margin-left: 1px;
      text-align: left;
      animation: status-dots 1.25s steps(4, end) infinite;
    }

    .comment-status-subtitle {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.45;
      text-wrap: pretty;
    }

    .comment-status-card[data-tone="success"] .comment-status-title {
      color: var(--color-status-success);
    }

    .comment-status-card[data-tone="success"] .comment-status-subtitle {
      color: color-mix(in srgb, var(--color-status-success) 82%, var(--color-text-primary));
    }

    .comment-status-card[data-tone="failed"] .comment-status-title {
      color: var(--color-status-error);
    }

    .comment-status-card[data-tone="failed"] .comment-status-subtitle {
      color: color-mix(in srgb, var(--color-status-error) 84%, var(--color-text-primary));
    }

    .comment-status-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .comment-status-primary-action {
      background: var(--color-status-error);
      border: none;
      border-radius: 10px;
      color: var(--color-bg-surface);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
    }

    .comment-status-primary-action:hover:not(:disabled) {
      background: color-mix(in srgb, var(--color-status-error) 90%, var(--color-text-primary));
      border-color: transparent;
    }

    .comment-status-secondary-action {
      background: none;
      border: none;
      border-radius: 0;
      color: var(--color-status-error);
      font-size: 12px;
      font-weight: 500;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .comment-status-secondary-action:hover:not(:disabled) {
      background: none;
      border-color: transparent;
      color: color-mix(in srgb, var(--color-status-error) 82%, var(--color-text-primary));
    }

    .comment-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .comment-list.is-pending {
      opacity: 0.6;
      pointer-events: none;
    }

    .comment-card {
      padding: 12px 16px;
      margin: 0;
      position: relative;
      animation: comment-card-in 320ms var(--ease-out) both;
      animation-delay: calc(var(--comment-index, 0) * 36ms);

    .comment-card + .comment-card {

    .comment-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .comment-card-target {

      align-items: center;
      gap: 7px;
      min-width: 0;
      padding: 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.4;
      text-wrap: pretty;
    }

    .comment-card-target::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--comment-tone, var(--color-signal));
    }

    .comment-card-delete {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition-property: transform, opacity, color, background-color;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
      padding: 4px 6px;
      border-radius: 999px;
    }

    .comment-card:hover .comment-card-delete,
    .comment-card:focus-within .comment-card-delete {
      opacity: 1;
    }

    .comment-card-delete:hover,
    .comment-card-delete:focus,
    .comment-card-delete:focus-visible {
      opacity: 1;
      color: var(--color-text-primary);
    }

    .comment-card-body {
      color: var(--color-text-secondary);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      text-wrap: pretty;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      padding: 58px 20px;
      color: var(--color-text-muted);
    }

      padding: 58px 20px 52px;
    }

    .empty-state p {
      margin: 0;
      line-height: 1.2;
      text-wrap: balance;
    }

    .empty-state-hint {
      font-size: 12px;
      max-width: 26ch;

    }

    .empty-note {
      color: var(--color-text-secondary);
      text-align: center;
      padding-top: 54px;
      text-wrap: balance;
    }

    .component-header {
      margin-bottom: 20px;
    }

    .component-title {
      color: var(--color-text-primary);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }

    .component-kind {
      color: var(--color-text-tertiary);
      font-size: 13px;
      font-weight: 500;
      margin: 0 0 20px;
    }

    .component-kind[data-kind="person"] {
      color: var(--color-element-sage);
    }

    .component-kind[data-kind="container"] {
      color: var(--color-element-plum);
    }

    .component-kind[data-kind="software_system"] {
      color: var(--color-element-indigo);
    }

    .component-kind[data-kind="external_system"] {
      color: var(--color-element-ochre);
    }

    .component-kind[data-kind="database"] {
      color: var(--color-element-slate);
    }

    .component-kind[data-kind="queue"] {
      color: var(--color-element-rose);
    }

    .component-kind[data-kind="component"] {
      color: var(--color-element-teal);
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-group:last-child {
      margin-bottom: 0;
    }

    .field-label {
      color: var(--color-text-tertiary);
      font-size: 12px;
      font-weight: 500;
      margin: 0 0 6px;
    }

    .field-value {
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      margin: 0;
      text-wrap: pretty;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-subtle);
      color: var(--color-text-secondary);
      font-size: 12px;
    }

    .relationship-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .relationship-card {

      border: 1px solid var(--color-border-subtle);

      padding: 10px 12px;

    .relationship-endpoints {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--color-text-tertiary);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      margin: 0 0 4px;
    }

    .relationship-arrow {

    }

    .relationship-label {
      color: var(--color-text-primary);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      margin: 0;
      text-wrap: pretty;

    .relationship-card-meta {
      color: var(--color-text-muted);
      font-size: 12px;
      line-height: 1.4;
      margin: 6px 0 0;
    }

    @media (max-width: 1024px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: 320px;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 12px;
      }

      .subtitle {
        white-space: normal;
      }

      .workspace {
        padding: 0 12px 12px 0;
      }

      .canvas-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        padding: 10px 12px 8px;
      }

      .canvas-header-right {
        justify-content: flex-start;
      }

      .mode-toggle {
        max-width: 100%;
        min-width: 0;
        width: 100%;
        margin: 0;
      }

    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--color-modal-scrim);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
    }

    .overlay.show { display: flex; }

    .overlay-popover {
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      z-index: 44;
    }

    .overlay-popover.show { display: block; }

    .dialog {
      --dialog-surface-fill: var(--color-bg-surface);
      --dialog-stroke-color: color-mix(in srgb, var(--color-border-default) 82%, transparent);
      width: min(480px, calc(100vw - 32px));
      min-width: min(360px, calc(100vw - 32px));
      max-height: 86vh;
      overflow: auto;
      border: 1px solid var(--dialog-stroke-color);
      border-radius: 22px;
      background: var(--dialog-surface-fill);
      padding: 20px 24px;
      backdrop-filter: blur(18px) saturate(1.1);
    }

    [data-theme="dark"] .dialog {
      --dialog-stroke-color: var(--color-border-strong);
      border-color: var(--dialog-stroke-color);
    }

    .dialog-floating {
      position: absolute;
      margin: 0;
    }

    .comment-popover {
      width: min(340px, calc(100vw - 32px));
      min-width: 0;
      max-width: calc(100vw - 32px);
      max-height: none;
      overflow: visible;
      padding: 14px;
      border-radius: 22px;
      isolation: isolate;
      transform-origin: var(--comment-origin-x, 50%) var(--comment-origin-y, 50%);
      opacity: 0;
      transform: translate3d(0, 12px, 0) scale(0.96);
      filter: blur(10px);
    }

    .comment-popover[data-placement] {
      transition-property: opacity, transform, filter;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
    }

    .comment-popover[data-animate-state="open"] {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
      filter: blur(0);
    }

    .comment-popover[data-animate-state="closing"] {
      opacity: 0;
      transform: translate3d(0, 10px, 0) scale(0.97);
      filter: blur(8px);
    }

    .comment-popover-pointer {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--dialog-surface-fill);
      border: 1px solid var(--dialog-stroke-color);
      border-radius: 2px;
      pointer-events: none;
      z-index: 2;
      transition: opacity var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }

    .comment-popover[data-placement="right"] .comment-popover-pointer {
      left: 0;
      top: var(--comment-pointer-y, 50%);
      transform: translate(-50%, -50%) rotate(45deg);
      border-top: none;
      border-right: none;
    }

    .comment-popover[data-placement="left"] .comment-popover-pointer {
      left: 100%;
      top: var(--comment-pointer-y, 50%);
      transform: translate(-50%, -50%) rotate(45deg);
      border-left: none;
      border-bottom: none;
    }

    .comment-popover[data-placement="bottom"] .comment-popover-pointer {
      left: var(--comment-pointer-x, 50%);
      top: 0;
      transform: translate(-50%, -50%) rotate(45deg);
      border-right: none;
      border-bottom: none;
    }

    .comment-popover[data-placement="top"] .comment-popover-pointer {
      left: var(--comment-pointer-x, 50%);
      top: 100%;
      transform: translate(-50%, -50%) rotate(45deg);
      border-left: none;
      border-top: none;
    }

    .modal-header {

    pre {

    .btn-secondary {

    .comment-popover-hint.is-visible {

    .comment-input-wrap {

      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 120ms ease, opacity 120ms ease;
    }

    .btn-comment-submit:hover:not(:disabled) {
      background: var(--color-signal-hover);
    }

    .btn-comment-submit:disabled {
      background: color-mix(in srgb, var(--color-text-tertiary) 40%, transparent);
      color: var(--color-text-tertiary);
      cursor: not-allowed;
    }

    .btn-comment-submit svg {
      display: block;
    }

    .comment-target-ring {
      fill: none;
      stroke: var(--color-signal);
      stroke-width: 2.2;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      vector-effect: non-scaling-stroke;
    }

    .comment-target-ring.is-visible {
      visibility: visible;
      opacity: 0.8;
      animation: target-ring-pulse 600ms var(--ease-out) 2;
    }

    .diagram-relationship.is-comment-target line,
    .diagram-relationship.is-comment-target path,
    .diagram-relationship.is-comment-target polyline {
      stroke: var(--color-signal) !important;
      stroke-width: 2.4 !important;
    }

    .diagram-relationship.is-comment-target polygon {
      fill: var(--color-signal) !important;
      stroke: var(--color-signal) !important;
    }

    svg {
      overflow: visible;
    }

    svg text {
      user-select: none;
    }

    #canvas svg {
      cursor: inherit;
    }

    .diagram-node,
    .diagram-node * {
      cursor: pointer;
    }

    .diagram-relationship,
    .diagram-relationship * {
      cursor: default;
    }

    .diagram-node,
    .diagram-relationship {
      transition-property: transform, opacity;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform;
    }

    .diagram-node[data-drillable="true"],
    .diagram-node[data-drillable="true"] * {
      cursor: zoom-in;
    }

    .diagram-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 160;
      max-width: min(320px, calc(100vw - 24px));
      padding: 8px 10px;
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      background: color-mix(in srgb, var(--color-bg-surface-elevated) 96%, var(--color-bg-app));
      color: var(--color-text-primary);
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transform: translate3d(0, 0, 0);
      transition:
        opacity 70ms linear,
        visibility 70ms linear;
    }

    .diagram-tooltip[data-visible="true"] {
      opacity: 1;
      visibility: visible;
    }

    .comment-mode-on #canvas,
    .comment-mode-on #canvas * {
      cursor: crosshair;
    }

    @media (hover: hover) and (pointer: fine) {
      body:not(.comment-mode-on) .diagram-node:hover {
        transform: translateY(-2px) scale(1.01);
      }

      body:not(.comment-mode-on) .diagram-relationship:hover {
        opacity: 0.94;
      }
    }

    @keyframes target-ring-pulse {
      0%   { opacity: 0.4; }
      50%  { opacity: 1; }
      100% { opacity: 0.8; }
    }

    @keyframes status-pulse {
      0%, 100% {
        opacity: 0.62;
        transform: scale(0.86);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes comment-card-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes status-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes status-dots {
      0%,
      20% { content: ""; }
      40% { content: "."; }
      60% { content: ".."; }
      80%,
      100% { content: "..."; }
    }

    #canvas,
    #sidebar,
    #sidebarBody,
    #sidebarTitle,
    #sidebarCount,
    #sidebarFooter,
    .breadcrumb-item.is-current {
      view-transition-name: none;
    }

    html[data-ui-transition="view"] #canvas {
      view-transition-name: canvas-stage;
    }

    html[data-ui-transition="view"] .breadcrumb-item.is-current {
      view-transition-name: active-tab;
    }

    html[data-ui-transition="mode"] #canvas {
      view-transition-name: mode-canvas;
    }

    html[data-ui-transition="mode"] #sidebar {
      view-transition-name: mode-sidebar;
    }

    html[data-ui-transition="detail"] #sidebar {
      view-transition-name: detail-sidebar;
    }

    ::view-transition-group(canvas-stage),
    ::view-transition-group(active-tab),
    ::view-transition-group(mode-canvas),
    ::view-transition-group(mode-sidebar),
    ::view-transition-group(detail-sidebar) {
      animation-duration: var(--duration-slow);
      animation-timing-function: var(--ease-drawer);
    }

    ::view-transition-group(mode-toggle-control),
    ::view-transition-old(mode-toggle-control),
    ::view-transition-new(mode-toggle-control) {
      animation: none;
    }

    html[data-ui-transition="view"][data-ui-direction="forward"]::view-transition-old(canvas-stage) {
      animation: canvas-slide-out-left 260ms var(--ease-out) both;
    }

    html[data-ui-transition="view"][data-ui-direction="forward"]::view-transition-new(canvas-stage) {
      animation: canvas-slide-in-right 360ms var(--ease-drawer) both;
    }

    html[data-ui-transition="view"][data-ui-direction="back"]::view-transition-old(canvas-stage) {
      animation: canvas-slide-out-right 260ms var(--ease-out) both;
    }

    html[data-ui-transition="view"][data-ui-direction="back"]::view-transition-new(canvas-stage) {
      animation: canvas-slide-in-left 360ms var(--ease-drawer) both;
    }

    html[data-ui-transition="mode"]::view-transition-old(mode-canvas),
    html[data-ui-transition="mode"]::view-transition-old(mode-sidebar) {
      animation: surface-fade-out 180ms var(--ease-out) both;
    }

    html[data-ui-transition="mode"]::view-transition-new(mode-canvas),
    html[data-ui-transition="mode"]::view-transition-new(mode-sidebar) {
      animation: surface-fade-in 260ms var(--ease-drawer) both;
    }

    html[data-ui-transition="detail"]::view-transition-old(detail-sidebar) {
      animation: detail-out 160ms var(--ease-out) both;
    }

    html[data-ui-transition="detail"]::view-transition-new(detail-sidebar) {
      animation: detail-in 220ms var(--ease-out) both;
    }

    @keyframes canvas-slide-in-right {
      from {
        opacity: 0;
        transform: translateX(44px) scale(0.992);
        filter: blur(14px);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes canvas-slide-out-left {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateX(-34px) scale(0.992);
        filter: blur(10px);
      }
    }

    @keyframes canvas-slide-in-left {
      from {
        opacity: 0;
        transform: translateX(-44px) scale(0.992);
        filter: blur(14px);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes canvas-slide-out-right {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateX(34px) scale(0.992);
        filter: blur(10px);
      }
    }

    @keyframes surface-fade-in {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
        filter: blur(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes surface-fade-out {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateY(-10px) scale(0.99);
        filter: blur(8px);
      }
    }

    @keyframes detail-in {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes detail-out {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateY(-8px) scale(0.992);
        filter: blur(8px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .comment-popover {
        opacity: 1;
        transform: none;
        filter: none;
      }

      .theme-toggle::before,
      .theme-toggle-thumb,
      .theme-toggle-thumb::before,
      .theme-toggle-thumb-icon,
      .theme-toggle-slot {
        transition: none !important;
      }
    }
  </style>
</head>

function displayNameForElementId(id) {
  const element = nodesById.get(id);
  if (element && element.name) return element.name;
  if (id) missingElementNameIds.add(String(id));
  return humanizeSlug(id || 'unknown');
}

function relationshipDedupSignature(rel) {
  return [
    rel.source_id || '',
    rel.target_id || '',
    rel.label || '',
    rel.technology || '',
    rel.protocol || '',
    rel.interaction_type || '',
    rel.sync_async || '',
    (rel.data_objects || []).join('|'),
    (rel.tags || []).join('|'),
    rel.confidence || '',
  ].join('::');
}

function relationshipsForNode(nodeId) {
  const seen = new Set();
  return Array.from(relationshipsById.values()).filter(function (rel) {
    return rel.source_id === nodeId || rel.target_id === nodeId;
  }).filter(function (rel) {
    const sig = relationshipDedupSignature(rel);
    if (seen.has(sig)) return false;
    seen.add(sig);
    return true;
  });
}

function relationshipRouteText(rel) {
  return displayNameForElementId(rel.source_id) + ' → ' + displayNameForElementId(rel.target_id);
}

function relationshipCollisionKey(rel) {
  return [relationshipRouteText(rel), rel.label || ''].join('::');
}

function relationshipDetailParts(rel) {
  const details = [];
  if (rel.technology) details.push(rel.technology);
  if (rel.protocol) details.push(String(rel.protocol).toUpperCase());
  if (rel.interaction_type && rel.interaction_type !== 'calls') details.push(humanizeSlug(rel.interaction_type));
  if (rel.sync_async && rel.sync_async !== 'human') details.push(humanizeSlug(rel.sync_async));
  if ((rel.data_objects || []).length) details.push((rel.data_objects || []).join(', '));
  return details;
}

function relationshipCardHtml(rel, showDifferentiator) {
  const detailParts = relationshipDetailParts(rel);
  const bodyText = rel.label || humanizeSlug(rel.id || 'relationship');
  const html = [];
  html.push('<li class="relationship-card">');
  html.push('<p class="relationship-endpoints"><span>' + esc(displayNameForElementId(rel.source_id)) + '</span><span class="relationship-arrow" aria-hidden="true">→</span><span>' + esc(displayNameForElementId(rel.target_id)) + '</span></p>');
  html.push('<p class="relationship-label">' + esc(bodyText) + '</p>');
  if (showDifferentiator && detailParts.length) {
    html.push('<p class="relationship-card-meta">' + esc(detailParts.join(' • ')) + '</p>');
  }
  html.push('</li>');
  return html.join('');
}

function storedTheme() {
  try {
    const value = localStorage.getItem(THEME_STORAGE_KEY);
    return value === 'light' || value === 'dark' ? value : null;
  } catch (_err) {
    return null;
  }
}

function normalizeViewMode(mode) {
  return mode === 'comment' ? 'comment' : 'explore';
}

function storedViewMode() {
  try {
    return normalizeViewMode(localStorage.getItem(VIEW_MODE_STORAGE_KEY));
  } catch (_err) {
    return 'explore';
  }
}

function persistViewMode(mode) {
  try {
    localStorage.setItem(VIEW_MODE_STORAGE_KEY, normalizeViewMode(mode));
  } catch (_err) {
    // ignore storage failures in restricted environments
  }
}

function currentTheme() {
  return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
}

function setTheme(theme, persist) {
  const nextTheme = theme === 'dark' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', nextTheme);
  if (persist) {
    try {
      localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
    } catch (_err) {
      // ignore storage failures in restricted environments
    }
  }
  updateThemeToggle();
}

function updateThemeToggle() {
  const toggle = $('themeToggle');
  if (!toggle) return;
  const theme = currentTheme();
  const nextTheme = theme === 'dark' ? 'light' : 'dark';
  toggle.setAttribute('data-current-theme', theme);
  toggle.setAttribute('data-next-theme', nextTheme);
  toggle.setAttribute('aria-label', 'Switch to ' + nextTheme + ' theme');
  toggle.setAttribute('title', 'Switch to ' + nextTheme + ' theme');
  toggle.setAttribute('aria-pressed', theme === 'dark' ? 'true' : 'false');
}

function prefersReducedMotion() {
  try {
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  } catch (_err) {
    return false;
  }
}

function canAnimateUi(animate) {
  return animate !== false && !prefersReducedMotion() && typeof document.startViewTransition === 'function';
}

function withUiTransition(mutate, options) {
  const opts = options || {};
  const animate = canAnimateUi(opts.animate);
  if (!animate) {
    mutate();
    if (opts.render !== false) render();
    return Promise.resolve();
  }

  const root = document.documentElement;
  const token = String(++uiTransitionToken);
  root.setAttribute('data-ui-token', token);
  root.setAttribute('data-ui-transition', opts.kind || 'detail');
  root.setAttribute('data-ui-direction', opts.direction || 'forward');

  const transition = document.startViewTransition(function () {
    mutate();
    if (opts.render !== false) render();
  });

  return transition.finished.finally(function () {
    if (root.getAttribute('data-ui-token') !== token) return;
    root.removeAttribute('data-ui-token');
    root.removeAttribute('data-ui-transition');
    root.removeAttribute('data-ui-direction');
  });
}

function viewsList() {
  return DATA.views || [];
}

function buildViewHierarchyData() {
  const rawHierarchy = DATA.view_hierarchy || null;
  if (rawHierarchy && Array.isArray(rawHierarchy.items) && rawHierarchy.items.length) {
    const childrenByViewId = new Map();
    const parentByViewId = new Map();
    const depthByViewId = new Map();
    const knownViewIds = new Set();

    viewsList().forEach(function (view) {
      childrenByViewId.set(view.id, []);
      knownViewIds.add(view.id);
    });

    const rawParents = rawHierarchy.parent_by_view_id || {};
    Object.keys(rawParents).forEach(function (childId) {
      const parentId = rawParents[childId];
      if (!knownViewIds.has(childId) || !knownViewIds.has(parentId) || childId === parentId) return;
      parentByViewId.set(childId, parentId);
      const children = childrenByViewId.get(parentId) || [];
      if (!children.includes(childId)) children.push(childId);
      childrenByViewId.set(parentId, children);
    });

    const items = [];
    const visited = new Set();
    rawHierarchy.items.forEach(function (entry) {
      const viewId = String(entry && (entry.view_id || entry.viewId) || '');
      if (!viewId || visited.has(viewId) || !viewsById.has(viewId)) return;
      visited.add(viewId);
      const depth = Math.max(0, Number(entry && entry.depth) || 0);
      depthByViewId.set(viewId, depth);
      items.push({
        viewId: viewId,
        depth: depth,
        view: viewsById.get(viewId),
      });
    });

    const orphanIds = [];
    viewsList().forEach(function (view) {
      if (visited.has(view.id)) return;
      orphanIds.push(view.id);
      if (!depthByViewId.has(view.id)) depthByViewId.set(view.id, 0);
      items.push({
        viewId: view.id,
        depth: depthByViewId.get(view.id),
        view: view,
      });
    });

    return {
      items: items,
      childrenByViewId: childrenByViewId,
      parentByViewId: parentByViewId,
      depthByViewId: depthByViewId,
      orphanIds: orphanIds,
    };
  }

  const childrenByViewId = new Map();
  const parentByViewId = new Map();

  viewsList().forEach(function (view) {
    childrenByViewId.set(view.id, []);
  });

  viewsList().forEach(function (view) {
    const children = childrenByViewId.get(view.id) || [];
    const seenChildIds = new Set();
    (view.nodes || []).forEach(function (node) {
      const childId = (DATA.drill_map || {})[String(node && node.id || '')];
      if (!childId || !viewsById.has(childId) || childId === view.id || seenChildIds.has(childId)) return;
      seenChildIds.add(childId);
      children.push(childId);
      if (!parentByViewId.has(childId)) parentByViewId.set(childId, view.id);
    });
    childrenByViewId.set(view.id, children);
  });

  const items = [];
  const visited = new Set();

  function visit(viewId, depth) {
    if (!viewId || visited.has(viewId) || !viewsById.has(viewId)) return;
    visited.add(viewId);
    items.push({
      viewId: viewId,
      depth: depth,
      view: viewsById.get(viewId),
    });
    (childrenByViewId.get(viewId) || []).forEach(function (childId) {
      visit(childId, depth + 1);
    });
  }

  viewsList().forEach(function (view) {
    if (!parentByViewId.has(view.id)) visit(view.id, 0);
  });

  const orphanIds = [];
  viewsList().forEach(function (view) {
    if (visited.has(view.id)) return;
    orphanIds.push(view.id);
    visit(view.id, 0);
  });

  const depthByViewId = new Map();
  items.forEach(function (entry) {
    depthByViewId.set(entry.viewId, entry.depth);
  });

  return {
    items: items,
    childrenByViewId: childrenByViewId,
    parentByViewId: parentByViewId,
    depthByViewId: depthByViewId,
    orphanIds: orphanIds,
  };
}

function viewIndexForId(viewId) {
  return viewsList().findIndex(function (view) {
    return view.id === viewId;
  });
}

function transitionDirectionForView(nextViewId) {
  const currentIdx = viewIndexForId(state.viewId);
  const nextIdx = viewIndexForId(nextViewId);
  if (currentIdx === -1 || nextIdx === -1 || currentIdx === nextIdx) return 'forward';
  return nextIdx > currentIdx ? 'forward' : 'back';
}

function changeView(nextViewId, options) {
  const opts = options || {};
  if (!nextViewId || nextViewId === state.viewId || !viewsById.has(nextViewId)) return Promise.resolve();
  return withUiTransition(function () {
    if (opts.history === 'replace') {
      state.history = opts.nextHistory ? opts.nextHistory.slice() : [];
    } else if (opts.history === 'push') {
      state.history = state.history.concat(state.viewId);
    } else if (opts.history === 'pop') {
      state.history = state.history.slice(0, -1);
    } else if (opts.history === 'reset') {
      state.history = [];
    }
    state.viewId = nextViewId;
    state.selectedId = null;
    state.viewOverviewOpen = false;
  }, {
    kind: 'view',
    direction: opts.direction || transitionDirectionForView(nextViewId),
    animate: opts.animate,
  });
}

function setSelectedId(nextSelectedId, options) {
  const opts = options || {};
  if (state.selectedId === nextSelectedId) {
    if (opts.render !== false) render();
    return Promise.resolve();
  }
  return withUiTransition(function () {
    state.selectedId = nextSelectedId || null;
  }, {
    kind: 'detail',
    direction: nextSelectedId ? 'forward' : 'back',
    animate: opts.animate,
  });
}

function currentView() { return viewsById.get(state.viewId); }

function isCommentMode() {
  return state.mode === 'comment';
}

function setMode(mode, shouldRender, options) {
  if (typeof shouldRender === 'object' && !options) {
    options = shouldRender;
    shouldRender = undefined;
  }
  const nextMode = normalizeViewMode(mode);
  const opts = options || {};
  if (nextMode === state.mode) {
    if (shouldRender !== false) render();
    return Promise.resolve();
  }
  return withUiTransition(function () {
    state.mode = nextMode;
    dismissEdgeTooltip();
    if (nextMode !== 'comment') {
      closeCommentDialog({ instant: true, animate: false });
    }
    persistViewMode(nextMode);
  }, {
    kind: 'mode',
    direction: nextMode === 'comment' ? 'forward' : 'back',
    animate: opts.animate,
    render: shouldRender,
  });
}

function statusToneForState(jobState) {
  if (jobState === 'failed' || jobState === 'blocked') return 'failed';
  if (jobState === 'completed') return 'success';
  return 'pending';
}

function commentCountLabel(count) {
  const safeCount = Math.max(0, Number(count) || 0);
  return safeCount + ' comment' + (safeCount === 1 ? '' : 's');
}

function stopStatusSubscriptions() {
  if (state.eventSource) {
    state.eventSource.close();
    state.eventSource = null;
  }
  if (state.pollTimer) {
    clearInterval(state.pollTimer);
    state.pollTimer = null;
  }
}

function scheduleAutoRefresh(status) {
  if (!status || status.state !== 'completed' || !status.has_final_result) return;
  const jobId = String(status.job_id || '');
  if (!jobId) return;
  if (state.autoRefreshJobId === jobId) return;
  state.autoRefreshJobId = jobId;
  if (state.autoRefreshTimer) {
    clearTimeout(state.autoRefreshTimer);
  }
  state.autoRefreshTimer = setTimeout(function () {
    window.location.reload();
  }, 4000);
}

function failureDetailsText() {
  const details = [];
  const status = state.activeJob || {};
  if (status.state) details.push('State: ' + status.state);
  if (status.job_id) details.push('Job id: ' + status.job_id);
  const errorText = String(status.error || status.message || '').trim();
  if (errorText) {
    details.push('', 'Error', errorText);
  } else {
    details.push('', 'Error', 'No additional error details were returned.');
  }
  if (state.lastSubmittedPayload) {
    details.push('', 'Submitted payload', JSON.stringify(state.lastSubmittedPayload, null, 2));
  }
  return details.join('\n');
}

function applyJobStatus(status) {
  if (!status || !status.state) return;
  if ((status.state !== 'completed' || !status.has_final_result) && state.autoRefreshTimer) {
    clearTimeout(state.autoRefreshTimer);
    state.autoRefreshTimer = null;
    state.autoRefreshJobId = null;
  }
  state.activeJob = status;
  updateSidebar();
  scheduleAutoRefresh(status);

  if (status.state === 'completed' || status.state === 'failed' || status.state === 'blocked') {
    stopStatusSubscriptions();
  }
}

function shouldSuppressHydratedStatus(status) {
  if (!status || !status.state) return true;
  if (status.state !== 'completed') return false;
  if (!HANDOFF.latest_job_id) return false;
  return status.job_id === HANDOFF.latest_job_id;
}

function isJobHandlingInProgress(status) {
  if (!status || !status.state) return false;
  return ['received', 'acknowledged', 'analyzing', 'fast_patch_running', 'fast_patch_ready', 'slow_patch_running'].indexOf(status.state) !== -1;
}

function statusSummaryForActiveJob() {
  if (!state.activeJob) return null;
  const count = Math.max(
    0,
    Number(state.activeJob.submitted_comment_count || state.comments.length || 0) || 0
  );
  const tone = statusToneForState(state.activeJob.state);
  if (tone === 'success') {
    return {
      tone: tone,
      title: 'All ' + commentCountLabel(count) + ' addressed',
      subtitle: 'Updates have been applied.',
      animated: false,
    };
  }
  if (tone === 'failed') {
    return {
      tone: tone,
      title: "Couldn't process comments",
      subtitle: 'Something went wrong. Your drafts are saved.',
      animated: false,
    };
  }
  return {
    tone: tone,
    title: 'Processing ' + commentCountLabel(count),
    subtitle: 'Claude is reviewing. This may take a few minutes.',
    animated: true,
  };
}

  title.textContent = summary.title;
  if (summary.animated) {
    title.setAttribute('data-animated', 'true');
  }

  const subtitle = document.createElement('p');
  subtitle.className = 'comment-status-subtitle';
  subtitle.textContent = summary.subtitle;

  copy.appendChild(title);
  copy.appendChild(subtitle);
  main.appendChild(icon);
  main.appendChild(copy);
  card.appendChild(main);

  if (summary.tone === 'failed') {
    const actions = document.createElement('div');
    actions.className = 'comment-status-actions';

    const retry = document.createElement('button');
    retry.className = 'comment-status-primary-action';
    retry.type = 'button';
    retry.textContent = 'Retry';
    retry.disabled = state.submitInFlight || state.comments.length === 0;
    retry.addEventListener('click', submitPayload);

    const details = document.createElement('button');
    details.className = 'comment-status-secondary-action';
    details.type = 'button';
    details.textContent = 'Details';
    details.addEventListener('click', showFailureDetails);

    actions.appendChild(retry);
    actions.appendChild(details);
    card.appendChild(actions);
  }

  region.appendChild(card);
}

function startPollingJob(jobId, statusUrl) {
  stopStatusSubscriptions();
  if (!statusUrl && HANDOFF.bridge_url) {
    statusUrl = HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(jobId);
  }
  if (!statusUrl) return;
  state.pollTimer = setInterval(function () {
    fetch(statusUrl)
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (status) {
        if (!status) return;
        applyJobStatus(status);
      })
      .catch(function () {
        // ignore transient polling failures
      });
  }, 4000);
}

function subscribeToJob(job) {
  stopStatusSubscriptions();
  if (!job || !job.job_id) return;

  const eventsUrl = job.events_url
    || (HANDOFF.bridge_url ? HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(job.job_id) + '/events' : '');
  const statusUrl = job.status_url
    || (HANDOFF.bridge_url ? HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(job.job_id) : '');

  if (eventsUrl && typeof EventSource !== 'undefined') {
    try {
      const source = new EventSource(eventsUrl);
      source.addEventListener('state', function (ev) {
        try {
          const payload = JSON.parse(ev.data || '{}');
          applyJobStatus(payload.status || payload);
        } catch (err) {
          // ignore malformed event payloads
        }
      });
      source.onerror = function () {
        if (!state.pollTimer) startPollingJob(job.job_id, statusUrl);
      };
      state.eventSource = source;
      return;
    } catch (err) {
      // fall through to polling
    }
  }

  startPollingJob(job.job_id, statusUrl);
}

function hydrateLatestStatus() {
  if (!HANDOFF.bridge_url || !HANDOFF.output_root) return;
  const latestUrl = HANDOFF.bridge_url.replace(/\/$/, '') + '/latest-status?output_root=' + encodeURIComponent(HANDOFF.output_root);
  fetch(latestUrl)
    .then(function (res) { return res.ok ? res.json() : null; })
    .then(function (payload) {
      if (!payload || !payload.status) return;
      if (shouldSuppressHydratedStatus(payload.status)) {
        state.activeJob = null;
        updateSidebar();
        return;
      }
      applyJobStatus(payload.status);
      if (payload.status.job_id && ['received', 'acknowledged', 'analyzing', 'fast_patch_running', 'fast_patch_ready', 'slow_patch_running'].indexOf(payload.status.state) !== -1) {
        subscribeToJob({
          job_id: payload.status.job_id,
          status_url: HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(payload.status.job_id),
          events_url: HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(payload.status.job_id) + '/events',
        });
      }
    })
    .catch(function () {
      // bridge may be offline; fall back to embedded status only
    });
}

function cleanedTitle(text) {
  const t = String(text || '').trim();
  if (!t) return '';
  const parts = t.split('—').map(function (x) { return x.trim(); }).filter(Boolean);
  if (parts.length <= 1) return t;
  return parts[parts.length - 1];
}

function tabLabel(view) {
  const t = String(view.type || '').toLowerCase();
  if (t === 'system_context') return 'System Context';
  if (t === 'container') return 'Containers';
  if (t === 'component') {
    const pid = view.parent_container_id;
    const p = pid ? nodesById.get(pid) : null;
    if (p && p.name) return p.name + ' Components';
    const tail = cleanedTitle(view.title || view.id || 'Components');
    if (/components?$/i.test(tail)) return tail;
    return tail + ' Components';
  }
  return cleanedTitle(view.title || view.id || 'View');
}

function activeBreadcrumbLabel(view) {
  const current = document.querySelector('#breadcrumbNav .breadcrumb-item.is-current');
  if (current && String(current.textContent || '').trim()) {
    return String(current.textContent).trim();
  }
  const resolvedView = view || currentView();
  return resolvedView ? tabLabel(resolvedView) : 'View';
}

function viewForType(type) {
  return viewsList().find(function (view) {
    return String(view && view.type || '').toLowerCase() === type;
  }) || null;
}

function breadcrumbItemsForView(view) {
  if (!view) return [];
  const items = [];
  const seen = new Set();
  let cursor = view.id;
  while (cursor && viewsById.has(cursor) && !seen.has(cursor)) {
    seen.add(cursor);
    items.push(viewsById.get(cursor));
    cursor = VIEW_HIERARCHY.parentByViewId.get(cursor) || '';
  }
  return items.reverse();
}

function viewOverviewEntries() {
  return VIEW_HIERARCHY.items;
}

function viewDepthForId(viewId) {
  return VIEW_HIERARCHY.depthByViewId.has(viewId) ? VIEW_HIERARCHY.depthByViewId.get(viewId) : 0;
}

function overviewNavigationDirection(nextViewId) {
  const currentDepth = viewDepthForId(state.viewId);
  const nextDepth = viewDepthForId(nextViewId);
  if (nextDepth > currentDepth) return 'forward';
  if (nextDepth < currentDepth) return 'back';
  return transitionDirectionForView(nextViewId);
}

function viewOverviewTrigger() {
  return $('viewOverviewTrigger');
}

function viewOverviewPopover() {
  return $('viewOverviewPopover');
}

function viewOverviewActionableItems() {
  return Array.from(document.querySelectorAll('#breadcrumbNav .view-overview-item:not(.is-current)'));
}

function focusViewOverviewTrigger() {
  const trigger = viewOverviewTrigger();
  if (trigger) trigger.focus();
}

function focusFirstViewOverviewItem() {
  const items = viewOverviewActionableItems();
  if (items.length) {
    items[0].focus();
    return;
  }
  focusViewOverviewTrigger();
}

function focusAdjacentViewOverviewItem(direction) {
  const items = viewOverviewActionableItems();
  if (!items.length) return;
  const active = document.activeElement;
  const currentIdx = items.indexOf(active);
  if (currentIdx === -1) {
    items[direction > 0 ? 0 : items.length - 1].focus();
    return;
  }
  const nextIdx = Math.max(0, Math.min(items.length - 1, currentIdx + direction));
  items[nextIdx].focus();
}

function setViewOverviewOpen(nextOpen, options) {
  const opts = options || {};
  const canOpen = viewOverviewEntries().length > 1;
  const open = Boolean(nextOpen && canOpen);
  if (state.viewOverviewOpen === open) {
    if (open && opts.focusFirstItem) {
      focusFirstViewOverviewItem();
    } else if (!open && opts.focusTrigger) {
      focusViewOverviewTrigger();
    }
    return;
  }
  state.viewOverviewOpen = open;
  updateBreadcrumbs();
  if (open) {
    if (opts.focusFirstItem !== false) focusFirstViewOverviewItem();
  } else if (opts.focusTrigger) {
    focusViewOverviewTrigger();
  }
}

function closeViewOverview(options) {
  setViewOverviewOpen(false, options);
}

function isViewOverviewFocusTarget(target) {
  return Boolean(

      || (target.closest && target.closest('#viewOverviewPopover'))

function normalizeSvgFragment(fragment) {
  let t = String(fragment || '').trim();
  if (!t) return '';

  if (t.startsWith('```')) {
    const lines = t.split('\n');
    lines.shift();
    if (lines.length && lines[lines.length - 1].trim() === '```') lines.pop();
    t = lines.join('\n').trim();
  }

  t = t.replace(/<script[\s\S]*?<\/script>/gi, '');
  // Remove person-style emoji markers from injected diagrams.
  t = t.replace(/[👤👥🧑👨👩]/gu, '');
  return t;
}

function intrinsicSvgWidth(svg) {
  if (!svg) return 0;
  const widthAttr = Number(svg.getAttribute('width') || '');
  if (Number.isFinite(widthAttr) && widthAttr > 0) return widthAttr;
  const viewBox = svg.viewBox && svg.viewBox.baseVal;
  if (viewBox && Number.isFinite(viewBox.width) && viewBox.width > 0) return viewBox.width;
  return 0;
}

function applyResponsiveSvgSizing(svg) {
  if (!svg) return;
  const authoredWidth = intrinsicSvgWidth(svg);
  svg.style.display = 'block';
  svg.style.width = authoredWidth > 0 ? String(Math.round(authoredWidth)) + 'px' : 'auto';
  svg.style.height = 'auto';
  svg.style.maxWidth = '100%';
  svg.style.marginInline = 'auto';
}

function createCanvasContent(host) {
  const content = document.createElement('div');
  content.className = 'canvas-content';
  host.appendChild(content);
  return content;
}

function isConfidenceTokenText(text) {
  const t = String(text || '').toLowerCase().trim();
  if (!t) return false;
  const cleaned = t
    .replace(/[\[\]()]/g, '')
    .replace(/\s+/g, '_')
    .replace(/-+/g, '_');
  return cleaned === 'confirmed' || cleaned === 'strong_inference' || cleaned === 'weak_inference';
}

function stripConfidenceLabelsFromSvg(svg) {
  if (!svg) return;

  svg.querySelectorAll('[data-confidence-label], .confidence-label').forEach(function (el) {
    el.remove();
  });

  svg.querySelectorAll('text').forEach(function (textEl) {
    if (isConfidenceTokenText(textEl.textContent)) {
      textEl.remove();
    }
  });
}

function isVisiblePaint(value) {
  const v = String(value || '').trim().toLowerCase();
  if (!v || v === 'none' || v === 'transparent') return false;
  if (/rgba?\([^)]*,\s*0(?:\.0+)?\s*\)$/.test(v)) return false;
  return true;
}

function replaceColorTokens(value) {
  let out = String(value || '');
  Object.keys(SVG_COLOR_REMAP).forEach(function (from) {
    const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(escaped, 'gi'), SVG_COLOR_REMAP[from]);
  });
  return out;
}

function remapSvgPalette(svg) {
  if (!svg) return;
  svg.querySelectorAll('*').forEach(function (el) {
    ['fill', 'stroke', 'stop-color'].forEach(function (attr) {
      if (!el.hasAttribute(attr)) return;
      el.setAttribute(attr, replaceColorTokens(el.getAttribute(attr)));
    });
    if (el.hasAttribute('style')) {
      el.setAttribute('style', replaceColorTokens(el.getAttribute('style')));
    }
  });
}

function nodeTextRole(textEl) {
  const text = String(textEl.textContent || '').trim();
  if (!text) return 'body';
  const fontSize = parseFloat(textEl.getAttribute('font-size') || '0');
  const weight = String(textEl.getAttribute('font-weight') || '');
  const strong = weight === '700' || weight === '600';
  if (!strong && isFinite(fontSize) && fontSize > 0 && fontSize <= 9.5) return 'eyebrow';
  if (strong || (isFinite(fontSize) && fontSize >= 12)) return 'title';
  return 'body';
}

function nodeClusterElements(anchor) {
  if (!anchor) return [];
  const tag = String(anchor.tagName || '').toLowerCase();
  if (tag === 'g') return Array.from(anchor.children);

  const cluster = [anchor];
  let cur = anchor.nextElementSibling;
  while (cur) {
    if (cur.hasAttribute('data-element-id') || cur.hasAttribute('data-relationship-id')) break;
    const curTag = String(cur.tagName || '').toLowerCase();
    if (!['path', 'text', 'circle', 'ellipse', 'polygon'].includes(curTag)) break;
    cluster.push(cur);
    cur = cur.nextElementSibling;
  }
  return cluster;
}

function nodeAnchorForLooseSibling(el) {
  let cur = el ? el.previousElementSibling : null;
  while (cur) {
    if (cur.hasAttribute('data-element-id')) return cur;
    if (cur.hasAttribute('data-relationship-id')) return null;
    const tag = String(cur.tagName || '').toLowerCase();
    if (!['path', 'text', 'circle', 'ellipse', 'polygon'].includes(tag)) return null;
    cur = cur.previousElementSibling;
  }
  return null;
}

function isPersonKind(kind) {
  const normalized = String(kind || '').toLowerCase();
  return normalized === 'person' || normalized === 'actor' || normalized === 'external_actor';
}

function personSubtitleText(kind) {
  return 'Person';
}

function isEmojiOnlyText(text) {
  const cleaned = String(text || '').trim();
  return cleaned === '👤' || cleaned === '👥' || cleaned === '🧑' || cleaned === '👨' || cleaned === '👩';
}

function estimateTextWidth(text, fontSize) {
  return String(text || '').trim().length * Number(fontSize || 0) * 0.58;
}

function normalizeEdgeLabelText(text) {
  return String(text || '').trim().replace(/\s+/g, ' ');
}

function wrapEdgeLabelLines(text) {
  const normalized = normalizeEdgeLabelText(text);
  if (!normalized) return [];
  if (normalized.length <= 26 || normalized.indexOf(' ') === -1) return [normalized];

  const words = normalized.split(' ');
  let best = null;
  for (let idx = 1; idx < words.length; idx += 1) {
    const left = words.slice(0, idx).join(' ');
    const right = words.slice(idx).join(' ');
    const maxLen = Math.max(left.length, right.length);
    const diff = Math.abs(left.length - right.length);
    const overage = Math.max(0, maxLen - 30);
    const score = overage * 100 + maxLen * 10 + diff;
    if (!best || score < best.score) {
      best = { lines: [left, right], score: score };
    }
  }
  return best ? best.lines : [normalized];
}

function stableNumberForText(text) {
  return String(text || '').split('').reduce(function (sum, char) {
    return sum + char.charCodeAt(0);
  }, 0);
}

function boxCenter(box) {
  return {
    x: box.x + box.w / 2,
    y: box.y + box.h / 2
  };
}

function preferredPortSide(src, dst) {
  const srcCenter = boxCenter(src);
  const dstCenter = boxCenter(dst);

  const gapEast = dst.x - (src.x + src.w);
  const gapWest = src.x - (dst.x + dst.w);
  const gapSouth = dst.y - (src.y + src.h);
  const gapNorth = src.y - (dst.y + dst.h);

  const horizontalGap = Math.max(gapEast, gapWest, 0);
  const verticalGap = Math.max(gapSouth, gapNorth, 0);

  if (horizontalGap <= ROUTING_EPSILON && verticalGap <= ROUTING_EPSILON) {
    const dx = dstCenter.x - srcCenter.x;
    const dy = dstCenter.y - srcCenter.y;
    if (Math.abs(dx) >= Math.abs(dy)) return dx >= 0 ? 'east' : 'west';
    return dy >= 0 ? 'south' : 'north';
  }

  if (horizontalGap >= verticalGap) return dstCenter.x >= srcCenter.x ? 'east' : 'west';
  return dstCenter.y >= srcCenter.y ? 'south' : 'north';
}

function sideAnchorPoint(box, side) {
  const center = boxCenter(box);
  if (side === 'north') return { x: center.x, y: box.y };
  if (side === 'south') return { x: center.x, y: box.y + box.h };
  if (side === 'west') return { x: box.x, y: center.y };
  return { x: box.x + box.w, y: center.y };
}

function offsetPointForSide(point, side, distance) {
  if (side === 'north') return { x: point.x, y: point.y - distance };
  if (side === 'south') return { x: point.x, y: point.y + distance };
  if (side === 'west') return { x: point.x - distance, y: point.y };
  return { x: point.x + distance, y: point.y };
}

function collapseOrthogonalPoints(points) {
  const deduped = [];
  (points || []).forEach(function (point) {
    if (!point) return;
    const prev = deduped[deduped.length - 1];
    if (prev && Math.hypot(point.x - prev.x, point.y - prev.y) <= ROUTING_EPSILON) return;
    deduped.push({ x: point.x, y: point.y });
  });

  if (deduped.length <= 2) return deduped;

  const collapsed = [deduped[0]];
  for (let idx = 1; idx < deduped.length - 1; idx += 1) {
    const prev = collapsed[collapsed.length - 1];
    const cur = deduped[idx];
    const next = deduped[idx + 1];
    const sameX = Math.abs(prev.x - cur.x) <= ROUTING_EPSILON && Math.abs(cur.x - next.x) <= ROUTING_EPSILON;
    const sameY = Math.abs(prev.y - cur.y) <= ROUTING_EPSILON && Math.abs(cur.y - next.y) <= ROUTING_EPSILON;
    if (sameX || sameY) continue;
    collapsed.push(cur);
  }
  collapsed.push(deduped[deduped.length - 1]);
  return collapsed;
}

function relationshipRoutePoints(srcBox, dstBox, relId) {
  const srcSide = preferredPortSide(srcBox, dstBox);
  const dstSide = preferredPortSide(dstBox, srcBox);
  const start = sideAnchorPoint(srcBox, srcSide);
  const end = sideAnchorPoint(dstBox, dstSide);
  const startStub = offsetPointForSide(start, srcSide, EDGE_EGRESS_STUB);
  const endStub = offsetPointForSide(end, dstSide, EDGE_EGRESS_STUB);
  const offset = ((stableNumberForText(relId) % 5) - 2) * 10;
  let points;

  if ((srcSide === 'east' || srcSide === 'west') && (dstSide === 'east' || dstSide === 'west')) {
    const midX = (startStub.x + endStub.x) / 2 + offset;
    points = [
      start,
      startStub,
      { x: midX, y: startStub.y },
      { x: midX, y: endStub.y },
      endStub,
      end
    ];
    return collapseOrthogonalPoints(points);
  }

  if ((srcSide === 'north' || srcSide === 'south') && (dstSide === 'north' || dstSide === 'south')) {
    const midY = (startStub.y + endStub.y) / 2 + offset;
    points = [
      start,
      startStub,
      { x: startStub.x, y: midY },
      { x: endStub.x, y: midY },
      endStub,
      end
    ];
    return collapseOrthogonalPoints(points);
  }

  if (srcSide === 'east' || srcSide === 'west') {
    const midY = (startStub.y + endStub.y) / 2 + offset;
    points = [
      start,
      startStub,
      { x: startStub.x, y: midY },
      { x: endStub.x, y: midY },
      endStub,
      end
    ];
    return collapseOrthogonalPoints(points);
  }

  const midX = (startStub.x + endStub.x) / 2 + offset;
  points = [
    start,
    startStub,
    { x: midX, y: startStub.y },
    { x: midX, y: endStub.y },
    endStub,
    end
  ];
  return collapseOrthogonalPoints(points);
}

function roundedPolylinePathData(points, radius) {
  const pathPoints = points || [];
  const cornerRadius = isFinite(radius) ? radius : 10;
  if (pathPoints.length < 2) return '';

  const path = ['M ' + pathPoints[0].x.toFixed(1) + ' ' + pathPoints[0].y.toFixed(1)];
  for (let idx = 1; idx < pathPoints.length - 1; idx += 1) {
    const prev = pathPoints[idx - 1];
    const cur = pathPoints[idx];
    const next = pathPoints[idx + 1];

    const inDx = cur.x - prev.x;
    const inDy = cur.y - prev.y;
    const outDx = next.x - cur.x;
    const outDy = next.y - cur.y;
    const inLen = Math.hypot(inDx, inDy) || 1;
    const outLen = Math.hypot(outDx, outDy) || 1;
    const r = Math.min(cornerRadius, inLen / 2, outLen / 2);

    const sx = cur.x - (inDx / inLen) * r;
    const sy = cur.y - (inDy / inLen) * r;
    const ex = cur.x + (outDx / outLen) * r;
    const ey = cur.y + (outDy / outLen) * r;

    path.push('L ' + sx.toFixed(1) + ' ' + sy.toFixed(1));
    path.push('Q ' + cur.x.toFixed(1) + ' ' + cur.y.toFixed(1) + ' ' + ex.toFixed(1) + ' ' + ey.toFixed(1));
  }

  const last = pathPoints[pathPoints.length - 1];
  path.push('L ' + last.x.toFixed(1) + ' ' + last.y.toFixed(1));
  return path.join(' ');
}

function labelPlacementForPolyline(points) {
  const pathPoints = points || [];
  if (pathPoints.length < 2) return { x: 0, y: 0 };

  let best = null;
  for (let idx = 0; idx < pathPoints.length - 1; idx += 1) {
    const start = pathPoints[idx];
    const end = pathPoints[idx + 1];
    const length = Math.hypot(end.x - start.x, end.y - start.y);
    if (!best || length > best.length) {
      best = { length: length, start: start, end: end };
    }
  }
  if (!best) return { x: 0, y: 0 };

  const lx = (best.start.x + best.end.x) / 2;
  const ly = (best.start.y + best.end.y) / 2;
  const length = best.length || 1;
  const nx = -((best.end.y - best.start.y) / length);
  const ny = (best.end.x - best.start.x) / length;
  return {
    x: lx + nx * 8,
