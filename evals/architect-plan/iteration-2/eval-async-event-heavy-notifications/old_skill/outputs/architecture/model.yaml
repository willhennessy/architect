version: 2
system_name: "Notification Platform"
repo_archetype: "service_oriented_backend"
elements:
  - id: "product-app"
    name: "Product App"
    aliases: []
    kind: "person"
    c4_level: "context"
    description: "Source application emitting events."
    responsibility: "Trigger notifications."
    technology: ""
    owned_data: []
    system_of_record: []
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: ["plan://req-events"]
    tags: ["actor"]
    confidence: "confirmed"
    evidence_ids: ["ev-req-events"]
  - id: "notification-api"
    name: "Notification API"
    aliases: []
    kind: "container"
    c4_level: "container"
    description: "Ingests notification requests."
    responsibility: "Validate, enrich, and publish events."
    technology: "Go"
    owned_data: ["notification-request"]
    system_of_record: []
    runtime_boundary: "deployable"
    deployable: true
    external: false
    parent_id: ""
    source_paths: ["plan://req-events"]
    tags: ["api"]
    confidence: "strong_inference"
    evidence_ids: ["ev-req-events"]
  - id: "notification-bus"
    name: "Notification Bus"
    aliases: ["Event Queue"]
    kind: "queue"
    c4_level: "container"
    description: "Queues delivery events and retries."
    responsibility: "Buffer and distribute delivery work."
    technology: "Kafka"
    owned_data: ["delivery-event"]
    system_of_record: []
    runtime_boundary: "data_store"
    deployable: true
    external: false
    parent_id: ""
    source_paths: ["plan://trd-async"]
    tags: ["async"]
    confidence: "strong_inference"
    evidence_ids: ["ev-trd-async"]
  - id: "delivery-worker"
    name: "Delivery Worker"
    aliases: []
    kind: "container"
    c4_level: "container"
    description: "Consumes events and dispatches channel sends."
    responsibility: "Apply retry policy and route per provider."
    technology: "Go"
    owned_data: ["delivery-attempt"]
    system_of_record: ["delivery-attempt"]
    runtime_boundary: "deployable"
    deployable: true
    external: false
    parent_id: ""
    source_paths: ["plan://req-channels"]
    tags: ["worker"]
