relationships:
  - id: "user-calls-social-api"
    source_id: "end-user"
    target_id: "social-api"
    label: "Uses posting/comment/feed endpoints"
    interaction_type: "calls"
    directionality: "unidirectional"
    sync_async: "sync"
    protocol: "https"
    data_objects: ["post", "comment", "feed-query"]
    confidence: "confirmed"
    evidence_ids: ["ev-intent-core"]
  - id: "social-api-stores-content"
    source_id: "social-api"
    target_id: "social-db"
    label: "Writes canonical social content"
    interaction_type: "writes"
    directionality: "unidirectional"
    sync_async: "storage"
    protocol: "sql"
    data_objects: ["post", "comment"]
    confidence: "weak_inference"
    evidence_ids: ["ev-intent-core"]
  - id: "social-api-calls-feed"
    source_id: "social-api"
    target_id: "feed-service"
    label: "Reads ranked feed"
    interaction_type: "calls"
    directionality: "unidirectional"
    sync_async: "sync"
    protocol: "https"
    data_objects: ["feed-query", "feed-item"]
    confidence: "weak_inference"
    evidence_ids: ["ev-asm-feed"]
  - id: "social-api-publishes-moderation"
    source_id: "social-api"
    target_id: "moderation-queue"
    label: "Publishes moderation tasks"
    interaction_type: "publishes"
    directionality: "unidirectional"
    sync_async: "async"
    protocol: "n_a"
    data_objects: ["moderation-task"]
    confidence: "weak_inference"
    evidence_ids: ["ev-unk-moderation"]
evidence:
  - id: "ev-intent-core"
    path: "plan://user-intent/social-core"
    kind: "user_intent"
    strength: "high"
    reason: "Prompt requires posting, comments, and feeds."
  - id: "ev-asm-feed"
    path: "plan://assumptions/feed-generation"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Feed ranking approach unspecified; proposing separable feed service."
  - id: "ev-unk-moderation"
    path: "plan://unknowns/moderation-policy"
    kind: "plan_assumption"
    strength: "low"
    reason: "Moderation needs are likely but unspecified; modeled as tentative queue boundary."
unknowns:
  - "Expected DAU and latency SLO"
  - "Final moderation policy and staffing model"
  - "Regional data residency requirements"
assumptions:
  - text: "Initial moderation can be asynchronous with later human escalation support."
    confidence: "weak_inference"
