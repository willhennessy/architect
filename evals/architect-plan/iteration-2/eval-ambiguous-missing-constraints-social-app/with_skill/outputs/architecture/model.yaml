    responsibility: "Persist canonical social content state."
    technology: "PostgreSQL"
    owned_data: ["post", "comment"]
    system_of_record: ["post", "comment"]
    runtime_boundary: "data_store"
    deployable: true
    external: false
    parent_id: ""
    source_paths: ["plan://user-intent/social-core"]
    tags: ["state"]
