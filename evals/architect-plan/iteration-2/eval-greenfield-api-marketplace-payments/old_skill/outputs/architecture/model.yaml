evidence:
  - id: "ev-req-core"
    path: "plan://requirements/core-marketplace"
    kind: "plan_requirement"
    strength: "high"
    reason: "Prompt explicitly requires buyer/seller accounts, catalog, checkout, and admin analytics."
  - id: "ev-req-payments"
    path: "plan://requirements/stripe-webhooks"
    kind: "plan_requirement"
    strength: "high"
    reason: "Prompt explicitly requires Stripe payments and order webhooks."
  - id: "ev-con-team"
    path: "plan://constraints/team-and-timeline"
    kind: "plan_constraint"
    strength: "medium"
    reason: "Small team and 8-week launch favor clear service boundaries with limited complexity."
  - id: "ev-tradeoff-async"
    path: "plan://tradeoffs/async-fulfillment"
    kind: "plan_tradeoff"
    strength: "medium"
    reason: "Async fulfillment reduces checkout latency and isolates downstream failures."
  - id: "ev-asm-idempotency"
    path: "plan://assumptions/webhook-idempotency"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Webhook retries require deduplication keys and idempotent processing."
unknowns:
  - "Final analytics freshness target for admin dashboards"
  - "Refund and partial-capture policy for v1"
assumptions:
  - text: "Payment webhook events can arrive out of order and must be reconciled idempotently."
    confidence: "strong_inference"
  - text: "Single-region deployment is acceptable for v1 per constraints."
    confidence: "confirmed"
