version: 2
system_name: "Rundler"
generated_by_skill: "architect"
mode: "initial"
repo_archetype: "modular_monolith"
modeling_style:
  primary: "C4"
  supplemental: ["Sequence", "Deployment"]
scope:
  in_scope:
    - "RPC server (JSON-RPC API for ERC-4337)"
    - "Pool (user operation mempool with simulation and reputation)"
    - "Builder (bundle construction, signing, submission, and tracking)"
    - "Signer management (local, mnemonic, AWS KMS with Redis leasing)"
    - "Provider abstraction over EVM nodes"
    - "Inter-task communication (local channels and gRPC)"
    - "Deployment modes (node, rpc, pool, builder, backend)"
  out_of_scope:
    - "Smart contract source code (only bindings are in-repo)"
    - "P2P mempool protocol (mentioned as future work)"
    - "Client DApps and wallets"
    - "Cloud infrastructure and orchestration"
audiences: ["new_hires", "pms", "senior_architects"]
artifacts:
  - path: "architecture/model.yaml"
    type: "model"
    description: "Canonical architecture model with all elements, relationships, and evidence."
  - path: "architecture/views/system-context.yaml"
    type: "system_context"
    description: "External actors and systems interacting with Rundler."
  - path: "architecture/views/container.yaml"
    type: "container"
    description: "Three core tasks (RPC, Pool, Builder) and their communication patterns."
  - path: "architecture/views/component-pool.yaml"
    type: "component"
    description: "Internal components of the Pool task."
  - path: "architecture/views/component-builder.yaml"
    type: "component"
    description: "Internal components of the Builder task."
  - path: "architecture/views/sequence-submit-userop.yaml"
    type: "sequence"
    description: "User operation submission flow from DApp to mempool."
  - path: "architecture/views/sequence-bundle-building.yaml"
    type: "sequence"
    description: "Bundle building and on-chain submission flow."
  - path: "architecture/views/sequence-gas-estimation.yaml"
    type: "sequence"
    description: "Gas estimation flow from RPC through simulation to EVM node."
  - path: "architecture/views/deployment.yaml"
    type: "deployment"
    description: "Docker deployment topology and supported modes."
  - path: "architecture/summary.md"
    type: "summary"
    description: "Human-readable architecture overview."
  - path: "architecture/manifest.yaml"
    type: "manifest"
    description: "This file. Index of all architecture artifacts."
assumptions:
  - "Production deployments use distributed mode with separate RPC and Backend processes."
  - "Redis is only needed for AWS KMS key leasing in multi-worker setups."
unknowns:
  - "P2P mempool protocol is not yet implemented."
  - "Exact production deployment topology at Alchemy is not documented."
overall_summary: "Rundler is a high-performance ERC-4337 bundler written in Rust, built and operated by Alchemy. It consists of three core tasks -- RPC (JSON-RPC API with gas estimation), Pool (user operation mempool with ERC-4337 validation), and Builder (bundle construction and on-chain submission) -- that can run as a single process or as distributed services communicating via gRPC. The modular architecture enables horizontal scaling of RPC while centralizing stateful components (Pool, Builder) behind gRPC endpoints."
