version: 2
system_name: "Rundler"
repo_archetype: "modular_monolith"
elements:
  # === Context-level ===
  - id: "rundler-system"
    name: "Rundler"
    aliases: ["bundler"]
    kind: "software_system"
    c4_level: "context"
    description: "High-performance ERC-4337 bundler that validates, pools, and submits user operation bundles to EVM chains."
    responsibility: "Accept user operations via JSON-RPC, validate and pool them, build bundles, and submit bundle transactions on-chain."
    technology: "Rust"
    owned_data: ["user_operations_mempool", "entity_reputation"]
    system_of_record: ["user_operation_lifecycle"]
    runtime_boundary: "process"
    deployable: true
    external: false
    parent_id: ""
    source_paths: ["bin/rundler/", "crates/"]
    tags: ["erc4337", "bundler"]
    confidence: "confirmed"
    evidence_ids: ["ev-readme", "ev-cargo-workspace", "ev-dockerfile"]

  - id: "dapp-user"
    name: "DApp / Wallet User"
    aliases: []
    kind: "person"
    c4_level: "context"
    description: "End user or smart account wallet submitting user operations via a DApp."
    responsibility: "Submits ERC-4337 user operations to the bundler's RPC endpoint."
    technology: ""
    owned_data: []
    system_of_record: []
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: []
    tags: []
    confidence: "strong_inference"
    evidence_ids: ["ev-rpc-doc"]

  - id: "evm-node"
    name: "EVM Full Node"
    aliases: ["eth-node", "json-rpc-provider"]
    kind: "external_system"
    c4_level: "context"
    description: "Ethereum-compatible full node providing JSON-RPC access for chain state, simulation (debug_traceCall), and transaction submission."
    responsibility: "Provides blockchain state, executes simulations, accepts raw transactions."
    technology: "Ethereum JSON-RPC"
    owned_data: ["blockchain_state"]
    system_of_record: ["blockchain"]
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: []
    tags: ["ethereum", "json-rpc"]
    confidence: "confirmed"
    evidence_ids: ["ev-provider-crate", "ev-pool-doc"]

  - id: "entrypoint-contract"
    name: "EntryPoint Contract"
    aliases: ["entry-point"]
    kind: "external_system"
    c4_level: "context"
    description: "ERC-4337 EntryPoint smart contract (v0.6, v0.7, v0.8, and v0.9) that validates and executes user operation bundles on-chain."
    responsibility: "On-chain validation and execution of user operation bundles via handleOps."
    technology: "Solidity / EVM"
    owned_data: ["on_chain_user_operations"]
    system_of_record: ["user_operation_execution"]
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: ["crates/contracts/"]
    tags: ["erc4337", "smart-contract"]
    confidence: "confirmed"
    evidence_ids: ["ev-contracts-crate", "ev-entrypoint-doc"]

  - id: "aws-kms"
    name: "AWS KMS"
    aliases: []
    kind: "external_system"
    c4_level: "context"
    description: "AWS Key Management Service used for transaction signing in production deployments."
    responsibility: "Securely sign bundle transactions without exposing private keys."
    technology: "AWS KMS"
    owned_data: ["signing_keys"]
    system_of_record: []
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: ["crates/signer/src/aws.rs"]
    tags: ["signing", "aws"]
    confidence: "confirmed"
    evidence_ids: ["ev-signer-aws", "ev-builder-doc"]

  - id: "redis"
    name: "Redis"
    aliases: []
    kind: "external_system"
    c4_level: "context"
    description: "Redis instance used for KMS key leasing to prevent nonce collisions across distributed builder workers."
    responsibility: "Distributed lock coordination for KMS key leasing."
    technology: "Redis"
    owned_data: ["key_leases"]
    system_of_record: []
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: ["crates/signer/src/aws.rs"]
    tags: ["distributed-lock"]
    confidence: "confirmed"
    evidence_ids: ["ev-signer-redis", "ev-builder-doc"]

  - id: "flashbots-relay"
    name: "Flashbots Protect"
    aliases: []
    kind: "external_system"
    c4_level: "context"
    description: "Flashbots Protect RPC endpoint for private bundle submission on Ethereum mainnet."
    responsibility: "Private transaction submission to avoid frontrunning."
    technology: "HTTPS"
    owned_data: []
    system_of_record: []
    runtime_boundary: "external"
    deployable: false
    external: true
    parent_id: ""
    source_paths: ["crates/builder/src/sender/flashbots.rs"]
    tags: ["mev-protection"]
    confidence: "confirmed"
    evidence_ids: ["ev-flashbots-sender", "ev-builder-doc"]

  # === Container-level ===
  - id: "rpc-task"
    name: "RPC Server"
    aliases: ["rpc"]
    kind: "container"
    c4_level: "container"
    description: "JSON-RPC server implementing ERC-4337 eth_, debug_, rundler_, and admin_ namespaces. Performs gas estimation via simulation against the EVM node. Main API surface for external clients."
    responsibility: "Accept user operations, estimate gas, query operation status, expose debug/admin endpoints."
    technology: "Rust / jsonrpsee"
    owned_data: []
    system_of_record: []
    runtime_boundary: "deployable"
    deployable: true
    external: false
    parent_id: "rundler-system"
    source_paths: ["crates/rpc/"]
    tags: ["api", "json-rpc"]
    confidence: "confirmed"
    evidence_ids: ["ev-rpc-crate", "ev-rpc-doc", "ev-cli-subcommands"]

  - id: "pool-task"
    name: "Pool (Mempool)"
    aliases: ["pool", "op-pool", "mempool"]
    kind: "container"
    c4_level: "container"
    description: "User operation mempool that validates, simulates, and stores pending user operations. Tracks chain state and handles reorgs."
    responsibility: "Validate incoming UOs via simulation, maintain in-memory mempool, track entity reputation, handle chain reorgs."
    technology: "Rust / tokio"
    owned_data: ["user_operations_mempool", "entity_reputation", "mined_uo_cache", "paymaster_balances"]
    system_of_record: ["user_operation_lifecycle"]
    runtime_boundary: "deployable"
    deployable: true
    external: false
    parent_id: "rundler-system"
    source_paths: ["crates/pool/"]
    tags: ["mempool", "stateful"]
    confidence: "confirmed"
    evidence_ids: ["ev-pool-crate", "ev-pool-doc", "ev-cli-subcommands"]

  - id: "builder-task"
    name: "Builder"
    aliases: ["bundle-builder"]
    kind: "container"
    c4_level: "container"
    description: "Bundle construction engine that selects UOs from the pool, re-simulates, builds bundles, signs and submits transactions, and tracks their mining status."
    responsibility: "Build profitable bundles from pooled UOs, sign transactions, submit on-chain, handle cancellations."
    technology: "Rust / tokio"
    owned_data: ["pending_bundle_state"]
    system_of_record: []
    runtime_boundary: "deployable"
    deployable: true
    external: false
    parent_id: "rundler-system"
    source_paths: ["crates/builder/"]
    tags: ["bundle-building", "stateful"]
    confidence: "confirmed"
    evidence_ids: ["ev-builder-crate", "ev-builder-doc", "ev-cli-subcommands"]

  # === Component-level: Pool ===
  - id: "pool-simulation"
    name: "Simulation Engine"
    aliases: ["sim"]
    kind: "component"
    c4_level: "component"
    description: "Validates and simulates user operations using debug_traceCall per ERC-4337 rules. Used by Pool for admission validation, by RPC for gas estimation, and by Builder for re-simulation. Placed under Pool as primary consumer."
    responsibility: "Precheck and simulate user operations, enforce validation rules."
    technology: "Rust"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "pool-task"
    source_paths: ["crates/sim/"]
    tags: ["simulation", "validation"]
    confidence: "confirmed"
    evidence_ids: ["ev-sim-crate", "ev-pool-doc"]

  - id: "pool-chain-tracker"
    name: "Chain Tracker"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Tracks chain progression via the EVM node, detects new blocks, mined UOs, and chain reorgs."
    responsibility: "Monitor chain state and notify the pool of block events and reorgs."
    technology: "Rust"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "pool-task"
    source_paths: ["crates/pool/src/chain.rs"]
    tags: ["chain-tracking"]
    confidence: "confirmed"
    evidence_ids: ["ev-pool-chain", "ev-pool-doc"]

  - id: "pool-reputation"
    name: "Reputation Manager"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Tracks entity reputation per ERC-4337 spec, with configurable allowlists and blocklists."
    responsibility: "Score, throttle, and ban entities based on on-chain behavior."
    technology: "Rust"
    owned_data: ["entity_reputation"]
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "pool-task"
    source_paths: ["crates/pool/src/mempool/"]
    tags: ["reputation"]
    confidence: "confirmed"
    evidence_ids: ["ev-pool-doc"]

  - id: "pool-server"
    name: "Pool Server"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Server interface for the pool task, supporting both local in-process and remote gRPC communication modes."
    responsibility: "Expose pool operations to RPC and Builder via local channels or gRPC."
    technology: "Rust / tonic (gRPC)"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "pool-task"
    source_paths: ["crates/pool/src/server/"]
    tags: ["server", "grpc"]
    confidence: "confirmed"
    evidence_ids: ["ev-pool-server"]

  # === Component-level: Builder ===
  - id: "builder-assigner"
    name: "Assigner"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Coordinates work distribution among bundle sender workers, selecting entrypoints and preventing sender conflicts."
    responsibility: "Assign entrypoints to workers with priority-based selection and starvation prevention."
    technology: "Rust"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "builder-task"
    source_paths: ["crates/builder/src/assigner.rs"]
    tags: ["scheduling"]
    confidence: "confirmed"
    evidence_ids: ["ev-builder-assigner", "ev-builder-doc"]

  - id: "builder-proposer"
    name: "Bundle Proposer"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Constructs valid bundles by filtering UOs for profitability, re-simulating, and computing aggregated signatures."
    responsibility: "Build candidate bundles from assigned UOs, enforce gas limits and fees."
    technology: "Rust"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "builder-task"
    source_paths: ["crates/builder/src/bundle_proposer.rs"]
    tags: ["bundle-construction"]
    confidence: "confirmed"
    evidence_ids: ["ev-builder-proposer", "ev-builder-doc"]

  - id: "builder-sender"
    name: "Bundle Sender (State Machine)"
    aliases: ["bundle-sender"]
    kind: "component"
    c4_level: "component"
    description: "State machine that drives the bundle lifecycle: Building -> Pending -> Cancelling -> CancelPending. Each worker runs one instance."
    responsibility: "Submit bundles, track mining status, handle cancellations and resubmissions."
    technology: "Rust"
    owned_data: ["pending_bundle_state"]
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "builder-task"
    source_paths: ["crates/builder/src/bundle_sender.rs"]
    tags: ["state-machine"]
    confidence: "confirmed"
    evidence_ids: ["ev-builder-sender", "ev-builder-doc"]

  - id: "builder-tx-sender"
    name: "Transaction Sender"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Pluggable transaction submission backend supporting raw eth_sendRawTransaction, Flashbots, Polygon Bloxroute, and Polygon private submission."
    responsibility: "Submit signed bundle transactions to the network via the configured sender implementation."
    technology: "Rust"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "builder-task"
    source_paths: ["crates/builder/src/sender/"]
    tags: ["transaction-submission"]
    confidence: "confirmed"
    evidence_ids: ["ev-builder-sender-dir", "ev-builder-doc"]

  - id: "builder-signer"
    name: "Signer Manager"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Manages transaction signing keys. Supports local private key, mnemonic, and AWS KMS with Redis-based key leasing."
    responsibility: "Lease signing keys to workers, sign bundle transactions."
    technology: "Rust"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "builder-task"
    source_paths: ["crates/signer/"]
    tags: ["signing", "key-management"]
    confidence: "confirmed"
    evidence_ids: ["ev-signer-crate", "ev-builder-doc"]

  - id: "builder-server"
    name: "Builder Server"
    aliases: []
    kind: "component"
    c4_level: "component"
    description: "Server interface for the builder task, supporting both local in-process and remote gRPC communication modes."
    responsibility: "Expose builder control (debug mode, manual bundling) to RPC via local channels or gRPC."
    technology: "Rust / tonic (gRPC)"
    owned_data: []
    system_of_record: []
    runtime_boundary: "internal_module"
    deployable: false
    external: false
    parent_id: "builder-task"
    source_paths: ["crates/builder/src/server/"]
    tags: ["server", "grpc"]
    confidence: "confirmed"
    evidence_ids: ["ev-builder-server"]

  # === Deployment nodes ===
  - id: "deploy-docker"
    name: "Docker Container"
    aliases: []
    kind: "deployment_node"
    c4_level: "deployment"
    description: "Docker container running the rundler binary. Exposes ports 3000 (RPC) and 8080 (metrics)."
    responsibility: "Runtime container for Rundler."
    technology: "Docker / Ubuntu"
    owned_data: []
    system_of_record: []
    runtime_boundary: "network_zone"
    deployable: false
    external: false
    parent_id: ""
    source_paths: ["Dockerfile"]
    tags: ["docker"]
    confidence: "confirmed"
    evidence_ids: ["ev-dockerfile"]

