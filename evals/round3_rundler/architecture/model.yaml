evidence:
  - id: "ev-readme"
    path: "README.md"
    kind: "doc"
    strength: "high"
    reason: "States Rundler is a high-performance ERC-4337 bundler in Rust, built by Alchemy."

  - id: "ev-cargo-workspace"
    path: "Cargo.toml"
    kind: "runtime_entrypoint"
    strength: "high"
    reason: "Workspace manifest defining all crates and the single binary entrypoint."

  - id: "ev-dockerfile"
    path: "Dockerfile"
    kind: "deploy_config"
    strength: "high"
    reason: "Docker build producing a single rundler binary, exposing ports 3000 (RPC) and 8080 (metrics)."

  - id: "ev-arch-readme"
    path: "docs/architecture/README.md"
    kind: "doc"
    strength: "high"
    reason: "Describes three main tasks (RPC, Pool, Builder) and their communication patterns."

  - id: "ev-rpc-doc"
    path: "docs/architecture/rpc.md"
    kind: "doc"
    strength: "high"
    reason: "Documents RPC namespaces: eth_, debug_, rundler_, admin_."

