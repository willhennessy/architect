  - "Exact Redis deployment topology for KMS key leasing is not specified in the repo."

assumptions:
  - "In production (Alchemy cloud), Rundler likely runs in distributed mode with separate RPC, Pool, and Builder processes communicating via gRPC."
  - "The 'backend' CLI command (pool + builder with gRPC) is used as a deployment unit behind a separate RPC gateway."
  - "Redis is only required when using AWS KMS signing in a multi-worker setup."
  - "S3 dependency in bin/rundler Cargo.toml (aws-sdk-s3) is used for loading JSON config files from S3 buckets (see bin/rundler/src/cli/json.rs)."
