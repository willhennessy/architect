overall_summary: "Rundler is a service-oriented ERC-4337 bundler backend implemented as a Rust workspace with three primary runtime roles: RPC, Pool, and Builder. Those roles can run in one process or as separate processes connected by local handles or gRPC, while all of them rely on an EVM JSON-RPC node for chain data and simulation. The Pool owns local pending user operation state, reputation, and paymaster tracking, while the Builder owns worker assignment, bundle lifecycle tracking, and optional signer infrastructure integrations."
