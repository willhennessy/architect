assumptions:
  - text: "The most stable runtime boundaries are the RPC, Pool, and Builder roles, even though the same binary can collocate them via `node` or `backend` commands."
    confidence: "strong_inference"
  - text: "Private relays, AWS KMS, and Redis should be modeled as optional because the builder and signer code paths clearly gate them behind configuration."
    confidence: "confirmed"
